    chartEl.innerHTML='<div style="color:#555;font-size:11px;padding:20px">Loading…</div>';
    const results=await Promise.all(activeIds.map(id=>fetchSeries(id).catch(()=>null)));
    const active=results.filter(Boolean);

    if(!active.length){
      chartEl.innerHTML='<div style="color:#f87171;font-size:10px;padding:20px">No data available. Check the series ID.</div>';
      return;
    }
    chartEl.innerHTML='';

    const lwOpts={
      width: chartEl.clientWidth||800,
      height:chartEl.clientHeight||400,
      layout:{background:{type:'solid',color:'#111827'},textColor:'#9ca3af',fontSize:11,fontFamily:"'JetBrains Mono',monospace"},
      grid:{vertLines:{color:'#1f2937'},horzLines:{color:'#1a2332'}},
      timeScale:{borderColor:'#2d3748',timeVisible:true,fixLeftEdge:false,fixRightEdge:false},
      rightPriceScale:{visible:true,borderColor:'#2d3748',scaleMargins:{top:0.1,bottom:0.1}},
      leftPriceScale:{visible:false,borderColor:'#2d3748',scaleMargins:{top:0.1,bottom:0.1}},
      crosshair:{vertLine:{color:'#4b5563',labelBackgroundColor:'#1f2937'},horzLine:{color:'#4b5563',labelBackgroundColor:'#1f2937'}},
    };

    requestAnimationFrame(()=>setTimeout(()=>{
      const chart=LightweightCharts.createChart(chartEl,lwOpts);
      _gpChart=chart;

      if(_mode==='overlay'){
        const filt=active.filter(s=>byDate(s.data).length>0);
        const multi=filt.length>1;
        if(multi) chart.applyOptions({leftPriceScale:{visible:true,borderColor:'#2d3748',scaleMargins:{top:0.1,bottom:0.1}}});
        filt.forEach((s,i)=>{
          const ls=chart.addLineSeries({
            color:COLORS[i%COLORS.length],lineWidth:2,
            priceScaleId:(i===0&&multi)?'left':'right',
            lastValueVisible:true,priceLineVisible:false,
            priceFormat:{type:'custom',formatter:gpFmt(s)},
          });
          ls.setData(byDate(s.data).map(r=>({time:r.date,value:+r.value})));
        });
        if(footer) footer.innerHTML=filt.map((s,i)=>
          `<span style="color:${COLORS[i%COLORS.length]};font-weight:600">${s.id}</span> <span style="color:#6b7280">${s.label}</span> <span style="color:#9ca3af">${s.frequency} · ${s.source.toUpperCase()}</span>`
        ).join('<span style="color:#555;padding:0 8px">·</span>');

      } else if(_mode==='ratio'){
        const s1=active[0], s2=active[1];
        if(!s2){chartEl.innerHTML='<div style="color:#fbbf24;font-size:10px;padding:20px">Add a second series for ratio mode.</div>';chart.remove();_gpChart=null;return;}
        const rd=calcRatio(byDate(s1.data),byDate(s2.data));
        if(!rd.length){chartEl.innerHTML='<div style="color:#444;font-size:10px;padding:20px">No overlapping dates between series.</div>';chart.remove();_gpChart=null;return;}
        const ls=chart.addLineSeries({color:COLORS[0],lineWidth:2,priceScaleId:'right',lastValueVisible:true,priceLineVisible:false,priceFormat:{type:'custom',formatter:v=>(+v).toFixed(4)}});
        ls.setData(rd.map(r=>({time:r.date,value:+r.value})));
        if(rd.length>=50){
          const ma=calcMA(rd,50);
          const lm=chart.addLineSeries({color:'#555',lineWidth:1,lineStyle:2,priceScaleId:'right',lastValueVisible:false,priceLineVisible:false,priceFormat:{type:'custom',formatter:v=>(+v).toFixed(4)}});
          lm.setData(ma.map(r=>({time:r.date,value:+r.value})));
        }
        const last=rd[rd.length-1]?.value, avg=rd.reduce((s,r)=>s+r.value,0)/rd.length;
        if(footer) footer.innerHTML=`<span style="color:${COLORS[0]};font-weight:600">${s1.id} / ${s2.id}</span> <span style="color:#6b7280">Last: ${(+last).toFixed(4)} · Avg: ${(+avg).toFixed(4)}</span> <span style="color:#9ca3af">· ${s1.source.toUpperCase()} / ${s2.source.toUpperCase()}</span>`;

      } else if(_mode==='mas'){
        const s1=active[0];
        const pd=byDate(s1.data);
        if(!pd.length){chartEl.innerHTML='<div style="color:#444;font-size:10px;padding:20px">No data in selected range.</div>';chart.remove();_gpChart=null;return;}
        const lsP=chart.addLineSeries({color:'#e2e8f0',lineWidth:2,priceScaleId:'right',lastValueVisible:true,priceLineVisible:false,priceFormat:{type:'custom',formatter:gpFmt(s1)}});
        lsP.setData(pd.map(r=>({time:r.date,value:+r.value})));
        _maPeriods.forEach((period,pi)=>{
          if(!_maEnabled[period]) return;
          const md=calcMA(s1.data,period).filter(r=>r.date>=_from&&r.date<=_to);
          if(!md.length) return;
          const lm=chart.addLineSeries({color:maCol(pi),lineWidth:1,priceScaleId:'right',lastValueVisible:true,priceLineVisible:false,priceFormat:{type:'custom',formatter:gpFmt(s1)}});
          lm.setData(md.map(r=>({time:r.date,value:+r.value})));
        });
        if(footer) footer.innerHTML=
          `<span style="color:#e2e8f0;font-weight:600">${s1.id}</span> <span style="color:#6b7280">${s1.label}</span> <span style="color:#9ca3af">${s1.frequency} · ${s1.source.toUpperCase()}</span>`+
          _maPeriods.filter(p=>_maEnabled[p]).map((p,pi)=>`<span style="color:${maCol(pi)};padding-left:10px;font-weight:600">${p}d MA</span>`).join('');
      }

      chart.timeScale().fitContent();
      new ResizeObserver(()=>chart.applyOptions({width:chartEl.clientWidth,height:chartEl.clientHeight})).observe(chartEl);
    },0));
  }

  // ── autocomplete factory ──
  function makeAC(key, defaultId, ph){
    return {
      html:`<span class="gp-ac" id="gp-acw${key}-${wid}"><input class="gp-ac-inp" id="gp-aci${key}-${wid}" autocomplete="off" spellcheck="false" placeholder="${ph||'Search…'}"><div class="gp-ac-dd" id="gp-acd${key}-${wid}"></div></span>`,
      wire(onChange){
        const inp=document.getElementById(`gp-aci${key}-${wid}`);
        const dd =document.getElementById(`gp-acd${key}-${wid}`);
        let _val=defaultId||'',_items=[],_hi=-1;
        function lbl(id){const f=GP_FLAT.find(x=>x.id===id);return f?f.id+' · '+f.label:id;}
        function display(){inp.value=_val?lbl(_val):'';}
        display();
        function filter(q){
          if(!q) return GP_FLAT;
          const ql=q.toLowerCase();
          return GP_FLAT.map(x=>({...x,sc:x.id.toLowerCase().startsWith(ql)?0:x.id.toLowerCase().includes(ql)?1:x.label.toLowerCase().includes(ql)?2:99})).filter(x=>x.sc<99).sort((a,b)=>a.sc-b.sc);
        }
        function renderDD(items){
          _items=items;_hi=-1;
          if(!items.length){dd.innerHTML='<div class="gp-ac-none">No match — press Enter to use as custom ID</div>';}
          else{
            let h='',lg=null;
            items.forEach((it,i)=>{if(it.group!==lg){h+=`<div class="gp-ac-grp">${it.group}</div>`;lg=it.group;}h+=`<div class="gp-ac-it" data-i="${i}"><span class="gp-ac-id">${it.id}</span><span class="gp-ac-lb">${it.label}</span></div>`;});
            dd.innerHTML=h;
            dd.querySelectorAll('.gp-ac-it').forEach(el=>el.addEventListener('mousedown',e=>{e.preventDefault();commit(_items[+el.dataset.i]);}));
          }
          dd.style.display='block';
        }
        function setHi(i){_hi=i;dd.querySelectorAll('.gp-ac-it').forEach((e,j)=>e.classList.toggle('hi',j===_hi));const h=dd.querySelector('.gp-ac-it.hi');if(h)h.scrollIntoView({block:'nearest'});}
        function commit(item){if(item){_val=item.id;}else{_val='';}display();dd.style.display='none';onChange(_val);}
        function commitRaw(){const v=inp.value.trim().toUpperCase();if(v){_val=v;inp.value=v;dd.style.display='none';onChange(_val);}else{display();dd.style.display='none';}}
        inp.addEventListener('focus',()=>{inp.select();renderDD(filter(''));});
        inp.addEventListener('input',()=>{const q=inp.value;renderDD(filter(q.includes('·')?'':q));});
        inp.addEventListener('keydown',e=>{
          if(e.key==='ArrowDown'){e.preventDefault();setHi(Math.min(_hi+1,_items.length-1));}
          else if(e.key==='ArrowUp'){e.preventDefault();setHi(Math.max(_hi-1,-1));}
          else if(e.key==='Enter'){e.preventDefault();if(_hi>=0&&_items[_hi])commit(_items[_hi]);else if(_items.length===1)commit(_items[0]);else commitRaw();}
          else if(e.key==='Escape'){dd.style.display='none';display();}
          else if(e.key==='Backspace'&&inp.value===''){commit(null);}
        });
        inp.addEventListener('blur',()=>setTimeout(()=>{dd.style.display='none';display();},160));
        return ()=>_val;
      }
    };
  }

  // ── MA row ──
  function rebuildMaRow(){
    const maw=document.getElementById(`gp-mawrap-${wid}`);
    if(!maw) return;
    const togs=_maPeriods.map((p,pi)=>{
      const on=_maEnabled[p];
      return `<span style="display:inline-flex;align-items:center;margin-right:2px">`+
        `<span class="gp-matog${on?' active':''}" data-p="${p}" title="Toggle visibility" style="border-radius:2px 0 0 2px">${p}d</span>`+
        `<span class="gp-ma-rmv" data-p="${p}" style="cursor:pointer;color:#555;font-size:10px;font-weight:700;border:1px solid #252525;border-left:none;border-radius:0 2px 2px 0;padding:2px 5px;line-height:1.3;transition:color .12s,border-color .12s" onmouseover="this.style.color='#f87171';this.style.borderColor='#f87171'" onmouseout="this.style.color='#555';this.style.borderColor='#252525'" title="Remove MA">×</span>`+
        `</span>`;
    }).join('');
    maw.innerHTML=`<span style="font-size:10px;color:var(--dim);margin-right:3px;letter-spacing:.05em">MA</span>${togs}<input id="gp-maadd-${wid}" type="number" min="2" max="999" placeholder="period" style="${inpSty}width:64px;padding:2px 5px;"><span id="gp-maaddbtn-${wid}" style="cursor:pointer;color:var(--orange);font-size:12px;font-weight:700;border:1px solid var(--orange);border-radius:2px;padding:1px 7px;line-height:1.5;transition:opacity .12s;opacity:.7" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.7'">+</span>`;

    maw.querySelectorAll('.gp-matog').forEach(b=>{
      b.addEventListener('click',e=>{
        if(e.target.classList.contains('gp-ma-rmv')) return;
        const p=+b.dataset.p; _maEnabled[p]=!_maEnabled[p]; b.classList.toggle('active',_maEnabled[p]); renderChart();
      });
    });
    maw.querySelectorAll('.gp-ma-rmv').forEach(x=>{
      x.addEventListener('click',e=>{
        e.stopPropagation();
        const p=+x.dataset.p;
        _maPeriods=_maPeriods.filter(v=>v!==p);
        delete _maEnabled[p];
        rebuildMaRow(); renderChart();
      });
    });
    const addI=document.getElementById(`gp-maadd-${wid}`);
    const addB=document.getElementById(`gp-maaddbtn-${wid}`);
    function tryAdd(){
      const v=parseInt(addI.value,10);
      if(!v||v<2||v>999||_maPeriods.includes(v)){addI.value='';return;}
      _maPeriods.push(v); _maPeriods.sort((a,b)=>a-b); _maEnabled[v]=true;
      addI.value=''; rebuildMaRow(); renderChart();
    }
    addB.addEventListener('click',tryAdd);
    addI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();tryAdd();}});
  }

  // ── Series row ──
  function rebuildSeriesRow(){
    const row=document.getElementById(`gp-srow-${wid}`);
    if(!row) return;
    const maxS=_mode==='mas'?1:_mode==='ratio'?2:8;
    while(_seriesIds.length>maxS) _seriesIds.pop();
    const widgets=_seriesIds.map((id,i)=>({key:`k${i}`,id,i,ac:makeAC(`k${i}`,id,i===0?'Search series…':'— none —')}));
    const rmv=`cursor:pointer;color:#444;font-size:13px;padding:0 3px;line-height:1;transition:color .12s`;
    let html=widgets.map(({key,i,ac})=>
      `<span class="gp-slot" style="display:inline-flex;align-items:center;gap:2px">`+
      `<span style="font-size:10px;color:${COLORS[i%COLORS.length]};letter-spacing:.05em;min-width:16px">S${i+1}</span>`+
      ac.html+
      (i>0?`<span class="gp-rmv" data-i="${i}" style="${rmv}" onmouseover="this.style.color='#f87171'" onmouseout="this.style.color='#444'" title="Remove">×</span>`:'')+
      `</span>`
    ).join('');
    if(_seriesIds.length<maxS){
      html+=`<span id="gp-add-${wid}" style="cursor:pointer;color:var(--orange);font-size:13px;font-weight:700;border:1px solid var(--orange);border-radius:3px;padding:2px 9px;line-height:1.4;transition:opacity .12s,background .12s;flex-shrink:0;opacity:.75;letter-spacing:.05em" onmouseover="this.style.opacity='1';this.style.background='rgba(240,140,0,.12)'" onmouseout="this.style.opacity='.75';this.style.background=''" title="Add series">+ ADD</span>`;
    }
    row.innerHTML=html;
    _acGetters={};
    widgets.forEach(({key,i,ac})=>{
      _acGetters[i]=ac.wire(v=>{_seriesIds[i]=v||'';renderChart();});
    });
    row.querySelectorAll('.gp-rmv').forEach(btn=>{
      btn.addEventListener('click',()=>{_seriesIds.splice(+btn.dataset.i,1);rebuildSeriesRow();renderChart();});
    });
    const addBtn=document.getElementById(`gp-add-${wid}`);
    if(addBtn){
      addBtn.addEventListener('click',()=>{
        _seriesIds.push('');
        rebuildSeriesRow();
        const ni=document.getElementById(`gp-acik${_seriesIds.length-1}-${wid}`);
        if(ni) setTimeout(()=>ni.focus(),30);
      });
    }
  }

  // ── mode handler ──
  function applyMode(mode){
    _mode=mode;
    const maw=document.getElementById(`gp-mawrap-${wid}`);
    if(maw) maw.style.display=mode==='mas'?'inline-flex':'none';
    rebuildSeriesRow();
  }

  // ── toolbar HTML ──
  const modeSty=`background:#0a0a0a;border:1px solid #252525;color:var(--orange);font-family:var(--font);font-size:11px;padding:3px 6px;border-radius:2px;outline:none;cursor:pointer;letter-spacing:.06em`;
  const btnSty=`font-size:10px;color:var(--dim);letter-spacing:.08em;cursor:pointer;padding:2px 7px;border:1px solid var(--bdr);border-radius:2px;transition:color .12s,border-color .12s`;
  el.innerHTML=`
    <div style="display:flex;gap:5px;padding:7px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center;flex-wrap:wrap;row-gap:5px">
      <select id="gp-mode-${wid}" style="${modeSty}">
        <option value="overlay">OVERLAY</option>
        <option value="ratio">RATIO</option>
        <option value="mas">MAs</option>
      </select>
      <span style="width:1px;height:14px;background:var(--bdr);margin:0 2px;flex-shrink:0"></span>
      <div id="gp-srow-${wid}" style="display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap"></div>
      <span id="gp-mawrap-${wid}" style="display:none;align-items:center;gap:3px;flex-wrap:wrap"></span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0">
        <span style="font-size:10px;color:#444;letter-spacing:.06em">FROM</span>
        <input id="gp-from-${wid}" type="date" value="${_from}" style="${inpSty}width:116px;">
        <span style="font-size:10px;color:#444;letter-spacing:.06em">TO</span>
        <input id="gp-to-${wid}" type="date" value="${_to}" style="${inpSty}width:116px;">
        <span id="gp-reset-${wid}" style="${btnSty}" onmouseover="this.style.color='var(--orange)';this.style.borderColor='var(--orange)'" onmouseout="this.style.color='var(--dim)';this.style.borderColor='var(--bdr)'">RESET</span>
        <span id="gp-clear-${wid}" style="${btnSty}" onmouseover="this.style.color='#f87171';this.style.borderColor='#f87171'" onmouseout="this.style.color='var(--dim)';this.style.borderColor='var(--bdr)'">CLEAR</span>
      </span>
    </div>
    <div style="flex:1;position:relative;min-height:0">
      <div id="gp-chart-${wid}" style="position:absolute;inset:0"></div>
    </div>
    <div id="gp-footer-${wid}" style="padding:5px 10px;font-size:10px;color:var(--dim);flex-shrink:0;border-top:1px solid var(--bdr);letter-spacing:.05em;display:flex;align-items:center;gap:8px;flex-wrap:wrap"></div>
  `;

  rebuildSeriesRow();
  rebuildMaRow();

  document.getElementById(`gp-mode-${wid}`).addEventListener('change',e=>{applyMode(e.target.value);renderChart();});

  const fromI=document.getElementById(`gp-from-${wid}`);
  const toI  =document.getElementById(`gp-to-${wid}`);
  fromI.addEventListener('change',()=>{_from=fromI.value||_from;renderChart();});
  toI.addEventListener('change',  ()=>{_to  =toI.value  ||_to;  renderChart();});

  document.getElementById(`gp-reset-${wid}`).addEventListener('click',()=>{
    _from=addYrs(-10);_to=today;fromI.value=_from;toI.value=_to;renderChart();
  });
  document.getElementById(`gp-clear-${wid}`).addEventListener('click',()=>{
    _seriesIds=[];
    rebuildSeriesRow();
    destroyChart();
    const footer=document.getElementById(`gp-footer-${wid}`);
    if(footer) footer.innerHTML='';
    const chartEl=document.getElementById(`gp-chart-${wid}`);
    if(chartEl) chartEl.innerHTML='';
  });

  renderChart();
}

// ── PREFERENCES ENGINE (PDF) ──
const PREFS_KEY='kt_prefs_v1';
const PREFS_DEFAULTS={
  font:"'Oxygen Mono', monospace",
  fontSize:13,
  density:'normal',
  scrollW:4,
  orange:'#F08C00',
  green:'#4ade80',
  red:'#f87171',
  amber:'#fbbf24',
  cyan:'#38bdf8',
  winBdrAlpha:18,
  winTopAlpha:75,
  winShadow:'strong',
  bgPreset:'dark',
  chartUp:'#4ade80',
  chartDown:'#f87171',
  sentThresh:5,
};
function loadPrefs(){return{...PREFS_DEFAULTS,...JSON.parse(localStorage.getItem(PREFS_KEY)||'{}')};}
function savePrefs(p){localStorage.setItem(PREFS_KEY,JSON.stringify(p));}
function applyPrefs(p){
  const r=document.documentElement;
  r.style.setProperty('--font',p.font);
  document.body.style.fontSize=p.fontSize+'px';
  r.style.setProperty('--orange',p.orange);
  r.style.setProperty('--green',p.green);
  r.style.setProperty('--red',p.red);
  r.style.setProperty('--amber',p.amber);
  r.style.setProperty('--cyan',p.cyan);
  // Window chrome dynamic style
  let s=document.getElementById('pdf-chrome-style');
  if(!s){s=document.createElement('style');s.id='pdf-chrome-style';document.head.appendChild(s);}
  const shadows={off:'none',soft:'0 4px 20px rgba(0,0,0,.5)',strong:'0 10px 50px rgba(0,0,0,.85)'};
  const bgs={pitch:'#000000',dark:'#0a0a0a',charcoal:'#141414'};
  s.textContent=`.win{border:1px solid rgba(251,191,36,${p.winBdrAlpha/100})!important;box-shadow:${shadows[p.winShadow]}!important;}`+
    `.win-bar{border-top:2px solid rgba(240,140,0,${p.winTopAlpha/100})!important;}`+
    `#desktop,#topbar+*,body{background:${bgs[p.bgPreset]}!important;}#desktop{background:${bgs[p.bgPreset]}!important;}`;
  // Density class
  document.body.classList.remove('density-compact','density-relaxed');
  if(p.density!=='normal')document.body.classList.add(`density-${p.density}`);
  // Scrollbar width
  let sw=document.getElementById('pdf-scroll-style');
  if(!sw){sw=document.createElement('style');sw.id='pdf-scroll-style';document.head.appendChild(sw);}
  sw.textContent=`::-webkit-scrollbar{width:${p.scrollW}px;height:${p.scrollW}px;}`;
  // Chart & sentiment
  window._pdfChartUp=p.chartUp;
  window._pdfChartDown=p.chartDown;
  window._sentThresh=p.sentThresh/100;
}

function doPdf(el,wid){
  // Set up wbody as the flex container (same pattern as doHelp/doEco)
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%;font-family:var(--font);';

  let P=loadPrefs();

  const FONTS=[
    {label:'Oxygen Mono',  val:"'Oxygen Mono', monospace"},
    {label:'JetBrains Mono',val:"'JetBrains Mono', monospace"},
    {label:'IBM Plex Mono',val:"'IBM Plex Mono', monospace"},
  ];
  const ACCENT_PRESETS=['#F08C00','#e67e22','#f59e0b','#38bdf8','#a78bfa','#4ade80','#f87171','#ec4899'];
  const GREEN_PRESETS=['#4ade80','#22c55e','#10b981','#34d399','#86efac','#6ee7b7'];
  const RED_PRESETS  =['#f87171','#ef4444','#dc2626','#fb923c','#fca5a5','#fda4af'];
  const AMBER_PRESETS=['#fbbf24','#f59e0b','#d97706','#fcd34d','#fde68a'];
  const CYAN_PRESETS =['#38bdf8','#0ea5e9','#06b6d4','#67e8f9','#a5f3fc'];

  const SEC='color:#71717a;font-size:8px;letter-spacing:.18em;text-transform:uppercase;padding:10px 0 6px;border-bottom:1px solid #1a1a1a;margin-bottom:14px;display:block;';
  const ROW='display:flex;align-items:center;margin-bottom:12px;gap:10px;';
  const RLBL='color:#a1a1aa;font-size:10px;width:150px;flex-shrink:0;';
  const SEGBASE='cursor:pointer;padding:3px 10px;font-size:9px;border:1px solid #2c2c2c;border-radius:2px;letter-spacing:.08em;font-family:var(--font);background:transparent;transition:color .1s,border-color .1s;outline:none;';
  const SEGI=SEGBASE+'color:#555;';
  const SEGA=SEGBASE+'color:var(--amber);border-color:var(--amber);';

  function swatchRow(presets,current,cssVar){
    const spans=presets.map(c=>{
      const active=c.toLowerCase()===current.toLowerCase();
      return `<span data-sw="${cssVar}" data-val="${c}" title="${c}" style="display:inline-block;width:22px;height:22px;border-radius:3px;background:${c};cursor:pointer;margin-right:4px;border:2px solid ${active?'#fff':'transparent'};flex-shrink:0;"></span>`;
    }).join('');
    return spans+`<input type="color" data-sw="${cssVar}" value="${current}" title="Custom" style="width:22px;height:22px;border:1px solid #333;border-radius:3px;background:#111;cursor:pointer;padding:1px;margin-left:2px;vertical-align:middle;">`;
  }

  function seg(opts,current,action){
    return opts.map(o=>`<button data-seg-val="${o}" data-seg-action="${action}" style="${o===current?SEGA:SEGI}">${o.toUpperCase()}</button>`).join('');
  }

  function tabContent(tab){
    if(tab==='DISPLAY') return `
      <span style="${SEC}">TYPOGRAPHY</span>
      <div style="${ROW}"><span style="${RLBL}">Font Family</span><div style="display:flex;gap:6px;">
        ${FONTS.map(f=>`<button data-seg-val="${f.val}" data-seg-action="font" style="${P.font===f.val?SEGA:SEGI}">${f.label}</button>`).join('')}
      </div></div>
      <div style="${ROW}"><span style="${RLBL}">Base Font Size</span>
        <input type="range" min="11" max="15" step="0.5" value="${P.fontSize}" data-rng="fontSize" style="width:160px;accent-color:var(--amber);">
        <span data-lbl="fontSize" style="color:#a1a1aa;font-size:10px;width:36px;">${P.fontSize}px</span>
      </div>
      <span style="${SEC}">DATA DENSITY</span>
      <div style="${ROW}"><span style="${RLBL}">Table Density</span>${seg(['compact','normal','relaxed'],P.density,'density')}</div>
      <div style="${ROW}"><span style="${RLBL}">Scrollbar Width</span>${seg(['2','4','6'],String(P.scrollW),'scrollW')}
        <span style="color:#555;font-size:9px;margin-left:4px;">px</span>
      </div>`;

    if(tab==='COLORS') return `
      <span style="${SEC}">ACCENT & THEME</span>
      <div style="${ROW}"><span style="${RLBL}">Primary Accent</span>${swatchRow(ACCENT_PRESETS,P.orange,'orange')}</div>
      <div style="${ROW}"><span style="${RLBL}">Secondary Accent</span>${swatchRow(CYAN_PRESETS,P.cyan,'cyan')}</div>
      <span style="${SEC}">DIRECTIONAL INDICATORS</span>
      <div style="${ROW}"><span style="${RLBL}">Up / Gain</span>${swatchRow(GREEN_PRESETS,P.green,'green')}</div>
      <div style="${ROW}"><span style="${RLBL}">Down / Loss</span>${swatchRow(RED_PRESETS,P.red,'red')}</div>
      <div style="${ROW}"><span style="${RLBL}">Neutral / Flat</span>${swatchRow(AMBER_PRESETS,P.amber,'amber')}</div>`;

    if(tab==='WINDOWS') return `
      <span style="${SEC}">WINDOW CHROME</span>
      <div style="${ROW}"><span style="${RLBL}">Border Opacity</span>
        <input type="range" min="0" max="40" step="2" value="${P.winBdrAlpha}" data-rng="winBdrAlpha" style="width:160px;accent-color:var(--amber);">
        <span data-lbl="winBdrAlpha" style="color:#a1a1aa;font-size:10px;width:36px;">${P.winBdrAlpha}%</span>
      </div>
      <div style="${ROW}"><span style="${RLBL}">Titlebar Accent</span>
        <input type="range" min="20" max="100" step="5" value="${P.winTopAlpha}" data-rng="winTopAlpha" style="width:160px;accent-color:var(--amber);">
        <span data-lbl="winTopAlpha" style="color:#a1a1aa;font-size:10px;width:36px;">${P.winTopAlpha}%</span>
      </div>
      <div style="${ROW}"><span style="${RLBL}">Drop Shadow</span>${seg(['off','soft','strong'],P.winShadow,'winShadow')}</div>
      <span style="${SEC}">BACKGROUND</span>
      <div style="${ROW}"><span style="${RLBL}">Desktop</span>${seg(['pitch','dark','charcoal'],P.bgPreset,'bgPreset')}</div>`;

    if(tab==='CHARTS') return `
      <span style="${SEC}">CANDLESTICK COLORS</span>
      <p style="color:#555;font-size:9px;letter-spacing:.05em;margin-bottom:14px;">Changes apply to new charts opened after saving.</p>
      <div style="${ROW}"><span style="${RLBL}">Candle Up</span>${swatchRow(GREEN_PRESETS,P.chartUp,'chartUp')}</div>
      <div style="${ROW}"><span style="${RLBL}">Candle Down</span>${swatchRow(RED_PRESETS,P.chartDown,'chartDown')}</div>
      <span style="${SEC}">SENTIMENT THRESHOLD</span>
      <div style="${ROW}"><span style="${RLBL}">Up/Down Threshold</span>
        <input type="range" min="0.5" max="10" step="0.5" value="${P.sentThresh}" data-rng="sentThresh" style="width:160px;accent-color:var(--amber);">
        <span data-lbl="sentThresh" style="color:#a1a1aa;font-size:10px;width:36px;">${P.sentThresh}%</span>
      </div>
      <p style="color:#555;font-size:9px;letter-spacing:.05em;margin-top:4px;">Prices within &plusmn;${P.sentThresh}% of zero shown as neutral.</p>`;

    return '';
  }

  let activeTab='DISPLAY';
  const TABS=['DISPLAY','COLORS','WINDOWS','CHARTS'];
  const TABBAR_STYLE='display:flex;align-items:center;border-bottom:1px solid #1a1a1a;padding:0 14px;flex-shrink:0;background:#0a0a0a;';
  const FOOTER_STYLE='display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:8px 14px;border-top:1px solid #1a1a1a;flex-shrink:0;background:#0a0a0a;';

  function render(){
    const tabBar=TABS.map(t=>`<button data-tab="${t}" style="${t===activeTab?
      'cursor:pointer;padding:5px 14px;font-size:9px;border:none;border-bottom:2px solid var(--amber);background:transparent;color:var(--amber);letter-spacing:.1em;font-family:var(--font);outline:none;':
      'cursor:pointer;padding:5px 14px;font-size:9px;border:none;border-bottom:2px solid transparent;background:transparent;color:#555;letter-spacing:.1em;font-family:var(--font);outline:none;'
    }">${t}</button>`).join('');

    // Write directly into el (the wbody) — no outer wrapper div needed
    el.innerHTML=
      `<div style="${TABBAR_STYLE}">${tabBar}<div style="flex:1;"></div>`+
      `<button data-pdf-reset style="cursor:pointer;padding:3px 10px;font-size:9px;border:1px solid #2c2c2c;border-radius:2px;background:transparent;color:#555;letter-spacing:.08em;font-family:var(--font);outline:none;">RESET DEFAULTS</button></div>`+
      `<div style="flex:1;overflow-y:auto;padding:18px 20px;">${tabContent(activeTab)}</div>`+
      `<div style="${FOOTER_STYLE}"><span style="color:#555;font-size:9px;letter-spacing:.05em;">Changes apply immediately — click SAVE to persist.</span>`+
      `<button data-pdf-save style="cursor:pointer;padding:4px 16px;font-size:9px;border:1px solid var(--amber);border-radius:2px;background:transparent;color:var(--amber);letter-spacing:.1em;font-family:var(--font);outline:none;">SAVE</button></div>`;

    // Tab switching
    el.querySelectorAll('[data-tab]').forEach(btn=>{
      btn.addEventListener('click',()=>{activeTab=btn.dataset.tab;render();});
    });

    // Segmented controls & font buttons
    el.querySelectorAll('[data-seg-action]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const action=btn.dataset.segAction;
        const val=btn.dataset.segVal;
        if(action==='font')          P.font=val;
        else if(action==='density')  P.density=val;
        else if(action==='scrollW')  P.scrollW=parseInt(val);
        else if(action==='winShadow')P.winShadow=val;
        else if(action==='bgPreset') P.bgPreset=val;
        applyPrefs(P);
        render();
      });
    });

    // Range sliders — live update label + apply
    el.querySelectorAll('[data-rng]').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const key=inp.dataset.rng;
        const v=parseFloat(inp.value);
        P[key]=v;
        const suffix=key==='fontSize'?'px':'%';
        const lbl=el.querySelector(`[data-lbl="${key}"]`);
        if(lbl)lbl.textContent=v+suffix;
        applyPrefs(P);
      });
    });

    // Color swatches (spans) and color pickers (inputs)
    el.querySelectorAll('[data-sw]').forEach(sw=>{
      const evt=sw.tagName==='INPUT'?'input':'click';
      sw.addEventListener(evt,()=>{
        const key=sw.dataset.sw;
        P[key]=sw.tagName==='INPUT'?sw.value:sw.dataset.val;
        applyPrefs(P);
        if(sw.tagName!=='INPUT')render();
      });
    });

    // Save & Reset — scoped to el
    el.querySelector('[data-pdf-save]')?.addEventListener('click',()=>{
      savePrefs(P);
      clog('PDF: Preferences saved.','cl-info');
    });
    el.querySelector('[data-pdf-reset]')?.addEventListener('click',()=>{
      P={...PREFS_DEFAULTS};
      applyPrefs(P);
      savePrefs(P);
      render();
      clog('PDF: Reset to defaults.','cl-info');
    });
  }

  render();
}

window._modl = window._modl || {};
async function doModl(el, tk, wid) {
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML = ld(`Building model: ${tk}…`);
  let r;
  try { r = await fetch(`${API}/modl/${tk}`).then(x=>x.json()); }
  catch(e) { el.innerHTML=`<div class="err">Network error: ${e}</div>`; return; }
  if (!r.ok) { el.innerHTML=`<div class="err">${r.error}</div>`; return; }

  let view = 'quarterly'; // 'quarterly' | 'annual'

  // Format helpers
  function fmtNum(v) {
    if (v===null||v===undefined) return '—';
    const abs=Math.abs(v), neg=v<0;
    const str=abs.toFixed(3).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    return neg ? `(${str})` : str;
  }
  function fmtPct(v) { return v===null||v===undefined ? '—' : (v*100).toFixed(1)+'%'; }
  function fmtEps(v) { return v===null||v===undefined ? '—' : (v<0?'-':'')+'$'+Math.abs(v).toFixed(2); }
  function fmtShares(v) { return v===null||v===undefined ? '—' : v.toFixed(3).replace(/\B(?=(\d{3})+(?!\d))/g,','); }

  function cellVal(v, fmt, colType) {
    if (colType==='estimate') return `<td class="est">—</td>`;
    if (v===null||v===undefined) return `<td style="color:var(--dim)">—</td>`;
    let txt, neg=false;
    if      (fmt==='pct')    { txt=fmtPct(v);    neg=v<0; }
    else if (fmt==='eps')    { txt=fmtEps(v);    neg=v<0; }
    else if (fmt==='shares') { txt=fmtShares(v); neg=false; }
    else                     { txt=fmtNum(v);    neg=v<0; }
    const cls=[];
    if (neg)               cls.push('neg');
    if (colType==='annual') cls.push('ann');
    return `<td${cls.length?' class="'+cls.join(' ')+'"':''}>${txt}</td>`;
  }

  function render() {
    // Filter columns and track their original indices into row.values
    const filteredCols = view === 'annual'
      ? r.columns.map((c,i)=>({col:c,idx:i})).filter(({col})=>col.type==='annual')
      : r.columns.map((c,i)=>({col:c,idx:i}));
    const nc = filteredCols.length;

    const thCols = filteredCols.map(({col}) =>
      `<th${col.type==='annual'?' class="ann"':''}>${col.label}</th>`
    ).join('');

    // Frozen (label) column — one td per row, no data cells
    function buildFrozenSection(sec) {
      let html = `<tr class="modl-sec-hdr"><td class="lbl-col">${sec.title}</td></tr>`;
      for (const row of sec.rows) {
        if (row.blank)   { html+=`<tr style="height:4px"><td class="lbl-col"></td></tr>`; continue; }
        if (row.section) { html+=`<tr class="modl-sect"><td class="lbl-col">${row.label}</td></tr>`; continue; }
        html += `<tr${row.bold?' class="modl-bold"':''}><td class="lbl-col">${row.label}</td></tr>`;
      }
      return html;
    }

    // Scrollable data columns — no label cell, empty placeholders keep row heights matched
    function buildScrollSection(sec) {
      let html = `<tr class="modl-sec-hdr"><td colspan="${nc}"></td></tr>`;
      for (const row of sec.rows) {
        if (row.blank)   { html+=`<tr style="height:4px"><td colspan="${nc}"></td></tr>`; continue; }
        if (row.section) { html+=`<tr class="modl-sect"><td colspan="${nc}"></td></tr>`; continue; }
        const cells = filteredCols.map(({col,idx}) => cellVal(row.values[idx], row.fmt, col.type)).join('');
        html += `<tr${row.bold?' class="modl-bold"':''}>${cells}</tr>`;
      }
      return html;
    }

    const toggles = ['quarterly','annual'].map(v=>
      `<button class="sovm-rng${v===view?' active':''}" onclick="window._modl['${wid}'].setView('${v}')">${v.toUpperCase()}</button>`
    ).join('');

    el.innerHTML = `
      <div class="modl-wrap">
        <div class="modl-hdr">
          <span class="modl-hdr-name">${r.name}</span>
          <span class="modl-hdr-sub">${r.ticker} · SEC XBRL · values in millions USD</span>
          <div style="margin-left:auto;display:flex;gap:4px">${toggles}</div>
        </div>
        <div class="modl-body">
          <div class="modl-frozen">
            <table class="modlt">
              <thead><tr><th class="lbl-col"></th></tr></thead>
              <tbody>${r.sections.map(buildFrozenSection).join('')}</tbody>
            </table>
          </div>
          <div class="modl-scroll">
            <table class="modlt">
              <thead><tr>${thCols}</tr></thead>
              <tbody>${r.sections.map(buildScrollSection).join('')}</tbody>
            </table>
          </div>
        </div>
      </div>
    `;

    // Sync vertical scroll from data div → frozen label div
    const scrollDiv = el.querySelector('.modl-scroll');
    const frozenDiv = el.querySelector('.modl-frozen');
    if (scrollDiv && frozenDiv) {
      scrollDiv.addEventListener('scroll', () => {
        frozenDiv.scrollTop = scrollDiv.scrollTop;
      }, { passive: true });
    }
  }

  window._modl[wid] = {
    setView(v) { view=v; render(); }
  };
  render();
}

window._sovm = window._sovm || {};

async function doSOVM(el, country, wid) {
  el.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;height:100%';
  const code = (country || 'US').toUpperCase();
  window._sovm[wid] = { range: '3M', data: null, load: null, setRange: null };

  function buildSparkline(pts) {
    if (!pts || pts.length < 2) return '<span class="sovm-dim">—</span>';
    const W=56, H=16, mn=Math.min(...pts), mx=Math.max(...pts), rng=mx-mn||0.001;
    const coords = pts.map((v,i)=>`${((i/(pts.length-1))*W).toFixed(1)},${(H-((v-mn)/rng)*H).toFixed(1)}`).join(' ');
    const col = pts[pts.length-1] >= pts[0] ? 'var(--red)' : 'var(--green)';
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${coords}" fill="none" stroke="${col}" stroke-width="1.2" stroke-linejoin="round"/></svg>`;
  }

  function buildBar(cur, lo, hi, avg) {
    if (lo==null||hi==null) return '<span class="sovm-dim">—</span>';
    const W=72, rng=hi-lo||0.001;
    const cp = Math.max(3, Math.min(W-3, ((cur-lo)/rng)*W));
    const ap = avg!=null ? Math.max(1, Math.min(W-1, ((avg-lo)/rng)*W)) : null;
    let s = `<rect x="0" y="6" width="${W}" height="3" rx="1.5" fill="var(--bg3)"/>`;
    if (ap!=null) s += `<polygon points="${ap.toFixed(1)},2 ${(ap-3.5).toFixed(1)},12 ${(ap+3.5).toFixed(1)},12" fill="var(--amber)"/>`;
    s += `<circle cx="${cp.toFixed(1)}" cy="7.5" r="3.8" fill="var(--cyan)" opacity="0.9"/>`;
    return `<svg width="${W}" height="16" viewBox="0 0 ${W} 16">${s}</svg>`;
  }

  function sdCell(v) {
    if (v==null) return '<span class="sovm-dim">—</span>';
    const s = (v>0?'+':'')+v.toFixed(2);
    if (Math.abs(v) >= 2)   return `<span class="sovm-up">${s}</span>`;
    if (Math.abs(v) >= 1.5) return `<span style="color:var(--amber)">${s}</span>`;
    return `<span class="sovm-dim">${s}</span>`;
  }

  function rsiCell(v) {
    if (v==null) return `<td class="sovm-n sovm-dim">—</td>`;
    const s = v.toFixed(1);
    if (v >= 70) return `<td class="sovm-n sovm-hi">${s}</td>`;
    if (v <= 30) return `<td class="sovm-n sovm-lo">${s}</td>`;
    return `<td class="sovm-n sovm-dim">${s}</td>`;
  }

  function buildRow(row, range) {
    const isBps = row.unit === 'bps';
    const st = row.stats?.[range] || {};
    const cur = isBps ? (row.current>=0?'+':'')+row.current.toFixed(1) : row.current.toFixed(3);
    const chg = st.chg_bps;
    const chgS = chg!=null ? (chg>0?'+':'')+chg.toFixed(1) : '—';
    const chgCls = chg>0 ? 'sovm-up' : chg<0 ? 'sovm-dn' : 'sovm-dim';
    const diff = st.diff_bps;
    const diffS = diff!=null ? (diff>0?'+':'')+diff.toFixed(1) : '—';
    const diffCls = diff>0 ? 'sovm-up' : diff<0 ? 'sovm-dn' : 'sovm-dim';
    const fmt = (v) => v!=null ? (isBps ? v.toFixed(1) : v.toFixed(3)) : '—';
    const rowId = `sovm-r-${wid}-${row.label.replace(/[^a-z0-9]/gi,'')}`;
    return `<tr class="sovm-row" id="${rowId}">
      <td>${row.label}</td>
      <td class="sovm-n">${cur}</td>
      <td class="sovm-n ${chgCls}">${chgS}</td>
      <td class="sovm-c">${buildSparkline(row.sparkline)}</td>
      <td class="sovm-n">${sdCell(st.sd_day)}</td>
      <td class="sovm-n sovm-dim">${fmt(st.low)}</td>
      <td class="sovm-c">${buildBar(row.current, st.low, st.high, st.avg)}</td>
      <td class="sovm-n sovm-dim">${fmt(st.high)}</td>
      <td class="sovm-n sovm-dim">${fmt(st.avg)}</td>
      <td class="sovm-n ${diffCls}">${diffS}</td>
      <td class="sovm-n">${sdCell(st.sd_from_avg)}</td>
      ${rsiCell(row.rsi)}
    </tr>`;
  }

  function buildTable(d, range) {
    const hdr = `<tr>
      <th style="text-align:left;min-width:110px">Security</th>
      <th>Yield</th><th>Chg</th><th style="text-align:center">~~~</th>
      <th title="Std devs of today's daily move (${range} window)">#SDΔ/d</th>
      <th>Low</th><th style="text-align:center;min-width:80px">Range (${range})</th>
      <th>High</th><th>Avg</th><th>+/- bps</th>
      <th title="Std devs from ${range} average">#SD</th><th>RSI</th>
    </tr>`;
    const sect = (t) => `<tr class="sovm-sect"><td colspan="12">${t}</td></tr>`;
    const na   = (t) => `<tr class="sovm-row"><td colspan="12" class="sovm-na">${t}</td></tr>`;
    let body = '';
    if (d.benchmarks?.length)  { body += sect('── BENCHMARKS');            body += d.benchmarks.map(r=>buildRow(r,range)).join(''); }
    if (d.curves?.length)      { body += sect('── CURVES (bps)');           body += d.curves.map(r=>buildRow(r,range)).join(''); }
    if (d.butterflies?.length) { body += sect('── BUTTERFLIES (bps)');      body += d.butterflies.map(r=>buildRow(r,range)).join(''); }
    body += sect('── INFLATION');
    body += d.inflation?.length ? d.inflation.map(r=>buildRow(r,range)).join('') : na('TIPS breakeven — premium data required');
    body += sect('── CDS SPREAD');
    body += d.cds?.length ? d.cds.map(r=>buildRow(r,range)).join('') : na('CDS data — premium data required');
    return `<table class="sovmt"><thead>${hdr}</thead><tbody>${body}</tbody></table>`;
  }

  function render() {
    const d = window._sovm[wid].data;
    if (!d) return;
    const range = window._sovm[wid].range;
    const COUNTRIES = ['US','DE','GB','JP','FR','IT','ES','CA','AU','CN','CH'];
    const copts = COUNTRIES.map(c=>`<option value="${c}" ${c===d.country?'selected':''}>${c}${c===d.country?' '+d.flag:''}</option>`).join('');
    const rngs  = ['1M','3M','6M','1Y'].map(r=>`<button class="sovm-rng ${r===range?'active':''}" onclick="window._sovm['${wid}'].setRange('${r}')">${r}</button>`).join('');
    const rCls  = d.rating?.startsWith('AAA')?'rAAA':d.rating?.startsWith('AA')?'rAAm':d.rating?.startsWith('BBB')?'rBBB':'rBBp';
    el.innerHTML = `
      <div class="sovm-topbar">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <select class="sovm-sel" onchange="window._sovm['${wid}'].load(this.value)">${copts}</select>
          <span style="font-size:14px">${d.flag}</span>
          <span style="color:var(--text);font-size:11px;font-weight:600">${d.name}</span>
          <span class="rating-badge ${rCls}">${d.rating}</span>
          ${d.debt_gdp!=null?`<span class="sovm-dim" style="font-size:9px">Debt/GDP <span style="color:var(--amber)">${d.debt_gdp}%</span></span>`:''}
          <span class="sovm-dim" style="font-size:9px">${d.currency}</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="sovm-dim" style="font-size:9px;margin-right:4px">RANGE</span>
          ${rngs}
          <span class="sovm-dim" style="font-size:9px;margin-left:10px">${d.ts?d.ts.substring(0,10):''}</span>
          <span class="sovm-dim" style="font-size:9px;margin-left:6px">↻ <span id="sovm-cd-${wid}">5m00s</span></span>
        </div>
      </div>
      <div class="sovm-body">${buildTable(d, range)}</div>
    `;
  }

  function flashRows(oldData, newData) {
    const allSections = ['benchmarks','curves','butterflies'];
    const oldMap = {};
    for (const sec of allSections)
      for (const row of (oldData[sec]||[])) oldMap[row.label] = row.current;
    for (const sec of allSections) {
      for (const row of (newData[sec]||[])) {
        const prev = oldMap[row.label];
        if (prev == null || row.current === prev) continue;
        const rowEl = document.getElementById(`sovm-r-${wid}-${row.label.replace(/[^a-z0-9]/gi,'')}`);
        if (!rowEl) continue;
        rowEl.classList.remove('flash-up','flash-dn');
        void rowEl.offsetWidth;
        // Yield up = bad (red = flash-dn), yield down = good (green = flash-up)
        rowEl.classList.add(row.current > prev ? 'flash-dn' : 'flash-up');
        setTimeout(()=>rowEl.classList.remove('flash-up','flash-dn'), 800);
      }
    }
  }

  async function load(c) {
    const prevData = window._sovm[wid].data;
    const isRefresh = !!prevData && prevData.country === c;
    const body = el.querySelector('.sovm-body');
    if (!isRefresh) {
      if (body) body.innerHTML = ld(`Loading ${c}…`);
      else el.innerHTML = ld(`Loading SOVM · ${c}…`);
    }
    try {
      const r = await fetch(`${API}/sovm/${c}`).then(x=>x.json());
      if (!r.ok) { el.innerHTML = `<div class="err">${r.error}</div>`; return; }
      window._sovm[wid].data = r;
      render();
      if (isRefresh) flashRows(prevData, r);
    } catch(e) { el.innerHTML = `<div class="err">Backend offline.<br>${e}</div>`; }
  }

  window._sovm[wid].load     = load;
  window._sovm[wid].setRange = function(r) {
    window._sovm[wid].range = r;
    render();
  };

  await load(code);

  // ── Auto-refresh: 1-second tick, reload every 5 min ──────────────────
  const REFRESH_SECS = 300;
  let countdown = REFRESH_SECS;
  ftimers[wid] = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      countdown = REFRESH_SECS;
      load((window._sovm[wid].data?.country) || code);
    }
    const cd = document.getElementById(`sovm-cd-${wid}`);
    if (cd) cd.textContent = `${Math.floor(countdown/60)}m${String(countdown%60).padStart(2,'0')}s`;
  }, 1000);
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
applyPrefs(loadPrefs());
function boot(){
  // Open QM on the left — wider to accommodate more columns
  openQM();
  const qmEl=document.getElementById(qmWinId);
  if(qmEl){qmEl.style.left='10px';qmEl.style.top='10px';qmEl.style.width='560px';qmEl.style.height='480px';}

  // Lay out FOCUS cards on the right, like the screenshot
  const desk=document.getElementById('desktop');
  const dw=desk.clientWidth;
  const cards=['EWY','LTH','SPY','AENA','LYFT'];
  const cx=dw-270;
  cards.forEach((sym,i)=>{
    const wid=ow('foc',sym,`FOCUS · ${sym}`,260,110,(e,tk,id)=>doFocus(e,tk,id));
    const el=document.getElementById(wid);
    if(el){el.style.left=cx+'px';el.style.top=(10+i*112)+'px';el.style.width='260px';el.style.height='110px';}
  });
}
requestAnimationFrame(()=>requestAnimationFrame(boot));
</script>
