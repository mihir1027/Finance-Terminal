// ── MACRO ──
async function doMacro(el,wid){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld('Fetching FRED macroeconomic data…');
  let _d=null, tab='overview';
  const _lw={};  // Lightweight Charts instances keyed by container id
  // date filter state — default: 10 years back to today
  const today=new Date().toISOString().slice(0,10);
  function addYears(iso,n){const d=new Date(iso+'T12:00');d.setFullYear(d.getFullYear()+n);return d.toISOString().slice(0,10);}
  let _from=addYears(today,-10), _to=today;

  // ── data helpers ──
  const last  =arr=>arr?.length?arr[arr.length-1]:null;
  const prev  =(arr,n=1)=>arr?.length>n?arr[arr.length-1-n]:null;
  const fPct  =(v,d=2)=>v!=null?v.toFixed(d)+'%':'—';
  const fNum  =(v,d=0,suf='')=>v!=null?v.toLocaleString('en-US',{maximumFractionDigits:d})+suf:'—';
  const delta =arr=>(!arr||arr.length<2)?null:arr[arr.length-1].value-arr[arr.length-2].value;
  const mom   =arr=>{if(!arr||arr.length<2)return null;const c=arr[arr.length-1].value,p=arr[arr.length-2].value;return((c-p)/Math.abs(p))*100;};
  const yoy   =arr=>{if(!arr||arr.length<13)return null;const c=arr[arr.length-1].value,a=arr[arr.length-13].value;return((c-a)/Math.abs(a))*100;};
  const buildYoy=arr=>arr.slice(13).map((r,i)=>({date:r.date,value:((r.value-arr[i].value)/Math.abs(arr[i].value))*100}));
  const byDate =arr=>(arr||[]).filter(r=>r.date>=_from&&r.date<=_to);
  const chgPill=(v,inv=false)=>{
    if(v==null)return'<span style="color:#444">—</span>';
    const pos=inv?v<0:v>0;
    return`<span style="color:${pos?'#4ade80':'#f87171'}">${v>0?'▲':'▼'} ${v>0?'+':''}${v.toFixed(2)}</span>`;
  };
  const kpi=(label,val,sub,src,date)=>`
    <div class="mac-kpi">
      <div class="mk-l">${label}</div>
      <div class="mk-v">${val}</div>
      <div class="mk-d">${sub}</div>
      <div class="mac-src">FRED · ${src} · ${date}</div>
    </div>`;

  // ── Lightweight Charts helpers ──
  function lwKillAll(){
    Object.keys(_lw).forEach(id=>{try{_lw[id].remove();}catch(e){}delete _lw[id];});
  }
  function lwBase(el){
    return{
      width:el.clientWidth||400, height:el.clientHeight||200,
      layout:{background:{type:'solid',color:'#020202'},textColor:'#888',fontSize:10,fontFamily:"'JetBrains Mono',monospace"},
      grid:{vertLines:{color:'#0e0e0e'},horzLines:{color:'#111111'}},
      timeScale:{borderColor:'#1e1e1e',timeVisible:false,fixLeftEdge:true,fixRightEdge:true},
      rightPriceScale:{borderColor:'#1e1e1e',scaleMargins:{top:0.12,bottom:0.12}},
      crosshair:{vertLine:{color:'#2a2a2a',labelBackgroundColor:'#111'},horzLine:{color:'#2a2a2a',labelBackgroundColor:'#111'}},
      handleScroll:false,handleScale:false,
    };
  }
  function pctFmt(d=2){return{type:'custom',formatter:p=>(+p).toFixed(d)+'%'};}
  function numFmt(suf='',d=0){return{type:'custom',formatter:p=>(+p).toFixed(d)+suf};}

  function mkArea(id,data,color,fmt){
    const el=document.getElementById(id); if(!el||!data?.length)return;
    requestAnimationFrame(()=>setTimeout(()=>{
      const chart=LightweightCharts.createChart(el,lwBase(el));
      const s=chart.addAreaSeries({lineColor:color,topColor:color+'28',bottomColor:color+'04',lineWidth:2,lastValueVisible:true,priceLineVisible:false,...(fmt?{priceFormat:fmt}:{})});
      s.setData(data.map(r=>({time:r.date,value:+r.value})));
      chart.timeScale().fitContent();
      _lw[id]=chart;
      new ResizeObserver(()=>chart.applyOptions({width:el.clientWidth,height:el.clientHeight})).observe(el);
    },0));
  }

  function mkHistogram(id,data,fmt){
    const el=document.getElementById(id); if(!el||!data?.length)return;
    requestAnimationFrame(()=>setTimeout(()=>{
      const chart=LightweightCharts.createChart(el,lwBase(el));
      const s=chart.addHistogramSeries({priceLineVisible:false,lastValueVisible:true,...(fmt?{priceFormat:fmt}:{})});
      s.setData(data.map(r=>({time:r.date,value:+r.value,color:+r.value>=0?'rgba(74,222,128,0.75)':'rgba(248,113,113,0.75)'})));
      chart.timeScale().fitContent();
      _lw[id]=chart;
      new ResizeObserver(()=>chart.applyOptions({width:el.clientWidth,height:el.clientHeight})).observe(el);
    },0));
  }

  function mkLines(id,seriesList,fmt){
    const el=document.getElementById(id); if(!el||!seriesList?.length)return;
    requestAnimationFrame(()=>setTimeout(()=>{
      const chart=LightweightCharts.createChart(el,lwBase(el));
      seriesList.forEach(s=>{
        const ls=chart.addLineSeries({color:s.color,lineWidth:s.w||2,lineStyle:s.dash?2:0,lastValueVisible:true,priceLineVisible:false,...(fmt?{priceFormat:fmt}:{})});
        ls.setData((s.data||[]).map(r=>({time:r.date,value:+r.value})));
      });
      chart.timeScale().fitContent();
      _lw[id]=chart;
      new ResizeObserver(()=>chart.applyOptions({width:el.clientWidth,height:el.clientHeight})).observe(el);
    },0));
  }

  // ── layout helpers ──
  const cTitle=(t)=>`<div style="font-size:11px;color:#bbb;letter-spacing:.1em;padding:5px 6px 7px;flex-shrink:0;text-transform:uppercase;border-bottom:1px solid #222;margin-bottom:4px;font-weight:600">${t}</div>`;
  const cBox  =id=>`<div style="flex:1;position:relative;min-height:0"><div id="${id}" style="position:absolute;inset:0"></div></div>`;
  const cWrap =(id,title)=>`<div style="display:flex;flex-direction:column;flex:1;min-width:0;min-height:0">${cTitle(title)}${cBox(id)}</div>`;
  const lgnd  =items=>`<div style="display:flex;gap:16px;padding:0 4px 5px;flex-shrink:0">${items.map(([l,c])=>`<span style="font-size:10px;color:${c};letter-spacing:.06em">${l}</span>`).join('')}</div>`;

  // ── tab renderers ──
  function renderOverview(){
    const b=document.getElementById('mac-body-'+wid);if(!b)return;
    const gdpR=last(_d.gdpReal),unrL=last(_d.unrate),ffL=last(_d.fedFunds),cpiYoy=yoy(_d.cpi);
    b.innerHTML=`
      <div style="display:flex;gap:6px;padding:10px;flex-shrink:0;flex-wrap:wrap">
        ${kpi('REAL GDP GROWTH',gdpR?fPct(gdpR.value):'—',chgPill(delta(_d.gdpReal))+' vs prior qtr','A191RL1Q225SBEA',gdpR?.date||'—')}
        ${kpi('UNEMPLOYMENT',unrL?fPct(unrL.value):'—',chgPill(mom(_d.unrate),true)+' MoM','UNRATE',unrL?.date||'—')}
        ${kpi('CPI YoY',cpiYoy!=null?fPct(cpiYoy):'—','Headline inflation','CPIAUCSL',last(_d.cpi)?.date||'—')}
        ${kpi('FED FUNDS',ffL?fPct(ffL.value):'—',chgPill(delta(_d.fedFunds))+' MoM','FEDFUNDS',ffL?.date||'—')}
      </div>
      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;padding:0 10px 10px;min-height:0">
        ${cWrap('mac-ov-gdp-'+wid,'REAL GDP GROWTH  ·  QoQ ANNUALIZED  (A191RL1Q225SBEA)')}
        ${cWrap('mac-ov-unr-'+wid,'UNEMPLOYMENT RATE  (UNRATE)')}
        ${cWrap('mac-ov-cpi-'+wid,'CPI  ·  YoY %  (CPIAUCSL)')}
        ${cWrap('mac-ov-ff-'+wid,'FED FUNDS RATE  (FEDFUNDS)')}
      </div>`;
    mkHistogram('mac-ov-gdp-'+wid,byDate(_d.gdpReal),pctFmt(1));
    mkArea('mac-ov-unr-'+wid,byDate(_d.unrate),'#fbbf24',pctFmt(1));
    mkArea('mac-ov-cpi-'+wid,byDate(buildYoy(_d.cpi||[])),'#38bdf8',pctFmt(1));
    mkArea('mac-ov-ff-'+wid,byDate(_d.fedFunds),'#a78bfa',pctFmt(2));
  }

  function renderGrowth(){
    const b=document.getElementById('mac-body-'+wid);if(!b)return;

      </div>
      <div style="flex:1;display:flex;gap:10px;padding:0 10px 10px;min-height:0">
        ${cWrap('mac-gr-gdp-'+wid,'REAL GDP GROWTH  ·  QoQ ANNUALIZED  (A191RL1Q225SBEA)')}
        ${cWrap('mac-gr-pay-'+wid,'NONFARM PAYROLLS  ·  MoM CHANGE  THOUSANDS  (PAYEMS)')}
      </div>`;

    const payDiff=pays.slice(1).map((r,i)=>({date:r.date,value:r.value-pays[i].value}));

  function renderLabor(){

    const icsaChg=icsaL&&prev(_d.icsa)?icsaL.value-prev(_d.icsa).value:null;

      </div>
      <div style="flex:1;display:flex;gap:10px;padding:0 10px 10px;min-height:0">
        <div style="flex:1;display:flex;flex-direction:column;min-width:0;min-height:0">
          ${cTitle('UNEMPLOYMENT + PARTICIPATION RATE  (UNRATE / CIVPART)')}
          ${lgnd([['── UNRATE','#fbbf24'],['── CIVPART','#38bdf8']])}
          ${cBox('mac-lb-unr-'+wid)}
        </div>
        ${cWrap('mac-lb-icsa-'+wid,'INITIAL JOBLESS CLAIMS  ·  WEEKLY  (ICSA)')}
      </div>`;
    mkLines('mac-lb-unr-'+wid,[{data:byDate(_d.unrate),color:'#fbbf24',w:2},{data:byDate(_d.civpart),color:'#38bdf8',w:1.5,dash:true}],pctFmt(1));
    mkArea('mac-lb-icsa-'+wid,byDate((_d.icsa||[]).map(r=>({date:r.date,value:r.value/1000}))),'#a78bfa',numFmt('K',0));

  function renderInflation(){
    const b=document.getElementById('mac-body-'+wid);if(!b)return;
    const cpiYS=buildYoy(_d.cpi||[]),coreYS=buildYoy(_d.coreCpi||[]);

    const cpiN=last(cpiYS),coreN=last(coreYS),pceN=last(pceYS),corePceN=last(corePYS),ppiN=last(ppiYS);

      <div style="display:flex;gap:6px;padding:10px;flex-shrink:0;flex-wrap:wrap">
        ${kpi('CPI YoY',fPct(cpiN?.value),'Core: '+fPct(coreN?.value),'CPIAUCSL',cpiN?.date||'—')}
        ${kpi('PCE YoY',fPct(pceN?.value),'Core PCE: '+fPct(corePceN?.value),'PCEPI',pceN?.date||'—')}
        ${kpi('PPI YoY',fPct(ppiN?.value),'All commodities','PPIACO',ppiN?.date||'—')}
        ${kpi('CORE PCE',fPct(corePceN?.value),'<span style="color:#555">Fed target: 2.0%</span>','PCEPILFE',corePceN?.date||'—')}
      </div>
      <div style="flex:1;display:flex;gap:10px;padding:0 10px 10px;min-height:0">
        <div style="flex:1.5;display:flex;flex-direction:column;min-width:0;min-height:0">
          ${cTitle('CPI / CORE CPI / PCE / CORE PCE  ·  YoY %')}
          ${lgnd([['── CPI','#f87171'],['── Core CPI','#fbbf24'],['── PCE','#4ade80'],['── Core PCE','#38bdf8']])}
          ${cBox('mac-inf-cpi-'+wid)}
        </div>
        ${cWrap('mac-inf-ppi-'+wid,'PPI YoY %  ·  ALL COMMODITIES  (PPIACO)')}

  function buildShell(){
    const tabs=[{k:'overview',l:'OVERVIEW'},{k:'growth',l:'GROWTH'},{k:'labor',l:'LABOR'},{k:'inflation',l:'INFLATION'},{k:'rates',l:'RATES'},{k:'credit',l:'CREDIT'}];
    const inpSty=`background:#0a0a0a;border:1px solid #252525;color:#ccc;font-family:var(--font);font-size:10px;padding:2px 6px;border-radius:2px;outline:none;width:100px;`;

      <div style="display:flex;gap:3px;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center;flex-wrap:wrap;row-gap:4px">
        ${tabs.map(t=>`<span class="mac-tab${t.k===tab?' active':''}" data-k="${t.k}">${t.l}</span>`).join('')}

          <input id="mac-to-${wid}" type="date" value="${_to}" style="${inpSty}">

    el.querySelectorAll('.mac-tab').forEach(t=>t.addEventListener('click',()=>{
      lwKillAll();
      tab=t.dataset.k;
      el.querySelectorAll('.mac-tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      render();
    }));
    function applyDates(){
      const f=document.getElementById('mac-from-'+wid),t2=document.getElementById('mac-to-'+wid);
      if(!f||!t2)return;
      _from=f.value||_from; _to=t2.value||_to;

    document.getElementById('mac-from-'+wid).addEventListener('change',applyDates);
    document.getElementById('mac-to-'+wid).addEventListener('change',applyDates);

// ── ECO ──
async function doEco(el){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld('Fetching economic release calendar\u2026');

  const today=new Date().toISOString().slice(0,10);
  function addDays(iso,n){const d=new Date(iso+'T12:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
  let _ev=[], _filter='all';
  let _from=addDays(today,-14), _to=addDays(today,28);

  const DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const CAT_ABBR={labor:'LAB',inflation:'INF',growth:'GDP',monetary:'FED',housing:'HSG',trade:'TRD',sentiment:'SNT'};

  // Impact: orange filled bars, dark empty
  function impactBars(n){
    return `<span style="color:var(--orange);letter-spacing:1.5px">${'\u25ae'.repeat(n)}</span><span style="color:#2c2c2c;letter-spacing:1.5px">${'\u25ae'.repeat(3-n)}</span>`;
  }

  function actualColor(ev){
    if(ev.actual_num==null||ev.prior_num==null||ev.better_hi==null) return '#aaa';
    return (ev.better_hi?ev.actual_num>ev.prior_num:ev.actual_num<ev.prior_num)?'var(--green)':'#f87171';
  }

  // Grid columns: # | TIME | CC | IMP | CAT | EVENT | PERIOD | ACTUAL | PRIOR
  const GRID='24px 62px 28px 48px 34px 1fr 66px 88px 88px';

  function renderSection(sortedDays, groups, isUpcoming){
    if(!sortedDays.length) return '';
    const divLabel = isUpcoming ? 'UPCOMING' : 'RELEASED';
    let html=`<div style="padding:5px 14px 4px;font-size:10px;color:#666;letter-spacing:.18em;border-bottom:1px solid #111;display:flex;align-items:center;gap:8px"><span style="color:#333;flex:1;border-top:1px solid #252525;margin-right:4px"></span>${divLabel}<span style="color:#333;flex:1;border-top:1px solid #252525;margin-left:4px"></span></div>`;
    let n=0;
    for(const day of sortedDays){
      const isToday=day===today;
      const d=new Date(day+'T12:00');
      const dayStr=`${DAYS[d.getDay()]}  ${MONTHS[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}, ${d.getFullYear()}`;
      const dayEvs=groups[day];
      const highImpact=dayEvs.some(e=>e.impact===3);
      html+=`<div style="border-left:2px solid ${isToday?'var(--orange)':'transparent'}">
        <div style="padding:5px 14px 5px 12px;background:#0e0e0e;font-size:11px;color:${isToday?'var(--orange)':'#999'};letter-spacing:.14em;position:sticky;top:0;z-index:1;border-bottom:1px solid #121212;display:flex;align-items:center;gap:10px">
          <span style="font-weight:700">${dayStr}</span>
          ${highImpact?`<span style="font-size:9px;color:var(--orange);opacity:.85;letter-spacing:.1em">HIGH IMPACT</span>`:''}
          <span style="margin-left:auto;font-size:9px;color:#555">${dayEvs.length} RELEASE${dayEvs.length!==1?'S':''}</span>
        </div>`;
      for(const ev of dayEvs){
        n++;
        const actColor=ev.past?actualColor(ev):'#555';
        const actVal=ev.past?(ev.actual??'\u2014'):'\u2014';
        const priVal=ev.prior??'\u2014';
        const catAbbr=CAT_ABBR[ev.category]||ev.category.slice(0,3).toUpperCase();
        const isBeat=ev.past&&ev.actual_num!=null&&ev.prior_num!=null&&ev.better_hi!=null&&(ev.better_hi?ev.actual_num>ev.prior_num:ev.actual_num<ev.prior_num);
        const isMiss=ev.past&&ev.actual_num!=null&&ev.prior_num!=null&&ev.better_hi!=null&&!isBeat&&ev.better_hi!==null;
        const rowBg=ev.impact===3?'background:rgba(240,140,0,.06)':'';
        html+=`<div style="display:grid;grid-template-columns:${GRID};align-items:center;padding:7px 14px 7px 12px;border-bottom:1px solid #1a1a1a;${rowBg}" title="${ev.name}">
          <span style="color:#666;font-size:11px">${n}</span>
          <span style="color:#999;font-size:11px;letter-spacing:.04em">${ev.time||'\u2014'}</span>
          <span style="color:#bbb;font-size:11px;font-weight:600;letter-spacing:.04em">${ev.country}</span>
          <span style="font-size:11px">${impactBars(ev.impact)}</span>
          <span style="color:#666;font-size:10px;letter-spacing:.07em">${catAbbr}</span>
          <span style="color:#e0e0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:14px;font-size:11px">${ev.name}</span>
          <span style="color:#888;font-size:11px;letter-spacing:.04em">${ev.period||'\u2014'}</span>
          <span style="color:${actColor};font-size:11px;font-weight:${isBeat||isMiss?'700':'400'};letter-spacing:.03em">${actVal}</span>
          <span style="color:#999;font-size:11px;letter-spacing:.03em">${priVal}</span>
        </div>`;
      }
      html+='</div>';
    }
    return html;
  }

  function render(){
    const body=document.getElementById('eco-body');if(!body)return;
    let evs=_ev.filter(e=>e.date>=_from&&e.date<=_to);
    if(_filter!=='all')evs=evs.filter(e=>e.category===_filter);
    if(!evs.length){
      body.innerHTML=`<div style="padding:40px;text-align:center;color:#666;font-size:11px;letter-spacing:.1em">NO RELEASES IN SELECTED RANGE</div>`;
      return;
    }
    const groups={};
    evs.forEach(e=>{if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e);});
    const allDays=Object.keys(groups).sort();
    const upcomingDays=allDays.filter(d=>d>=today);
    const pastDays=allDays.filter(d=>d<today).reverse();
    body.innerHTML=
      renderSection(upcomingDays,groups,true)+
      renderSection(pastDays,groups,false);
  }

  function buildShell(){
    const allCats=[...new Set(_ev.map(e=>e.category))].sort();
    const INP='background:#0a0a0a;border:1px solid #2c2c2c;color:#aaa;font-family:inherit;font-size:10px;padding:3px 7px;border-radius:2px;outline:none;width:108px;letter-spacing:.04em;';
    const pillBase='cursor:pointer;padding:2px 10px;font-size:9px;border:1px solid #2c2c2c;border-radius:2px;letter-spacing:.1em;color:#888;transition:color .1s,border-color .1s';
    el.innerHTML=`
      <div style="display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;gap:5px;flex-wrap:wrap;background:#0a0a0a">
        <span style="font-size:9px;color:#777;letter-spacing:.1em">FROM</span>
        <input id="eco-from" type="date" value="${_from}" style="${INP}">
        <span style="font-size:9px;color:#777;letter-spacing:.1em">TO</span>
        <input id="eco-to" type="date" value="${_to}" style="${INP}">
        <span id="eco-today" style="${pillBase}" onmouseover="this.style.color='var(--orange)';this.style.borderColor='var(--orange)'" onmouseout="this.style.color='#888';this.style.borderColor='#2c2c2c'">TODAY</span>
        <span style="width:1px;height:14px;background:#2e2e2e;margin:0 2px"></span>
        <span class="eco-fi" data-k="all" style="${pillBase}${_filter==='all'?';color:var(--orange);border-color:var(--orange)':''}">ALL</span>
        ${allCats.map(k=>`<span class="eco-fi" data-k="${k}" style="${pillBase}${_filter===k?';color:var(--orange);border-color:var(--orange)':''}">${(CAT_ABBR[k]||k.slice(0,3)).toUpperCase()}</span>`).join('')}
        <span style="margin-left:auto;font-size:8px;color:#555;letter-spacing:.08em">FRED \u00b7 STLOUISFED.ORG \u00b7 \u2190\u2192 WEEK</span>
      </div>
      <div style="display:grid;grid-template-columns:${GRID};padding:5px 14px 5px 12px;border-bottom:1px solid #111;font-size:10px;color:#666;letter-spacing:.12em;background:#0a0a0a;flex-shrink:0">
        <span>#</span><span>TIME ET</span><span>CC</span><span>IMP</span><span>TYPE</span><span>EVENT</span><span>PERIOD</span><span>ACTUAL</span><span>PRIOR</span>
      </div>
      <div id="eco-body" style="flex:1;overflow-y:auto"></div>`;

    el.querySelector('#eco-from').addEventListener('change',e=>{_from=e.target.value;render();});
    el.querySelector('#eco-to').addEventListener('change',e=>{_to=e.target.value;render();});
    el.querySelector('#eco-today').addEventListener('click',()=>{
      _from=addDays(today,-14);_to=addDays(today,28);
      el.querySelector('#eco-from').value=_from;
      el.querySelector('#eco-to').value=_to;
      render();
    });
    el.addEventListener('keydown',e=>{
      if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT')) return;
      if(e.key==='ArrowRight'){e.preventDefault();_from=addDays(_from,7);_to=addDays(_to,7);el.querySelector('#eco-from').value=_from;el.querySelector('#eco-to').value=_to;render();}
      else if(e.key==='ArrowLeft'){e.preventDefault();_from=addDays(_from,-7);_to=addDays(_to,-7);el.querySelector('#eco-from').value=_from;el.querySelector('#eco-to').value=_to;render();}
    });
    el.querySelectorAll('.eco-fi').forEach(f=>f.addEventListener('click',()=>{
      _filter=f.dataset.k;
      el.querySelectorAll('.eco-fi').forEach(x=>{
        const active=x.dataset.k===_filter;
        x.style.color=active?'var(--orange)':'#404040';
        x.style.borderColor=active?'var(--orange)':'#1e1e1e';
      });
      render();
    }));
    render();
  }

  try{
    const r=await fetch(`${API}/eco`).then(x=>x.json());
    if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
    _ev=r.events||[];
    buildShell();
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}

// ── PRED ──
async function doPred(el, wid){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld('Fetching prediction markets…');

  let _data=null, _rendered=[], _ts=0, _countdown=60, _search='';
  let activeCat='all', activeSort='volume', activePlat='both', sortOpen=false;

  // ── helpers ──
  function fmt_pct(v){if(v==null)return'—';return(v*100).toFixed(1)+'%';}
  function fmt_vol(v){if(!v||v===0)return'—';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+v.toFixed(0);}
  function fmt_date(s){if(!s)return'—';try{const d=new Date(s);if(isNaN(d))return'—';const diff=Math.round((d-Date.now())/864e5);if(diff<0)return'exp';if(diff===0)return'today';if(diff===1)return'tmrw';if(diff<=90)return diff+'d';return Math.round(diff/30)+'mo';}catch{return'—';}}
  function prob_color(p){if(p==null)return'#666';if(p>=.65)return'var(--green)';if(p<=.35)return'var(--red)';return'#ccc';}
  function spread_color(s){if(s>=5)return'var(--green)';if(s>=2)return'#ccc';return'#555';}

  // ── category classifier ──
  function classify(title){
    const t=title.toLowerCase();
    if(/bitcoin|btc|ethereum|eth|\bcrypto\b|blockchain|defi|\btoken\b|\bcoin\b|solana|doge|xrp|binance|coinbase/.test(t)) return'crypto';
    if(/elect|president|congress|senate|democrat|republican|trump|biden|harris|kamala|vote|ballot|govern|minister|mayor|prime\s*minister|nato|ukraine|russia|china|iran|war|ceasefire|tariff|sanction|geopolit|poll|approval/.test(t)) return'politics';
    if(/nba|nfl|mlb|nhl|soccer|tennis|football|basketball|baseball|hockey|champion|league|cup|super\s*bowl|world\s*cup|playoffs|finals|tournament|vs\.|\bsport|olympic|ufc|mma|boxing|golf|pga|ncaa/.test(t)) return'sports';
    if(/fed|federal\s*reserve|interest\s*rate|inflation|cpi|pce|gdp|unemployment|recession|jobs|economy|monetary|fiscal|fomc|rate\s*cut|rate\s*hike|basis\s*point|nonfarm|payroll|treasury|yield/.test(t)) return'economics';
    if(/stock|nasdaq|s&p|sp500|dow|earnings|ipo|merger|acquisition|bond|equity|dividend|etf|sec|valuation|index|market\s*cap/.test(t)) return'finance';
    return'other';
  }

  // ── detail popup ──
  async function doPredDetail(detEl, market, wid2){
    detEl.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
    const platCol=market.platform==='kalshi'?'#60a5fa':'#a78bfa';
    const platLabel=market.platform==='kalshi'?'KALSHI':'POLYMARKET';
    const oc=market.outcomes||[];
    const HIST_COLORS=['#4ade80','#38bdf8','#a78bfa','#fbbf24'];

    const outRows=oc.map((o,i)=>{
      const pct=fmt_pct(o.yes_price);
      const col=prob_color(o.yes_price);
      const bidAsk=(o.yes_bid&&o.yes_ask)?`${(o.yes_bid*100).toFixed(0)}/${(o.yes_ask*100).toFixed(0)}¢`:'—';
      return`<tr>
        <td style="color:#777;font-size:10px;width:18px;padding:4px 4px">${i+1}</td>
        <td style="color:${i===0?'#fff':'#ccc'};font-weight:${i===0?700:400};font-size:12px;text-align:left;padding:4px 6px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(o.title||'').replace(/"/g,"'")}">${(o.title||'').slice(0,38)}</td>
        <td style="color:${col};font-weight:700;font-size:13px;text-align:right;width:56px;padding:4px 6px">${pct}</td>
        <td style="color:#999;text-align:right;width:60px;font-size:11px;padding:4px 6px">${bidAsk}</td>
        <td style="color:#888;text-align:right;width:56px;font-size:11px;padding:4px 6px">${fmt_vol(o.volume)}</td>
      </tr>`;
    }).join('');

    detEl.innerHTML=`
      <div style="padding:7px 10px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span style="font-size:9px;color:${platCol};border:1px solid ${platCol};padding:1px 6px;border-radius:2px;letter-spacing:.08em;flex-shrink:0">${platLabel}</span>
        <span style="font-size:13px;color:#eee;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${market.title.replace(/"/g,"'")}">${market.title}</span>
        <span style="font-size:11px;color:#aaa;flex-shrink:0">EXP ${fmt_date(market.close_time)}</span>
      </div>
      <div style="flex-shrink:0;overflow-y:auto;max-height:185px;border-bottom:1px solid #111">
        <table class="mont" style="font-size:11px;width:100%">
          <thead><tr>
            <th style="width:18px"></th>
            <th style="text-align:left;padding:5px 6px">OUTCOME</th>
            <th style="text-align:right;padding:5px 6px">YES%</th>
            <th style="text-align:right;padding:5px 6px">BID/ASK</th>
            <th style="text-align:right;padding:5px 6px">VOL</th>
          </tr></thead>
          <tbody>${outRows}</tbody>
        </table>
      </div>
      <div style="display:flex;align-items:center;padding:4px 10px;border-bottom:1px solid #111;flex-shrink:0;gap:4px">
        <span style="font-size:9px;color:#777;letter-spacing:.1em;margin-right:4px">PROBABILITY HISTORY</span>
        <div id="pred-lgnd-${wid2}" style="display:flex;flex-wrap:wrap;gap:3px;flex:1"></div>
      </div>
      <div id="pred-hist-${wid2}" style="flex:1;min-height:0;position:relative"></div>
      <div style="padding:3px 8px;font-size:9px;color:#666;border-top:1px solid #0d0d0d;text-align:right;flex-shrink:0">Read only · No positions will be placed</div>`;

    const chartEl=document.getElementById(`pred-hist-${wid2}`);
    const lgndEl=document.getElementById(`pred-lgnd-${wid2}`);
    if(!chartEl||!oc.length) return;

    // fetch history for top 4 outcomes in parallel
    const platKey=market.platform==='polymarket'?'poly':'kalshi';
    const toFetch=oc.slice(0,4).map(o=>{
      const mktId=platKey==='poly'?o.clob_token:o.ticker;
      if(!mktId) return Promise.resolve({ok:false});
      return fetch(`${API}/pred/history?platform=${platKey}&market=${encodeURIComponent(mktId)}`)
        .then(x=>x.json()).catch(()=>({ok:false}));
    });
    const results=await Promise.all(toFetch);

    const hasData=results.some(r=>r.ok&&r.history&&r.history.length>1);
    if(!hasData){
      chartEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;color:#444">No history available</div>';
      return;
    }

    const chart=LightweightCharts.createChart(chartEl,{
      width:chartEl.clientWidth||460, height:chartEl.clientHeight||160,
      layout:{background:{color:'#020202'},textColor:'#777'},
      grid:{vertLines:{color:'#111'},horzLines:{color:'#111'}},
      rightPriceScale:{borderColor:'#222'},
      timeScale:{borderColor:'#222',timeVisible:true},
      crosshair:{mode:1},
    });

    // build series + legend
    const legendItems=[];
    results.forEach((res,i)=>{
      if(!res.ok||!res.history||res.history.length<2) return;
      const o=oc[i];
      const series=chart.addLineSeries({
        color:HIST_COLORS[i]||'#888',
        lineWidth:i===0?2:1,
        priceFormat:{type:'custom',formatter:v=>v.toFixed(1)+'%'},
      });
      const seen=new Set();
      const pts=res.history.filter(p=>{if(seen.has(p.time))return false;seen.add(p.time);return true;})
        .sort((a,b)=>a.time-b.time);
      series.setData(pts.map(p=>({time:p.time,value:p.value})));
      legendItems.push({series,color:HIST_COLORS[i]||'#888',label:(o.title||'').slice(0,22),visible:true});
    });

    chart.timeScale().fitContent();

    // render legend
    if(lgndEl&&legendItems.length){
      lgndEl.innerHTML=legendItems.map((item,i)=>
        `<span data-li="${i}" style="cursor:pointer;display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border:1px solid #222;border-radius:2px;user-select:none">
          <span style="display:inline-block;width:12px;height:${i===0?3:2}px;background:${item.color};border-radius:1px"></span>
          <span style="color:#ccc;font-size:9px">${item.label}</span>
        </span>`
      ).join('');
      lgndEl.querySelectorAll('[data-li]').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const item=legendItems[+btn.dataset.li];
          item.visible=!item.visible;
          item.series.applyOptions({visible:item.visible});
          btn.style.opacity=item.visible?'1':'0.35';
        });
      });
    }

    // resize observer — chart follows window resize
    new ResizeObserver(()=>{
      if(chartEl.clientWidth>0&&chartEl.clientHeight>0)
        chart.applyOptions({width:chartEl.clientWidth,height:chartEl.clientHeight});
    }).observe(chartEl);

    if(!window._predCharts) window._predCharts={};
    window._predCharts[wid2]=chart;
  }

  // ── row renderer ──
  function renderRows(rows){
    _rendered=rows;
    const showPlat=activePlat==='both';
    return rows.map((r,i)=>{
      const multiBadge=r.outcome_count>1?`<span style="color:#444;font-size:8px;margin-left:4px">[${r.outcome_count}]</span>`:'';
      const liqVal=r.liquidity>0?fmt_vol(r.liquidity):(r.open_interest>0?fmt_vol(r.open_interest):'—');
      const spread=r.yes_bid&&r.yes_ask?((r.yes_ask-r.yes_bid)*100).toFixed(1)+'¢':null;
      const titleTip=(r.title+(spread?' · Spread: '+spread:'')).replace(/"/g,"'");
      const oc=r.outcomes||[];
      let subLine='';
      const _sh=s=>(s||'').replace(/^will\s+/i,'').replace(/\?.*$/,'').trim();
      if(oc.length===2&&oc[0]&&oc[1]){
        subLine=`<div style="font-size:8px;margin-top:1px"><span style="color:${prob_color(oc[0].yes_price)}">${fmt_pct(oc[0].yes_price)}</span><span style="color:#555;margin-left:3px">· ${fmt_pct(oc[1].yes_price)}</span></div>`;
      }else if(oc.length>2&&oc[0]){
        const top=oc[0],sec=oc[1];
        subLine=`<div style="font-size:8px;margin-top:1px"><span style="color:${prob_color(top.yes_price)}">${_sh(top.title).slice(0,18)} ${fmt_pct(top.yes_price)}</span>${sec?`<span style="color:#555;margin-left:5px">${_sh(sec.title).slice(0,16)} ${fmt_pct(sec.yes_price)}</span>`:''}</div>`;
      }
      return`<tr data-idx="${i}" style="cursor:pointer">
        <td style="color:#666;width:18px">${i+1}</td>
        ${showPlat?`<td style="color:${r.platform==='kalshi'?'#60a5fa':'#a78bfa'};width:36px;font-weight:600">${r.platform==='kalshi'?'KLSH':'POLY'}</td>`:''}
        <td style="color:#eee;max-width:300px;text-align:left" title="${titleTip}"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}${multiBadge}</div>${subLine}</td>
        <td style="color:${prob_color(r.yes_price)};font-weight:700;width:54px;text-align:right">${fmt_pct(r.yes_price)}</td>
        <td style="color:#777;width:52px;text-align:right;font-size:10px">${spread||'—'}</td>
        <td style="color:#ccc;width:62px;text-align:right">${fmt_vol(r.volume24h)}</td>
        <td style="color:#999;width:56px;text-align:right">${liqVal}</td>
        <td style="color:#888;width:46px;text-align:right">${fmt_date(r.close_time)}</td>
      </tr>`;
    }).join('');
  }

  // ── arb renderer ──
  function renderArb(pairs){
    const warn=`<div style="padding:5px 10px 6px;background:#0d0d0d;border-bottom:1px solid #1e1e1e;font-size:8px;color:#555;flex-shrink:0;letter-spacing:.06em">
      ⚠ KEYWORD-MATCHED · VERIFY BOTH MARKETS RESOLVE ON THE SAME EVENT · SPREADS ≥5¢ IN GREEN
    </div>`;
    if(!pairs.length) return`<div style="display:flex;flex-direction:column;flex:1">${warn}<div style="padding:24px;color:#555;text-align:center;font-size:9px">No cross-platform matches found</div></div>`;
    const rows=pairs.map(p=>{
      const conf=p.match_score>=0.5?'HIGH':p.match_score>=0.4?'MED':'LOW';
      const confCol=p.match_score>=0.5?'var(--green)':p.match_score>=0.4?'#ccc':'#444';
      return`<tr>
        <td style="color:#ccc;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left" title="${p.kalshi_title}">${p.kalshi_title}</td>
        <td style="color:#ccc;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left" title="${p.poly_title}">${p.poly_title}</td>
        <td style="color:${prob_color(p.kalshi_yes)};font-weight:700;text-align:right">${fmt_pct(p.kalshi_yes)}</td>
        <td style="color:${prob_color(p.poly_yes)};font-weight:700;text-align:right">${fmt_pct(p.poly_yes)}</td>
        <td style="color:${spread_color(p.spread_cents)};font-weight:700;text-align:right">${p.spread_cents}¢</td>
        <td style="color:${confCol};font-size:8px;text-align:center">${conf}</td>
        <td style="color:#666;text-align:right">${fmt_vol(p.vol24_kalshi)}</td>
        <td style="color:#666;text-align:right">${fmt_vol(p.vol24_poly)}</td>
      </tr>`;
    }).join('');
    return`<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">${warn}<div style="flex:1;overflow-y:auto"><table class="mont" style="font-size:11px">
      <thead><tr><th style="text-align:left">KALSHI MARKET</th><th style="text-align:left">POLYMARKET</th><th>KLSH</th><th>POLY</th><th>SPREAD</th><th>CONF</th><th>K-VOL</th><th>P-VOL</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
  }

  // ── main render ──
  function render(){
    if(!_data) return;
    const body=document.getElementById('pred-body');
    if(!body) return;
    const {kalshi,polymarket,arb}=_data;
    const now=Date.now();

    if(activeCat==='arb'){body.innerHTML=renderArb(arb);return;}

    let pool=activePlat==='kalshi'?[...kalshi]:activePlat==='poly'?[...polymarket]:[...kalshi,...polymarket];
    pool=pool.filter(m=>m.yes_price!=null);
    if(activeCat!=='all') pool=pool.filter(m=>classify(m.title)===activeCat);
    if(_search) pool=pool.filter(m=>m.title.toLowerCase().includes(_search.toLowerCase())||
      (m.outcomes||[]).some(o=>(o.title||'').toLowerCase().includes(_search.toLowerCase())));

    if(activeSort==='volume')    pool.sort((a,b)=>(b.volume24h||0)-(a.volume24h||0));
    else if(activeSort==='liq')  pool.sort((a,b)=>(b.liquidity||0)-(a.liquidity||0));
    else if(activeSort==='new')  pool.sort((a,b)=>new Date(b.created_time||0)-new Date(a.created_time||0));
    else if(activeSort==='5050') pool=pool.filter(m=>m.yes_price>=.42&&m.yes_price<=.58).sort((a,b)=>Math.abs(a.yes_price-.5)-Math.abs(b.yes_price-.5));
    else if(activeSort==='upcoming'){pool=pool.filter(m=>{const diff=(new Date(m.close_time||0)-now)/864e5;return diff>=0&&diff<=60;}).sort((a,b)=>new Date(a.close_time)-new Date(b.close_time));}

    const showPlat=activePlat==='both';
    const rows=pool.slice(0,100);
    const cnt=`<span style="font-size:9px;color:#555;margin-left:auto;margin-right:8px">${pool.length} markets</span>`;
    const thead=`<tr><th style="width:18px"></th>${showPlat?'<th>EXCH</th>':''}<th style="text-align:left">MARKET</th><th style="text-align:right">YES</th><th style="text-align:right">SPREAD</th><th style="text-align:right">VOL 24H</th><th style="text-align:right">DEPTH</th><th style="text-align:right">EXP</th></tr>`;
    body.innerHTML=`<div style="flex:1;overflow-y:auto"><div style="display:flex;align-items:center;padding:3px 8px;border-bottom:1px solid #0f0f0f">${cnt}</div><table class="mont" style="font-size:11px"><thead>${thead}</thead><tbody id="pred-tbody-${wid}">${renderRows(rows)}</tbody></table></div>`;
    const tbody=body.querySelector(`#pred-tbody-${wid}`);
    if(tbody) tbody.addEventListener('click',e=>{
      const tr=e.target.closest('tr[data-idx]');
      if(!tr) return;
      const m=_rendered[+tr.dataset.idx];
      if(!m) return;
      const label=m.title.slice(0,46)+(m.title.length>46?'…':'');
      ow('pred-detail',null,label,510,460,(detEl,_,wid2)=>doPredDetail(detEl,m,wid2));
    });
  }

          </div>
        </div>
        <input id="pred-search-${wid}" type="text" placeholder="⌕ search markets…"
          style="background:#0a0a0a;border:1px solid #333;color:#ccc;font-family:var(--font);font-size:9px;padding:2px 8px;border-radius:2px;width:150px;outline:none;margin-left:4px">

          <span class="qm-live-dot" id="pred-dot-${wid}"></span>

      <div id="pred-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column">${ld('Loading…')}</div>`;

    el.querySelectorAll('.pred-cat').forEach(t=>t.addEventListener('click',()=>{

  // ── data load (used for auto-refresh) ──
  async function load(){
    try{
      const r=await fetch(`${API}/pred`).then(x=>x.json());
      if(!r.ok) return;
      _data=r; _ts=Date.now();
      render();
      const upd=document.getElementById(`pred-upd-${wid}`);
      if(upd) upd.textContent='just now';
    }catch{}
  }

  try{
    const r=await fetch(`${API}/pred`).then(x=>x.json());
    if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
    _data=r; _ts=Date.now();
    buildShell();
    render();
    const upd=document.getElementById(`pred-upd-${wid}`);
    if(upd) upd.textContent='just now';
    ftimers[wid]=setInterval(()=>{
      _countdown--;
      const cd=document.getElementById(`pred-cd-${wid}`);
      if(cd) cd.textContent=`${_countdown}s`;
      const updEl=document.getElementById(`pred-upd-${wid}`);
      if(updEl&&_ts){const ago=Math.round((Date.now()-_ts)/60000);updEl.textContent=ago<1?'just now':`${ago}m ago`;}
      if(_countdown<=0){_countdown=60;load();}
    },1000);
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}

// ── EQS ──
async function doEqs(el, wid){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';

  if(!window._eqsWS) window._eqsWS={};
  if(!window._eqsWS[wid]) window._eqsWS[wid]={
    q:'', country:'', sector:'', market_cap:'', minMktCap:'', page:1, meta:null,
    period:'ytd', perfData:null
  };
  const ws=window._eqsWS[wid];

  const inpSty='background:#111;border:1px solid #252525;color:#ddd;font-family:var(--font);font-size:10px;padding:3px 7px;outline:none;border-radius:2px;height:22px;box-sizing:border-box;';
  const selSty=inpSty+'cursor:pointer;';
  const btnSty='background:#1a1a1a;border:1px solid #333;color:#bbb;font-family:var(--font);font-size:9px;letter-spacing:.08em;padding:3px 9px;cursor:pointer;border-radius:2px;height:22px;white-space:nowrap;';
  const toolbarId=`eqs-tb-${wid}`, bodyId=`eqs-bd-${wid}`, pagerId=`eqs-pg-${wid}`;
  const PERIODS=['ytd','1m','6m','1y','5y'];

  function fmtCap(v){
    if(!v) return '—';
    if(v>=1e12) return (v/1e12).toFixed(2)+'T';
    if(v>=1e9)  return (v/1e9).toFixed(2)+'B';
    if(v>=1e6)  return (v/1e6).toFixed(2)+'M';
    return v.toLocaleString();
  }

  function buildToolbar(){
    const m=ws.meta;
    const cOpts=m?m.countries.map(c=>`<option value="${c}"${ws.country===c?' selected':''}>${c}</option>`).join(''):'';
    const sOpts=m?m.sectors.map(s=>`<option value="${s}"${ws.sector===s?' selected':''}>${s}</option>`).join(''):'';
    const mcOpts=m?m.market_caps.map(c=>`<option value="${c}"${ws.market_cap===c?' selected':''}>${c}</option>`).join(''):'';
    const pbSty=(p)=>`background:none;border:1px solid ${ws.period===p?'var(--orange)':'#252525'};color:${ws.period===p?'var(--orange)':'#555'};font-family:var(--font);font-size:9px;letter-spacing:.06em;padding:2px 7px;cursor:pointer;border-radius:2px;`;

      <div style="display:flex;gap:5px;align-items:center;padding:6px 10px;flex-wrap:wrap">
        <input id="eqs-q-${wid}" type="text" placeholder="Search ticker or name…" value="${ws.q}" style="${inpSty}width:175px">
        <select id="eqs-co-${wid}" style="${selSty}max-width:125px"><option value="">All Countries</option>${cOpts}</select>
        <select id="eqs-sec-${wid}" style="${selSty}max-width:135px"><option value="">All Sectors</option>${sOpts}</select>
        <select id="eqs-mc-${wid}" style="${selSty}max-width:90px"><option value="">All Caps</option>${mcOpts}</select>
        <input id="eqs-minmc-${wid}" type="number" placeholder="Min $M" value="${ws.minMktCap}" style="${inpSty}width:68px" title="Minimum market cap in millions (e.g. 50000 = $50B)">
        <button id="eqs-go-${wid}" style="${btnSty}color:var(--orange);border-color:var(--orange)">SCREEN</button>
        <button id="eqs-cl-${wid}" style="${btnSty}">CLEAR</button>

        ${pBtns}
      </div>
    </div>`;
  }

  function wireToolbar(){
    el.querySelector(`#eqs-go-${wid}`).addEventListener('click', screen);
    el.querySelector(`#eqs-cl-${wid}`).addEventListener('click',()=>{
      ws.q=''; ws.country=''; ws.sector=''; ws.market_cap=''; ws.minMktCap=''; ws.page=1;
      ws.perfData=null;
      el.querySelector(`#eqs-q-${wid}`).value='';
      const co=el.querySelector(`#eqs-co-${wid}`); if(co) co.value='';

      el.querySelector(`#eqs-minmc-${wid}`).value='';

    });

      const btn=el.querySelector(`#eqs-pb-${p}-${wid}`);
      if(!btn) return;

        ws.period=p; ws.perfData=null;

    bd.innerHTML=`<div style="flex:1;overflow-y:auto"><table class="glco-tbl">
      <thead><tr>
        <th style="text-align:left">SYM</th>
        <th style="text-align:left">NAME</th>

        <th style="text-align:left">INDUSTRY</th>

        <th style="text-align:left">EXCH</th>
        <th style="text-align:left">CAP TIER</th>
        <th>MCAP</th><th>PRICE</th><th>CHG%</th>${perfHdr}
      </tr></thead>
      <tbody>${trs}</tbody>
    </table></div>`;

    const ct=el.querySelector(`#eqs-ct-${wid}`);
    if(ct) ct.textContent=`${total.toLocaleString()} results`;

    const pg=el.querySelector(`#${pagerId}`);
    if(!pg) return;
    if(totalPages<=1){pg.innerHTML='';return;}
    const bP=`background:#111;border:1px solid #252525;color:#bbb;font-family:var(--font);font-size:9px;padding:2px 8px;cursor:pointer;border-radius:2px;`;
    const s2=Math.max(1,page-2), e2=Math.min(totalPages,page+2);
    let btns='';
    if(page>1) btns+=`<button style="${bP}" onclick="window._eqsGo_${wid}(${page-1})">◀</button>`;
    for(let i=s2;i<=e2;i++) btns+=`<button style="${bP}${i===page?'color:var(--orange);border-color:var(--orange);':''}" onclick="window._eqsGo_${wid}(${i})">${i}</button>`;
    if(page<totalPages) btns+=`<button style="${bP}" onclick="window._eqsGo_${wid}(${page+1})">▶</button>`;
    btns+=`<span style="font-size:9px;color:var(--dim);margin-left:6px">p.${page}/${totalPages}</span>`;
    pg.innerHTML=`<div style="display:flex;gap:4px;align-items:center;padding:5px 10px">${btns}</div>`;
  }

  async function fetchPerf(syms){
    if(!syms||!syms.length||!ws.period) return;
    try{
      const r=await fetch(`${API}/eqs/perf?syms=${syms.join(',')}&period=${ws.period}`).then(x=>x.json());
      if(r.ok){ws.perfData=r.perfs; renderTable(lastResults,lastTotal,lastPage,lastTotalPages);}
    }catch(_){}
  }

  async function fetchAndRender(){
    const bd=el.querySelector(`#${bodyId}`);
    if(bd) bd.innerHTML=ld('Screening…');
    ws.perfData=null;
    const p=new URLSearchParams({page:ws.page});
    if(ws.q)          p.set('q',ws.q);
    if(ws.country)    p.set('country',ws.country);
    if(ws.sector)     p.set('sector',ws.sector);
    if(ws.market_cap) p.set('market_cap',ws.market_cap);
    try{
      const r=await fetch(`${API}/eqs?${p}`).then(x=>x.json());
      if(!r.ok){if(bd) bd.innerHTML=`<div class="err">${r.error}</div>`;return;}
      lastResults=r.results; lastTotal=r.total; lastPage=r.page; lastTotalPages=r.totalPages;
      renderTable(r.results,r.total,r.page,r.totalPages);
      if(ws.period&&r.results.length) fetchPerf(r.results.map(x=>x.sym));
    }catch(e){if(bd) bd.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
  }

  window[`_eqsGo_${wid}`]=function(p){ws.page=p;fetchAndRender();};

  el.innerHTML=buildToolbar()+
    `<div id="${bodyId}" style="flex:1;overflow:hidden;display:flex;flex-direction:column">${ld('Loading…')}</div>`+
    `<div id="${pagerId}" style="flex-shrink:0;border-top:1px solid var(--bdr)"></div>`;
  wireToolbar();

  if(!ws.meta){
    try{
      const m=await fetch(`${API}/eqs/meta`).then(x=>x.json());
      if(m.ok){
        ws.meta=m;
        const tb=el.querySelector(`#${toolbarId}`);
        if(tb){tb.outerHTML=buildToolbar(); wireToolbar();}
      }
    }catch(_){}
  }
  fetchAndRender();
}

async function doGc(el,wid){

  function mkChart(canvasId,labels,data,color,yLabel=''){

            <div class="cm-cell"><div class="cm-k">10Y</div><div class="cm-v" style="color:#38bdf8">${fv(cur['10Y'])} <span style="font-size:9px">${chgBp(cur['10Y'],y1['10Y'])}</span></div></div>
            <div class="cm-cell"><div class="cm-k">30Y</div><div class="cm-v" style="color:#38bdf8">${fv(cur['30Y'])} <span style="font-size:9px">${chgBp(cur['30Y'],y1['30Y'])}</span></div></div>

        <!-- RIGHT: time series -->

          <div style="padding:8px 10px 4px;font-size:10px;color:#888;letter-spacing:.1em;border-bottom:1px solid #141414;font-weight:600">2Y + 10Y YIELDS  ·  1 YEAR DAILY</div>

            <span style="color:#4ade80">── 10Y</span>
            <span style="color:#fbbf24">── 30Y</span>

    // ── Snapshot multi-curve (Chart.js — x axis = tenors) ──
    requestAnimationFrame(()=>{
      const ctx=document.getElementById(snid)?.getContext('2d');
      if(!ctx)return;
      const mkDs=(snap,color,label,dash=false)=>({

    const lwOpts={

      // Spread histogram

      const sprData=h10.filter(r=>map2[r.date]!=null).map(r=>({time:r.date,value:+(r.value-map2[r.date]).toFixed(3),color:r.value-map2[r.date]>=0?'rgba(74,222,128,0.7)':'rgba(248,113,113,0.7)'}));

      new ResizeObserver(()=>chS.applyOptions({width:elS.clientWidth,height:elS.clientHeight})).observe(elS);

  window[`_gct_${wid}`]=(c)=>{
    active=c;
    gcLwKill();
    document.querySelectorAll(`#gc-tabs-${wid} .pb`).forEach(b=>b.classList.toggle('active',b.dataset.c===c));

// ══════════════════════════════════════════════

// Rating → CSS class
function ratingClass(r){
  if(!r) return '';
  const c=r.replace(/[^A-Za-z+\-]/g,'').replace('+','p').replace('-','m');
  return `r${c}`;
}

// Basis point change color
function bpColor(v){ return v==null?'':v>0?'down':v<0?'up':'flat'; } // rising yields = negative for bonds
function bpSign(v){ return v==null?'—':(v>0?'+':'')+v.toFixed(1)+'bp'; }

// ── SOVG World Monitor ──────────────────────────────────────────────────
async function doSovgWorld(el, wid){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=`
    <div class="sovg-toolbar" id="sovg-tb-${wid}">
      <span style="font-size:9px;color:var(--dim);letter-spacing:.1em;margin-right:4px">REGION:</span>
      ${['All','Americas','Europe','Asia-Pacific','Middle East','Africa'].map(r=>`
        <button class="rg-btn${r==='All'?' active':''}" data-r="${r==='All'?'all':r}" onclick="window._sovgReg_${wid}('${r==='All'?'all':r}')">${r.toUpperCase()}</button>
      `).join('')}
      <span style="color:var(--bdr2);margin:0 6px">|</span>
      <input class="sovg-search" id="sovg-srch-${wid}" type="text" placeholder="Search country…" oninput="window._sovgSearch_${wid}(this.value)">
      <span style="color:var(--bdr2);margin:0 6px">|</span>
      <button class="rg-btn" onclick="window._sovgRefresh_${wid}()">↻ REFRESH</button>
      <span style="font-size:8px;color:var(--dim);margin-left:auto">Click country for full curve · Sorted by 10Y yield ↓</span>
    </div>
    <div style="flex:1;overflow-y:auto" id="sovg-table-wrap-${wid}">
      <div class="load"><div class="sp"></div><span>Loading world bond data… (may take 30-60s for all countries)</span></div>
    </div>
  `;

  let allData = null;
  let curRegion = 'all';
  let curSearch = '';
  let sortKey = 'yield10y';
  let sortDir = -1; // -1 = desc

  async function load(region){
    const wrap = document.getElementById(`sovg-table-wrap-${wid}`);
    if(!wrap) return;
    if(!allData){
      wrap.innerHTML=`<div class="load"><div class="sp"></div><span>Fetching sovereign yields for ${region==='all'?'all 40+ countries':'region'}…</span></div>`;
    }
    try{
      const r = await fetch(`${API}/sovg?region=${region}`).then(x=>x.json());
      if(!r.ok){ wrap.innerHTML=`<div class="err">${r.error}</div>`; return; }
      allData = r.bonds;
      renderTable();
    }catch(e){ wrap.innerHTML=`<div class="err">Backend offline. Run app.py<br>${e}</div>`; }
  }

  function renderTable(){
    const wrap = document.getElementById(`sovg-table-wrap-${wid}`);
    if(!wrap || !allData) return;

    let data = allData.filter(b => {
      if(curSearch){
        const q = curSearch.toLowerCase();
        return b.name.toLowerCase().includes(q) || b.code.toLowerCase().includes(q);
      }
      return true;
    });

    // Sort
    data.sort((a,b)=>{
      let av = a[sortKey], bv = b[sortKey];
      if(av==null) return 1; if(bv==null) return -1;
      return sortDir * (av - bv);
    });

    const usYield = allData.find(b=>b.code==='US')?.yield10y;

    const rows = data.map(b => {
      const y = b.yield10y;
      const yStr = y!=null ? y.toFixed(2)+'%' : '—';
      const d1  = b.chg1d;  const d1c  = bpColor(d1);
      const d1w = b.chg1w;  const d1wc = bpColor(d1w);
      const d1m = b.chg1m;  const d1mc = bpColor(d1m);
      const sp  = b.spreadVsUS;
      const spStr = sp!=null ? (sp>0?'+':'')+sp.toFixed(0)+'bp' : '—';
      const spColor = sp!=null ? (sp>50?'var(--red)':sp<-50?'var(--green)':'var(--text)') : 'var(--dim)';
      const rc = ratingClass(b.rating);
      // Sparkline in canvas
      const sparkId = `spk-${wid}-${b.code}`;
      return `<tr class="data-row" onclick="window._sovgDrill_${wid}('${b.code}')">
        <td><span class="bond-flag">${b.flag}</span></td>
        <td>
          <div class="bond-name">${b.name}</div>
          <div class="bond-ccy">${b.code} · ${b.currency} · ${b.region}</div>
        </td>
        <td><span class="rating-badge ${rc}">${b.rating||'—'}</span></td>
        <td style="font-size:13px;font-weight:700;color:var(--cyan)">${yStr}</td>
        <td class="${d1c}">${d1!=null?bpSign(d1*100):'—'}</td>
        <td class="${d1wc}">${d1w!=null?bpSign(d1w*100):'—'}</td>
        <td class="${d1mc}">${d1m!=null?bpSign(d1m*100):'—'}</td>
        <td style="color:${spColor}">${spStr}</td>
        <td class="spark-cell"><canvas id="${sparkId}" width="80" height="22" class="sovg-spark"></canvas></td>
      </tr>`;
    }).join('');

    wrap.innerHTML=`<table class="sovgt">
      <thead><tr>
        <th></th>
        <th class="${sortKey==='name'?`sort-${sortDir>0?'asc':'desc'}`:''}">COUNTRY</th>
        <th>RATING</th>
        <th class="${sortKey==='yield10y'?`sort-${sortDir>0?'asc':'desc'}`:''}">10Y YIELD</th>
        <th class="${sortKey==='chg1d'?`sort-${sortDir>0?'asc':'desc'}`:''}">1D CHG</th>
        <th class="${sortKey==='chg1w'?`sort-${sortDir>0?'asc':'desc'}`:''}">1W CHG</th>
        <th class="${sortKey==='chg1m'?`sort-${sortDir>0?'asc':'desc'}`:''}">1M CHG</th>
        <th class="${sortKey==='spreadVsUS'?`sort-${sortDir>0?'asc':'desc'}`:''}">VS US (bp)</th>
        <th>1Y TREND</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

    // Draw sparklines
    requestAnimationFrame(()=>{
      data.forEach(b => {
        const canvas = document.getElementById(`spk-${wid}-${b.code}`);
        if(!canvas || !b.sparkline.length) return;
        const ctx = canvas.getContext('2d');
        const vals = b.sparkline.filter(v=>v!=null);
        if(vals.length < 2) return;
        const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||0.001;
        const last=vals[vals.length-1], first=vals[0];
        const col = last >= first ? '#f87171' : '#4ade80'; // rising yield = red for bond price, green = rally
        ctx.clearRect(0,0,80,22);
        ctx.strokeStyle=col; ctx.lineWidth=1.2;
        ctx.shadowColor=col; ctx.shadowBlur=2;
        ctx.beginPath();
        vals.forEach((v,i)=>{
          const x=(i/(vals.length-1))*78+1;
          const y=22-((v-mn)/rng)*19-1.5;
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        });
        ctx.stroke();
      });
    });
  }

  // Sort on column click
  const tableWrap = document.getElementById(`sovg-table-wrap-${wid}`);
  if(tableWrap) tableWrap.style.cssText='flex:1;overflow-y:auto';
  document.getElementById(`sovg-table-wrap-${wid}`)?.addEventListener('click', e=>{
    const th = e.target.closest('th');
    if(!th) return;
    const colMap = {2:'name',3:'yield10y',4:'chg1d',5:'chg1w',6:'chg1m',7:'spreadVsUS'};
    const ci = Array.from(th.parentElement.children).indexOf(th);
    if(colMap[ci]){
      if(sortKey===colMap[ci]) sortDir*=-1; else {sortKey=colMap[ci];sortDir=-1;}
      renderTable();
    }
  });

  window[`_sovgReg_${wid}`]=(r)=>{
    curRegion=r;
    document.querySelectorAll(`#sovg-tb-${wid} .rg-btn`).forEach(b=>b.classList.toggle('active',b.dataset.r===r));
    allData=null; load(r);
  };
  window[`_sovgSearch_${wid}`]=(q)=>{ curSearch=q; renderTable(); };
  window[`_sovgRefresh_${wid}`]=()=>{ allData=null; load(curRegion); };
  window[`_sovgDrill_${wid}`]=(code)=>{
    ow('sovg',code,`SOVG · ${code}`,680,580,(e,tk,id)=>doSovgCountry(e,code,id));
  };

  load('all');
}

  const GP_FLAT = [];
  GP_CATALOG.forEach(g => { if (g.group !== 'CUSTOM') g.items.forEach(it => GP_FLAT.push({...it, group: g.group})); });

  // ── state ──
  const today = new Date().toISOString().slice(0,10);
  function addYrs(n){ const d=new Date(today+'T12:00'); d.setFullYear(d.getFullYear()+n); return d.toISOString().slice(0,10); }
  let _mode  = 'overlay';
  let _from  = addYrs(-10), _to = today;
  let _seriesIds = ['UNRATE'];
  let _maPeriods = [50, 100, 200];
  let _maEnabled = {50:true, 100:true, 200:true};
  let _gpCache   = {};
  let _gpChart   = null;
  let _acGetters = {};

  const inpSty = `background:#0a0a0a;border:1px solid #252525;color:#ccc;font-family:var(--font);font-size:11px;padding:3px 6px;border-radius:2px;outline:none;width:94px;`;
  const COLORS = ['#2563eb','#dc2626','#d97706','#16a34a','#7c3aed','#0891b2','#be185d','#65a30d'];
  const MA_COLS = ['#7c3aed','#059669','#ea580c','#0284c7','#be185d','#ca8a04','#475569','#9333ea'];
  function maCol(i){ return MA_COLS[i % MA_COLS.length]; }

  // ── helpers ──
  function byDate(data){ return (data||[]).filter(r=>r.date>=_from&&r.date<=_to); }

  function calcMA(data, period){
    const out=[];
    for(let i=period-1;i<data.length;i++){
      let s=0; for(let j=i-period+1;j<=i;j++) s+=data[j].value;
      out.push({date:data[i].date,value:s/period});
    }
    return out;
  }

  function calcRatio(s1d, s2d){
    const m=new Map(s2d.map(d=>[d.date,d.value]));
    return s1d.filter(d=>m.has(d.date)&&m.get(d.date)!==0).map(d=>({date:d.date,value:d.value/m.get(d.date)}));
  }

  function gpFmt(meta){
    if(!meta) return v=>(+v).toFixed(4);
    const u=(meta.units||'').toLowerCase();
    if(u.includes('percent')||u==='%') return v=>(+v).toFixed(2)+'%';
    if(u==='ratio')                    return v=>(+v).toFixed(3);
    if(u.includes('billion'))          return v=>'$'+(+v).toFixed(1)+'B';
    if(u.includes('thousand'))         return v=>(+v).toFixed(0)+'K';
    if(meta.source==='yfinance')       return v=>'$'+(+v).toFixed(2);
    return v=>(+v).toFixed(2);
  }

  // ── fetch ──
  async function fetchSeries(id){
    if(!id||id==='__CUSTOM__') return null;
    if(_gpCache[id]) return _gpCache[id];
    try{
      const r=await fetch(`${API}/gp?series=${encodeURIComponent(id)}`).then(x=>x.json());
      if(!r.ok) throw new Error(r.error);
      _gpCache[id]=r.series[0];
      return _gpCache[id];
    }catch(e){ return null; }
  }

  // ── chart ──
  function destroyChart(){
    if(_gpChart){try{_gpChart.remove();}catch(e){} _gpChart=null;}
  }

  async function renderChart(){
    destroyChart();
    const chartEl=document.getElementById('gp-chart-'+wid);
    const footer =document.getElementById('gp-footer-'+wid);
    if(!chartEl) return;

    const activeIds=_seriesIds.filter(id=>id&&id!=='__CUSTOM__');
    if(!activeIds.length){
      chartEl.innerHTML='<div style="color:#333;font-size:11px;padding:20px">Select a series above.</div>';

      return;
