<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINETIC TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Oxygen+Mono&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<!-- TradingView Lightweight Charts — professional financial charting -->
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<!-- TradingView Advanced Charts — preload so widgets instantiate instantly -->
<script src="https://s3.tradingview.com/tv.js" async></script>
<style>
:root {
  --bg:    #0a0a0a;
  --bg1:   #111111;
  --bg2:   #161616;
  --bg3:   #1e1e1e;
  --bdr:   #2c2c2c;
  --bdr2:  #3a3a3a;
  --green: #4ade80;
  --red:   #f87171;
  --amber: #fbbf24;
  --cyan:  #38bdf8;
  --orange:#F08C00;
  --purple:#a78bfa;
  --text:  #dde1e7;
  --dim:   #8791a1;
  --muted: #4b5563;
  --font:  'Oxygen Mono', monospace;
  --font-prev: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;overflow:hidden;}

/* ── TOPBAR ── */
#topbar{height:51px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#080808;border-bottom:2px solid rgba(240,140,0,0.55);flex-shrink:0;z-index:200;position:relative;}
#tb-left{display:flex;align-items:center;min-width:220px;position:relative;}
.tb-hint{font-size:13px;color:var(--dim);white-space:nowrap;}
.tb-hint b{color:#3d3d3d;font-weight:400;}
#cli-inp{background:transparent;border:none;outline:none;color:var(--green);font-family:var(--font);font-size:19px;caret-color:transparent;text-transform:uppercase;letter-spacing:.05em;width:240px;}
#tb-cursor{display:none;width:13px;height:22px;background:#ffffff;position:absolute;top:50%;transform:translateY(-50%);animation:cur-blink 1s step-end infinite;}
#tb-cursor.active{display:block;}
@keyframes cur-blink{0%,100%{opacity:1}50%{opacity:0}}
#cli-inp::placeholder{display:none;color:transparent;}
#tb-prompt{color:var(--orange);font-size:22px;font-weight:900;margin-right:10px;flex-shrink:0;letter-spacing:-.02em;}
.tb-right{display:flex;align-items:center;gap:20px;font-size:11px;}
.tb-cmd{color:var(--text);cursor:pointer;letter-spacing:.06em;}
.tb-cmd:hover{color:var(--orange);}
#clock{letter-spacing:.04em;}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:ld 1.8s ease-in-out infinite;}
@keyframes ld{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
.tbi{color:var(--dim);cursor:pointer;font-size:14px;line-height:1;}
.tbi:hover{color:var(--text);}

/* ── DESKTOP ── */
#desktop{position:relative;height:calc(100vh - 51px - 24px);overflow:hidden;}

/* ── FLOATING WINDOW ── */
.win{position:absolute;background:var(--bg1);border:1px solid rgba(251,191,36,.18);display:flex;flex-direction:column;min-width:180px;min-height:80px;box-shadow:0 10px 50px rgba(0,0,0,.85);}
.win-bar{height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:#0c0c0c;border-bottom:1px solid var(--bdr);border-top:2px solid rgba(240,140,0,0.75);cursor:grab;flex-shrink:0;}
.win-bar:active{cursor:grabbing;}
.win-title{font-size:11px;font-weight:600;color:var(--orange);letter-spacing:.08em;}
.win-acts{display:flex;gap:4px;}
.wb{width:17px;height:17px;display:grid;place-items:center;color:var(--dim);cursor:pointer;font-size:10px;border:1px solid transparent;}
.wb:hover{color:var(--text);border-color:var(--bdr2);}
.wb.x:hover{color:var(--red);border-color:var(--red);}
.wbody{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.rz{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:se-resize;}
.rz::before{content:'';position:absolute;bottom:3px;right:3px;width:5px;height:5px;border-right:1.5px solid var(--dim);border-bottom:1.5px solid var(--dim);}

/* ── QM (QUOTE MONITOR) ── */
.qm-tabs{display:flex;align-items:flex-end;flex-wrap:nowrap;overflow-x:auto;gap:0;padding:0 5px;background:#080808;border-bottom:1px solid var(--bdr);flex-shrink:0;scrollbar-width:none;}
.qm-tabs::-webkit-scrollbar{display:none;}
.qt{padding:3px 9px;font-size:11px;color:var(--dim);cursor:pointer;border:1px solid transparent;border-bottom:none;background:transparent;font-family:var(--font);letter-spacing:.06em;transition:all .12s;white-space:nowrap;flex-shrink:0;position:relative;margin-top:3px;}
.qt.active{background:var(--bg1);color:var(--text);border-color:var(--bdr);border-bottom:1px solid var(--bg1);font-weight:600;margin-bottom:-1px;padding-bottom:4px;}
.qt:hover:not(.active){color:var(--text);}
.qt.add-wl{color:var(--green);font-size:14px;padding:0 8px;border:none;}
.qt-close-x{display:none;margin-left:4px;font-size:8px;color:var(--dim);opacity:.6;}
.qt:hover .qt-close-x{display:inline;}
.qt-close-x:hover{color:var(--red);opacity:1;}
.qm-toolbar{display:flex;align-items:center;gap:5px;padding:4px 8px;background:#090909;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.qm-tb-btn{padding:2px 7px;font-size:10px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-family:var(--font);cursor:pointer;letter-spacing:.06em;transition:all .12s;}
.qm-tb-btn:hover{color:var(--text);border-color:var(--bdr2);}
.qm-tb-btn.on{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.07);}
.qm-status-area{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:10px;color:var(--dim);}
.qm-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:ld 1.6s ease-in-out infinite;}
.qm-live-dot.stale{background:var(--amber);box-shadow:0 0 5px var(--amber);animation:none;}
.qm-scroll{flex:1;overflow-y:auto;min-height:0;}
.qm-scroll::-webkit-scrollbar{width:3px;}
.qm-scroll::-webkit-scrollbar-thumb{background:var(--muted);}
table.qmt{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto;}
table.qmt thead tr{background:#0d0d0d;position:sticky;top:0;z-index:2;}
table.qmt th{padding:6px 10px;text-align:right;color:var(--dim);font-size:11px;font-weight:500;letter-spacing:.07em;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;}
table.qmt th:first-child{text-align:left;min-width:90px;}
table.qmt th:last-child{width:28px;padding:6px 6px;}
table.qmt th:hover{color:var(--text);}
table.qmt th.sort-asc::after{content:' ↑';color:var(--green);font-size:9px;}
table.qmt th.sort-desc::after{content:' ↓';color:var(--green);font-size:9px;}
table.qmt td{padding:8px 10px;text-align:right;white-space:nowrap;font-size:13px;font-variant-numeric:tabular-nums;}
table.qmt tbody tr:nth-child(odd) td{background:#070707;}
table.qmt tbody tr:nth-child(even) td{background:#181818;}
table.qmt td:first-child{text-align:left;cursor:pointer;font-weight:600;letter-spacing:.03em;}
table.qmt td:first-child:hover{color:var(--green);}
table.qmt tr.qmr:hover td{background:rgba(255,255,255,.05)!important;}
table.qmt td.qm-del{color:#3a3a3a;font-size:14px;cursor:pointer;padding:8px 8px;width:28px;transition:color .1s;}
table.qmt td.qm-del:hover{color:#f87171!important;background:rgba(248,113,113,.06)!important;}
@keyframes fup{0%{background:rgba(74,222,128,.25)}100%{background:transparent}}
@keyframes fdn{0%{background:rgba(248,113,113,.25)}100%{background:transparent}}
.flash-up td,.flash-up div{animation:fup .6s ease-out forwards;}
.flash-dn td,.flash-dn div{animation:fdn .6s ease-out forwards;}
.qm-foot{padding:4px 8px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.qadd{color:var(--dim);font-size:11px;cursor:pointer;letter-spacing:.05em;}
.qadd:hover{color:var(--green);}
.qbatch{color:var(--dim);font-size:11px;cursor:pointer;}
.qbatch:hover{color:var(--cyan);}
#col-picker{display:none;position:fixed;background:var(--bg2);border:1px solid var(--bdr2);padding:10px 12px;z-index:2000;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.7);}
#col-picker.open{display:block;}
#col-picker h4{font-size:8px;letter-spacing:.15em;color:var(--dim);margin-bottom:8px;}
.cpr{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:9px;cursor:pointer;color:var(--text);}
.cpr:hover{color:var(--green);}
.cpc{width:11px;height:11px;border:1px solid var(--bdr2);display:grid;place-items:center;font-size:8px;flex-shrink:0;}

/* ── FOCUS (redesigned) ── */
.foc-wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;height:100%;box-sizing:border-box;}
.foc-sym{font-size:28px;font-weight:600;letter-spacing:.04em;line-height:1;color:var(--text);}
.foc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.foc-price{font-size:22px;font-weight:700;line-height:1;letter-spacing:-.01em;}
.foc-chg{font-size:13px;font-weight:600;display:flex;gap:8px;}

/* ── CONTENT ── */
.cbody{flex:1;overflow:auto;padding:0;min-height:0;}
.cbody::-webkit-scrollbar{width:3px;}
.cbody::-webkit-scrollbar-thumb{background:var(--muted);}

/* generic padded body */
.pbody{flex:1;overflow:auto;padding:8px 10px;min-height:0;}
.pbody::-webkit-scrollbar{width:3px;}
.pbody::-webkit-scrollbar-thumb{background:var(--muted);}

/* ── MODL ── */
.modl-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.modl-hdr{padding:7px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:baseline;gap:12px;}
.modl-hdr-name{font-size:13px;font-weight:700;color:var(--text);}
.modl-hdr-sub{font-size:10px;color:var(--dim);}
.modl-body{flex:1;overflow:hidden;display:flex;flex-direction:row;min-height:0;}
.modl-frozen{flex-shrink:0;overflow:hidden;border-right:1px solid var(--bdr);background:var(--bg);z-index:2;}
.modl-scroll{flex:1;overflow:auto;}
table.modlt{border-collapse:separate;border-spacing:0;font-size:11px;white-space:nowrap;}
table.modlt thead th{font-size:9px;font-weight:600;color:var(--dim);text-align:right;
  padding:4px 8px;border-bottom:1px solid var(--bdr);position:sticky;top:0;
  background:#0d0d0d;z-index:2;letter-spacing:.05em;}
table.modlt thead th.lbl-col{text-align:left;background:#0d0d0d;min-width:214px;max-width:214px;color:var(--dim);}
table.modlt td{padding:2px 8px;text-align:right;color:var(--text);border-bottom:1px solid rgba(255,255,255,.025);}
table.modlt td.lbl-col{text-align:left;background:var(--bg);
  color:var(--dim);font-size:10px;padding-left:12px;min-width:214px;max-width:214px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
table.modlt tr.modl-sect td{color:var(--amber);font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;padding-top:10px;padding-bottom:2px;font-weight:700;border-top:1px solid var(--bdr);}
table.modlt tr.modl-sect td.lbl-col{background:var(--bg);}
table.modlt tr.modl-bold td{color:var(--text);font-weight:700;background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.07);}
table.modlt tr.modl-bold td.lbl-col{background:rgba(255,255,255,.02);}
table.modlt td.neg{color:var(--red);}
table.modlt td.ann{border-left:1px solid var(--bdr);}
table.modlt td.est{color:var(--dim);font-style:italic;}
table.modlt tr.modl-sec-hdr td{background:rgba(251,191,36,.07);font-size:11px;font-weight:700;
  color:var(--amber);padding:6px 12px;letter-spacing:.1em;border-top:2px solid rgba(251,191,36,.3);}
table.modlt tr.modl-sec-hdr td.lbl-col{background:rgba(251,191,36,.07);}
/* ── DES (redesigned) ── */
.des-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.des-name{font-size:16px;font-weight:700;color:var(--text);line-height:1.2;}
.des-sub{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.7;}
.des-prow{display:flex;align-items:baseline;gap:12px;margin-top:8px;}
.des-price{font-size:28px;font-weight:800;line-height:1;}
.des-chg{font-size:13px;font-weight:600;}
.des-desc-wrap{padding:8px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.des-desc{font-size:11px;color:var(--text);line-height:1.75;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.des-desc.expanded{-webkit-line-clamp:unset;overflow:visible;}
.des-more{font-size:10px;color:var(--cyan);cursor:pointer;margin-top:4px;display:inline-block;letter-spacing:.03em;}
.des-more:hover{opacity:.8;}
.des-main{flex:1;display:flex;overflow:hidden;}
.des-left{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
.des-chart-area{flex-shrink:0;height:300px;display:flex;flex-direction:column;}
.des-right{width:172px;flex-shrink:0;border-left:1px solid var(--bdr);overflow-y:auto;background:var(--bg);padding:8px 0;}
.des-rg{padding:0 12px 10px;}
.des-rg+.des-rg{border-top:1px solid var(--bdr);padding-top:10px;}
.des-rg-hd{font-size:10px;color:var(--amber);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;font-weight:700;}
.des-rrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.des-rl{font-size:11px;color:var(--dim);}
.des-rv{font-size:12px;font-weight:600;color:var(--text);}
.des-mode-btn{padding:2px 8px;font-size:10px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-family:var(--font);cursor:pointer;letter-spacing:.06em;transition:all .12s;}
.des-mode-btn.active{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.08);}

/* ── FA ── */
.fa-tabs{display:flex;gap:1px;padding:4px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.fat-btn{padding:2px 9px;font-size:10px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-family:var(--font);cursor:pointer;letter-spacing:.07em;}
.fat-btn.active{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.07);}
.fa-body{flex:1;overflow:auto;min-height:0;}
/* ── EM ── */
.em-sec-ok  {font-size:8px;color:var(--green);opacity:.7;vertical-align:super;}
.em-sec-warn{font-size:8px;color:var(--amber);vertical-align:super;}
.em-sec-na  {font-size:8px;color:var(--dim);vertical-align:super;}
/* ── ERN ── */
.ern-surp{display:inline-block;padding:1px 5px;border-radius:2px;font-size:10px;}
.ern-surp.up{background:rgba(74,222,128,.12);color:var(--green);}
.ern-surp.down{background:rgba(248,113,113,.12);color:var(--red);}
/* ── ECAL ── */
.ecal-chip{display:inline-flex;align-items:center;margin:2px 2px 0 0;padding:2px 6px;font-size:10px;color:var(--green);letter-spacing:.05em;cursor:pointer;border:1px solid rgba(74,222,128,.2);background:rgba(74,222,128,.04);white-space:nowrap;}
.ecal-chip:hover{background:rgba(74,222,128,.12);border-color:var(--green);}
.ecal-sec{font-size:8px;letter-spacing:.12em;padding:4px 6px 2px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.ecal-chips{display:flex;flex-wrap:wrap;padding:4px 6px;flex-shrink:0;align-content:flex-start;}
.ecal-col{background:var(--bg0);display:flex;flex-direction:column;overflow-y:auto;min-height:0;}
@keyframes ecal-pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.fa-body::-webkit-scrollbar{width:3px;}
.fa-body::-webkit-scrollbar-thumb{background:var(--muted);}
table.fat{width:100%;border-collapse:collapse;font-size:11px;}
table.fat th{padding:3px 8px;text-align:right;color:var(--dim);font-size:10px;letter-spacing:.08em;border-bottom:1px solid var(--bdr);font-weight:500;position:sticky;top:0;background:#0d0d0d;}
table.fat th:first-child{text-align:left;}
table.fat td{padding:3px 8px;text-align:right;border-bottom:1px solid #171717;}
table.fat td:first-child{text-align:left;color:var(--dim);font-size:10px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
table.fat tr:hover td{background:rgba(255,255,255,.02);}

/* ── CHART ── */
.chart-bar{display:flex;gap:2px;padding:4px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0;flex-wrap:wrap;}
.pb{padding:2px 6px;font-size:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-family:var(--font);cursor:pointer;letter-spacing:.05em;}
.pb.active{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.07);}
.pb:hover:not(.active){color:var(--text);}
.chart-cw{flex:1;padding:5px;min-height:0;position:relative;}
.chart-cw canvas{max-height:100%;}

/* ── CURVE ── */
.ctabs{display:flex;gap:2px;padding:4px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0;flex-wrap:wrap;}
.curve-metrics{display:grid;gap:1px;background:var(--bdr);flex-shrink:0;}
.cm-cell{background:var(--bg1);padding:6px 10px;}
.cm-k{font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;}
.cm-v{font-size:13px;font-weight:700;margin-top:2px;}
.curve-cw{height:160px;padding:5px 8px;flex-shrink:0;position:relative;}
.curve-note{padding:6px 10px;font-size:10px;color:var(--dim);border-top:1px solid var(--bdr);line-height:1.7;flex-shrink:0;}

/* ── NEWS ── */
.ni{padding:7px 10px;border-bottom:1px solid #171717;cursor:pointer;}
.ni:hover{background:rgba(255,255,255,.02);}
.ni-meta{display:flex;gap:8px;margin-bottom:2px;}
.ni-src{font-size:10px;color:var(--cyan);letter-spacing:.06em;}
.ni-time{font-size:10px;color:var(--dim);}
.ni-title{font-size:12px;color:var(--text);line-height:1.5;}
.ni-sum{font-size:10px;color:var(--dim);line-height:1.6;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── HDS ── */
table.hdst{width:100%;border-collapse:collapse;font-size:9px;}
table.hdst th{padding:3px 8px;text-align:right;color:var(--dim);font-size:10px;border-bottom:1px solid var(--bdr);font-weight:500;position:sticky;top:0;background:#0d0d0d;letter-spacing:.07em;}
table.hdst th:first-child{text-align:left;}
table.hdst td{padding:3px 8px;text-align:right;border-bottom:1px solid #171717;}
table.hdst td:first-child{text-align:left;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
table.hdst tr:hover td{background:rgba(255,255,255,.02);}

/* ── ANR ── */
.anr-consensus{display:flex;align-items:center;gap:14px;padding:8px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.anr-pill{padding:3px 12px;font-size:11px;font-weight:700;letter-spacing:.1em;border:1px solid;}
.buy{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.07);}
.hold{border-color:var(--amber);color:var(--amber);background:rgba(251,191,36,.07);}
.sell{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.07);}
.neutral{border-color:var(--dim);color:var(--dim);}
.anr-tg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bdr);flex-shrink:0;}
.at{background:var(--bg1);padding:5px 8px;}
.at-k{font-size:10px;color:var(--dim);letter-spacing:.1em;}
.at-v{font-size:13px;font-weight:700;margin-top:2px;}
.ud-hdr{display:grid;grid-template-columns:80px 1fr 90px 90px;gap:4px;padding:3px 10px;border-bottom:1px solid var(--bdr);font-size:8px;color:var(--dim);letter-spacing:.07em;flex-shrink:0;}
.ud-row{display:grid;grid-template-columns:80px 1fr 90px 90px;gap:4px;padding:4px 10px;border-bottom:1px solid #171717;font-size:9px;align-items:center;}
.ud-row:hover{background:rgba(255,255,255,.02);}
.ud-f{color:var(--cyan);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── MONITOR ── */
table.mont{width:100%;border-collapse:collapse;font-size:10px;}
table.mont th{padding:4px 10px;text-align:right;color:var(--dim);font-size:8px;letter-spacing:.08em;border-bottom:1px solid var(--bdr);font-weight:500;position:sticky;top:0;background:#0d0d0d;}
table.mont th:first-child{text-align:left;}
table.mont td{padding:5px 10px;text-align:right;border-bottom:1px solid #171717;}
table.mont td:first-child{text-align:left;}
table.mont tr:hover td{background:rgba(255,255,255,.02);}
.ms{color:var(--green);font-weight:700;}
.mn{color:var(--dim);font-size:9px;}
.most-tab{transition:color .15s,border-color .15s;}
.most-tab.active{color:var(--green)!important;border-color:var(--green)!important;}
/* FISC */
.fisc-tab{cursor:pointer;padding:3px 12px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;color:#666;transition:color .15s,border-color .15s;}
.fisc-tab.fa{color:var(--green)!important;border-color:var(--green)!important;}
.fisc-kpi{background:#111;border:1px solid #1e1e1e;border-radius:3px;padding:9px 12px;flex:1;min-width:140px;}
.fisc-kpi .fk-l{font-size:7.5px;color:#555;letter-spacing:.1em;margin-bottom:4px}
.fisc-kpi .fk-v{font-size:17px;color:#ddd;font-weight:700;line-height:1}
.fisc-kpi .fk-s{font-size:8px;margin-top:4px}
/* MACRO */
.mac-tab{cursor:pointer;padding:3px 12px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;color:#555;transition:color .15s,border-color .15s;}
.mac-tab.active{color:var(--green)!important;border-color:var(--green)!important;}
.mac-kpi{background:#080808;border:1px solid #1a1a1a;border-radius:3px;padding:10px 14px;flex:1;min-width:160px;}
.mac-kpi .mk-l{font-size:9px;color:#666;letter-spacing:.12em;margin-bottom:6px;text-transform:uppercase}
.mac-kpi .mk-v{font-size:22px;color:#e0e0e0;font-weight:700;line-height:1}
.mac-kpi .mk-d{font-size:10px;margin-top:5px;color:#888}
.mac-src{font-size:8px;color:#444;letter-spacing:.06em;margin-top:4px}
/* ECON */
.econ-hi{border-left:3px solid #ef4444}
.econ-med{border-left:3px solid #f59e0b}
.econ-lo{border-left:3px solid #374151}
.econ-beat{color:#4ade80}
.econ-miss{color:#ef4444}
.econ-inline{color:#94a3b8}
/* PRED */
.pred-cat{color:#888;transition:color .15s,border-color .15s;}
.pred-cat-a{color:var(--green)!important;border-color:var(--green)!important;}
.pred-plat{transition:color .15s,border-color .15s;}
.pred-plat-a{color:#ddd!important;border-color:#666!important;}
.pred-sort-opt:hover{background:#1e1e1e;}

/* ── HP ── */
table.hpt{width:100%;border-collapse:collapse;font-size:9px;}
table.hpt th{padding:3px 8px;text-align:right;color:var(--dim);font-size:8px;letter-spacing:.07em;border-bottom:1px solid var(--bdr);font-weight:500;position:sticky;top:0;background:#0d0d0d;}
table.hpt th:first-child{text-align:left;}
table.hpt td{padding:3px 8px;text-align:right;border-bottom:1px solid #171717;}
table.hpt td:first-child{text-align:left;color:var(--dim);}

/* ── CF ── */
.fr{display:grid;grid-template-columns:60px 90px 95px 1fr;gap:8px;padding:5px 10px;border-bottom:1px solid #171717;align-items:center;font-size:9px;cursor:pointer;}
.fr:hover{background:rgba(255,255,255,.02);}
.fbdg{font-size:8px;padding:2px 5px;border:1px solid;text-align:center;letter-spacing:.05em;}
.f10K{border-color:var(--cyan);color:var(--cyan);}
.f10Q{border-color:var(--green);color:var(--green);}
.f8K{border-color:var(--amber);color:var(--amber);}
.foth{border-color:var(--dim);color:var(--dim);}

/* ── HELP ── */
.hr{display:grid;grid-template-columns:72px 1fr 170px;gap:8px;padding:5px 10px;border-bottom:1px solid #171717;}
.hk{color:var(--green);font-size:11px;font-weight:700;}
.ht{color:var(--text);font-size:10px;}
.hex{color:var(--dim);font-size:8px;margin-top:1px;}

/* ── UTILS ── */
.up{color:var(--green)!important;} .down{color:var(--red)!important;} .flat{color:var(--dim)!important;}
.pill{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:600;}
.pill.up{color:var(--green);} .pill.down{color:var(--red);} .pill.flat{color:var(--dim);}
.load{display:flex;align-items:center;gap:8px;padding:16px 14px;color:var(--dim);font-size:12px;}
.sp{width:12px;height:12px;border:1px solid var(--muted);border-top-color:var(--green);border-radius:50%;animation:spin .5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:var(--red);font-size:12px;padding:10px 12px;border-left:2px solid var(--red);margin:8px;background:rgba(248,113,113,.05);line-height:1.7;}
.empty{color:var(--dim);font-size:12px;padding:20px;text-align:center;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--muted);}

/* ── PDF DENSITY OVERRIDES ── */
body.density-compact table.qmt td,body.density-compact table.qmt th{padding:3px 6px!important;font-size:11px!important;}
body.density-compact table.glco-tbl td,body.density-compact table.glco-tbl th{padding:2px 8px!important;font-size:10px!important;}
body.density-compact table.fxm td,body.density-compact table.fxm th{padding:2px 5px!important;font-size:8px!important;}
body.density-compact table.sovgt td,body.density-compact table.sovgt th{padding:2px 8px!important;}
body.density-compact table.modlt td,body.density-compact table.modlt th{padding:2px 6px!important;font-size:10px!important;}
body.density-relaxed table.qmt td,body.density-relaxed table.qmt th{padding:12px 14px!important;font-size:14px!important;}
body.density-relaxed table.glco-tbl td,body.density-relaxed table.glco-tbl th{padding:8px 14px!important;font-size:12px!important;}
body.density-relaxed table.fxm td,body.density-relaxed table.fxm th{padding:6px 10px!important;}
body.density-relaxed table.sovgt td,body.density-relaxed table.sovgt th{padding:6px 12px!important;font-size:11px!important;}

/* ── SOVG SOVEREIGN BONDS ── */
.sovg-toolbar{display:flex;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;flex-wrap:wrap;background:#0a0a0a;}
.sovg-search{background:transparent;border:1px solid var(--bdr2);color:var(--green);font-family:var(--font);font-size:10px;padding:3px 8px;width:150px;outline:none;letter-spacing:.05em;}
.sovg-search::placeholder{color:var(--dim);}
.sovg-search:focus{border-color:var(--green);}
.rg-btn{padding:2px 8px;font-size:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-family:var(--font);cursor:pointer;letter-spacing:.07em;transition:all .12s;}
.rg-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(56,189,248,.07);}
.rg-btn:hover:not(.active){color:var(--text);}
table.sovgt{width:100%;border-collapse:collapse;font-size:10px;}
table.sovgt thead tr{background:#0a0a0a;position:sticky;top:0;z-index:1;}
table.sovgt th{padding:4px 10px;text-align:right;color:var(--dim);font-size:8px;font-weight:500;letter-spacing:.1em;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;}
table.sovgt th:nth-child(1),table.sovgt th:nth-child(2){text-align:left;}
table.sovgt th.sort-asc::after{content:' ↑';color:var(--cyan);}
table.sovgt th.sort-desc::after{content:' ↓';color:var(--cyan);}
table.sovgt td{padding:5px 10px;text-align:right;border-bottom:1px solid #171717;white-space:nowrap;}
table.sovgt td:nth-child(1),table.sovgt td:nth-child(2){text-align:left;}
table.sovgt tr.data-row:hover td{background:rgba(255,255,255,.025);cursor:pointer;}
.bond-flag{font-size:13px;line-height:1;vertical-align:middle;}
.bond-name{font-size:10px;color:var(--text);font-weight:500;}
.bond-ccy{font-size:8px;color:var(--dim);}
.rating-badge{font-size:7px;padding:1px 5px;border:1px solid;letter-spacing:.05em;display:inline-block;}
.rAAA,.rAAp,.rAA,.rAAm{border-color:rgba(74,222,128,.5);color:var(--green);}
.rAp,.rA,.rAm{border-color:rgba(56,189,248,.5);color:var(--cyan);}
.rBBBp,.rBBB,.rBBBm{border-color:rgba(251,191,36,.5);color:var(--amber);}
.rBBp,.rBB,.rBBm,.rBp,.rB,.rBm,.rCCC{border-color:rgba(248,113,113,.5);color:var(--red);}
/* ── SOVM SOVEREIGN DEBT MONITOR ── */
.sovm-topbar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:#0a0a0a;gap:8px;flex-wrap:wrap;}
.sovm-sel{background:var(--bg1);color:var(--cyan);border:1px solid var(--bdr);border-radius:3px;padding:3px 6px;font-family:var(--font);font-size:12px;cursor:pointer;outline:none;}
.gp-mode-sel{background:#0a0a0a;border:1px solid #252525;color:var(--orange);font-family:var(--font);font-size:11px;padding:3px 6px;border-radius:2px;outline:none;cursor:pointer;letter-spacing:.06em;}
.gp-matog{cursor:pointer;padding:2px 6px;font-size:10px;border:1px solid var(--bdr);border-radius:2px;color:var(--dim);font-family:var(--font);transition:color .12s,border-color .12s;display:inline-flex;align-items:center;gap:2px;}
.gp-matog.active{color:#a78bfa;border-color:#a78bfa;}
.gp-lbl{font-size:10px;color:var(--dim);letter-spacing:.06em;}
.gp-ac{position:relative;display:inline-flex;}
.gp-ac-inp{background:var(--bg1);color:var(--text);border:1px solid var(--bdr);border-radius:2px;padding:3px 7px;font-family:var(--font);font-size:11px;outline:none;width:152px;cursor:text;transition:border-color .12s;}
.gp-ac-inp:focus{border-color:var(--orange);}
.gp-ac-dd{position:absolute;top:calc(100% + 3px);left:0;z-index:9999;background:#0f0f0f;border:1px solid var(--orange);min-width:280px;max-height:220px;overflow-y:auto;display:none;box-shadow:0 6px 24px rgba(0,0,0,.85);}
.gp-ac-grp{padding:3px 10px;font-size:8px;color:var(--dim);letter-spacing:.12em;background:#080808;text-transform:uppercase;border-top:1px solid var(--bdr);}
.gp-ac-grp:first-child{border-top:none;}
.gp-ac-it{padding:5px 10px;cursor:pointer;display:flex;gap:10px;align-items:baseline;border-bottom:1px solid #141414;}
.gp-ac-it:hover,.gp-ac-it.hi{background:var(--bg3);}
.gp-ac-id{color:var(--orange);font-weight:600;font-size:10px;min-width:88px;flex-shrink:0;}
.gp-ac-it:hover .gp-ac-id,.gp-ac-it.hi .gp-ac-id{color:#fff;}
.gp-ac-lb{color:var(--dim);font-size:9px;}
.gp-ac-it:hover .gp-ac-lb,.gp-ac-it.hi .gp-ac-lb{color:var(--text);}
.gp-ac-none{padding:8px 10px;font-size:9px;color:var(--dim);font-style:italic;}
.sovm-rng{padding:3px 9px;font-size:11px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-family:var(--font);cursor:pointer;letter-spacing:.07em;transition:all .12s;}
.sovm-rng.active{border-color:var(--cyan);color:var(--cyan);background:rgba(56,189,248,.08);}
.sovm-rng:hover:not(.active){color:var(--text);}
.sovm-body{flex:1;overflow:auto;}
table.sovmt{width:100%;border-collapse:collapse;font-size:12px;}
table.sovmt thead tr{background:#0a0a0a;position:sticky;top:0;z-index:2;}
table.sovmt th{padding:4px 9px;text-align:right;color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.06em;border-bottom:1px solid var(--bdr);white-space:nowrap;}
table.sovmt th:first-child{text-align:left;}
table.sovmt td{padding:4px 9px;white-space:nowrap;font-size:12px;}
table.sovmt td:first-child{text-align:left;color:var(--text);font-weight:600;}
table.sovmt td.sovm-n{text-align:right;font-variant-numeric:tabular-nums;}
table.sovmt td.sovm-c{text-align:center;}
table.sovmt tr.sovm-row:hover td{background:rgba(255,255,255,.02);}
table.sovmt tr.sovm-sect td{color:var(--amber);font-size:10px;font-weight:700;letter-spacing:.1em;padding:6px 9px 3px;border-top:1px solid var(--bdr);background:#0a0a0a;}
table.sovmt td.sovm-na{color:var(--dim);font-style:italic;text-align:center;padding:6px;font-size:11px;}
.sovm-up{color:var(--red)!important;}
.sovm-dn{color:var(--green)!important;}
.sovm-hi{background:rgba(248,113,113,.15);color:var(--red);}
.sovm-lo{background:rgba(74,222,128,.15);color:var(--green);}
.sovm-dim{color:var(--dim);}
.sovg-hdr{padding:10px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.sovg-flag-name{display:flex;align-items:center;gap:10px;}
.sovg-flag-lg{font-size:36px;line-height:1;}
.sovg-ctry-name{font-size:15px;font-weight:700;}
.sovg-ctry-sub{font-size:8px;color:var(--dim);margin-top:3px;line-height:1.8;}
.sovg-bench-yield{font-size:40px;font-weight:800;line-height:1;color:var(--cyan);text-align:right;}
.sovg-bench-lbl{font-size:9px;color:var(--dim);text-align:right;margin-top:3px;}
.sovg-metrics{display:grid;gap:1px;background:var(--bdr);flex-shrink:0;}
.sm{background:var(--bg1);padding:6px 10px;}
.sm-k{font-size:7px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;}
.sm-v{font-size:13px;font-weight:700;margin-top:2px;}
.curve-tenors{display:grid;gap:1px;background:var(--bdr);flex-shrink:0;}
.ct{background:var(--bg1);padding:5px 10px;text-align:center;}
.ct-t{font-size:7px;color:var(--dim);letter-spacing:.1em;}
.ct-y{font-size:13px;font-weight:700;margin-top:2px;color:var(--cyan);}
.sovg-section-lbl{font-size:7px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;padding:5px 10px 3px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.sovg-chart-wrap{padding:5px 8px;flex-shrink:0;position:relative;}



/* ── CLI ── */
.clp{color:var(--green);font-size:13px;font-weight:700;white-space:nowrap;text-shadow:0 0 8px rgba(74,222,128,.3);}
.cl-hint{font-size:10px;color:var(--muted);letter-spacing:.07em;white-space:nowrap;}
.cl-line{font-size:12px;line-height:1.8;}
.cl-cmd{color:var(--dim);} .cl-out{color:var(--green);} .cl-err{color:var(--red);} .cl-info{color:var(--cyan);} .cl-warn{color:var(--amber);}

/* ── BATCH ── */
#batch-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:center;justify-content:center;}
#batch-ov.open{display:flex;}
.batch-box{background:var(--bg2);border:1px solid var(--bdr2);padding:16px;width:280px;}
.batch-box h3{font-size:11px;color:var(--green);letter-spacing:.1em;margin-bottom:10px;}
.batch-box textarea{width:100%;height:110px;background:#0a0a0a;border:1px solid var(--bdr2);color:var(--text);font-family:var(--font);font-size:11px;padding:7px;resize:none;outline:none;text-transform:uppercase;}
.batch-box textarea::placeholder{text-transform:none;color:var(--dim);}
.batch-btns{display:flex;gap:6px;margin-top:8px;}
.bb{flex:1;padding:5px;border:1px solid var(--bdr2);background:transparent;color:var(--text);font-family:var(--font);font-size:10px;cursor:pointer;}
.bb.p{border-color:var(--green);color:var(--green);}
.bb:hover{background:rgba(255,255,255,.04);}

/* add-row input */
.qadd-inp{background:transparent;border:none;outline:none;color:var(--green);font-family:var(--font);font-size:11px;width:140px;text-transform:uppercase;}
.qadd-inp::placeholder{text-transform:none;color:var(--dim);}

/* ── COMMAND PALETTE ── */
#cmd-palette{position:fixed;top:51px;left:0;width:480px;background:#0a0a0a;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);z-index:299;display:none;flex-direction:column;max-height:calc(100vh - 56px);}
#cmd-palette.open{display:flex;}
#cp-body{flex:1;overflow-y:auto;}
.cp-section{padding:7px 16px 6px;font-size:10px;letter-spacing:.18em;color:var(--dim);border-bottom:1px solid var(--bdr);text-transform:uppercase;}
.cp-row{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-bottom:1px solid #111;border-left:2px solid transparent;transition:background .08s,border-color .08s;}
.cp-row:hover{background:#131313;}
.cp-row.cp-active{background:#181818;border-left:2px solid var(--orange);}
.cp-key{background:#b45309;color:#fef08a;font-weight:700;font-size:11px;padding:2px 7px;border-radius:3px;letter-spacing:.05em;flex-shrink:0;font-family:var(--font);}
.cp-desc{color:#9ca3af;font-size:11px;flex:1;}
.cp-row.cp-active .cp-desc{color:#f3f4f6;}
.cp-fkey{color:#6b7280;font-size:10px;font-weight:600;}
.cp-ac-key{background:#052e16;color:#4ade80;font-weight:700;font-size:11px;padding:2px 7px;border-radius:3px;letter-spacing:.05em;flex-shrink:0;font-family:var(--font);}
.cp-ticker-pill{background:#1c1917;color:#a8a29e;font-weight:700;font-size:11px;padding:2px 6px;border-radius:3px;letter-spacing:.05em;flex-shrink:0;font-family:var(--font);}
.cp-enter{margin-left:auto;font-size:10px;color:#374151;letter-spacing:.05em;flex-shrink:0;}
.cp-row.cp-active .cp-enter{color:#6b7280;}
.cp-hint{padding:5px 12px;font-size:8px;color:var(--muted);letter-spacing:.05em;border-top:1px solid var(--bdr);flex-shrink:0;}

/* CLI output log (bottom) */
#cli-wrap{position:fixed;bottom:0;left:0;right:0;z-index:300;pointer-events:none;}
#cli-wrap.open{pointer-events:all;}
#cli-hist-box{display:none;max-height:110px;overflow-y:auto;background:#060606;padding:3px 14px;border-top:1px solid var(--bdr);}
#cli-wrap.open #cli-hist-box{display:block;}

/* typewriter cursor blink */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.tw-cursor{animation:blink .7s step-end infinite;color:var(--green);}

/* ── GLCO / FX table ── */
table.glco-tbl{width:100%;border-collapse:collapse;font-size:12px;}
table.glco-tbl th{padding:4px 10px;text-align:right;color:var(--dim);font-size:10px;letter-spacing:.08em;border-bottom:1px solid var(--bdr);font-weight:500;position:sticky;top:0;background:#0d0d0d;white-space:nowrap;}
table.glco-tbl th:first-child{text-align:left;}
table.glco-tbl td{padding:3px 10px;text-align:right;border-bottom:1px solid #111;white-space:nowrap;}
table.glco-tbl td:first-child{text-align:left;}
table.glco-tbl tr:hover td{background:rgba(255,255,255,.025);}
tr.glco-cat td{padding:5px 10px 3px;color:#3a3a3a;font-size:9px;letter-spacing:.14em;border-bottom:1px solid #1a1a1a;border-top:1px solid #1a1a1a;background:#080808;}
.glco-name{color:#c8c8c8;font-weight:500;}
.glco-num{font-variant-numeric:tabular-nums;font-size:12px;}

/* ── FX Matrix ── */
.fx-tab{cursor:pointer;padding:2px 8px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;color:var(--dim);font-family:var(--font);letter-spacing:.08em;transition:color .15s,border-color .15s;}
.fx-tab.active{color:var(--orange);border-color:var(--orange);}
table.fxm{border-collapse:collapse;font-size:11px;white-space:nowrap;}
table.fxm th{padding:5px 8px;text-align:center;color:var(--dim);font-size:8px;letter-spacing:.06em;border-bottom:1px solid var(--bdr);background:#0d0d0d;position:sticky;top:0;z-index:2;}
table.fxm th.fxm-row-hdr{position:sticky;left:0;z-index:3;background:#0d0d0d;text-align:left;border-right:1px solid var(--bdr);}
table.fxm td{padding:5px 8px;text-align:right;border-bottom:1px solid #0f0f0f;border-right:1px solid #0f0f0f;font-variant-numeric:tabular-nums;min-width:62px;}
table.fxm td.fxm-self{background:#060606;color:#222;text-align:center;}
table.fxm td.fxm-row-hdr{position:sticky;left:0;z-index:1;background:#0d0d0d;border-right:1px solid var(--bdr);text-align:left;padding:5px 10px;color:#ccc;font-weight:600;letter-spacing:.04em;}
table.fxm tr:hover td{filter:brightness(1.18);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="tb-left">
    <span id="tb-prompt">></span>
    <div class="tb-hint" id="tb-hint"></div>
    <input id="cli-inp" type="text" placeholder="" autocomplete="off" spellcheck="false">
    <span id="tb-cursor"></span>
  </div>
  <div class="tb-right">
    <span class="tb-cmd" onclick="runCmd('SOVG')">SOVG</span>
    <span class="tb-cmd" onclick="runCmd('HELP')">HELP</span>

];

const palette = document.getElementById('cmd-palette');
let paletteIdx = -1;

function paletteBranch(){
  const val=cliInp.value;
  const trimmed=val.trim().toUpperCase();
  const pts=trimmed.split(/\s+/);
  const first=pts[0]||'';

  // Asset class mode: single ticker typed then space pressed
  if(first&&!PURE.has(first)&&pts.length===1&&val.endsWith(' ')){
    return {cmds:ASSET_CLASSES,ticker:first,mode:'asset_class',filter:''};
  }
  // Ticker mode: ticker + at least one more token
  if(first&&!PURE.has(first)&&pts.length>=2){
    const last=pts[pts.length-1];
    const filter=SKIP.has(last)?'':last;
    const filtered=filter?TICKER_CMDS.filter(c=>c.key.startsWith(filter)):TICKER_CMDS;
    return {cmds:filtered,ticker:first,mode:'ticker',filter};
  }
  // Global mode: filter by typed prefix
  const filter=first;
  const filtered=filter?GLOBAL_CMDS.filter(c=>c.key.startsWith(filter)):GLOBAL_CMDS;
  return {cmds:filtered,ticker:null,mode:'global',filter};
}

function renderPalette(){
  if(!cliInp.classList.contains('active')){palette.classList.remove('open');return;}
  palette.classList.add('open');
  const {cmds,ticker,mode}=paletteBranch();
  const body=document.getElementById('cp-body');
  if(!body) return;
  const header=mode==='asset_class'?'Asset Classes':'Commands';
  body.innerHTML=`
    <div class="cp-section">${header}</div>
    ${cmds.length===0
      ?`<div style="padding:10px 16px;font-size:10px;color:var(--dim);">No matches</div>`
      :cmds.map((c,i)=>`
      <div class="cp-row${i===paletteIdx?' cp-active':''}" data-i="${i}" onclick="_paletteExec(${i})">
        ${mode==='ticker'?`<span class="cp-ticker-pill">${ticker}</span>`:''}
        <span class="${mode==='asset_class'?'cp-ac-key':'cp-key'}">${c.key}</span>
        <span class="cp-desc">${c.desc}${c.fkey?` <span class="cp-fkey">(${c.fkey})</span>`:''}</span>
        <span class="cp-enter">${i===paletteIdx?(mode==='asset_class'?'Tab » to fill':'Enter ↵'):''}</span>
      </div>`).join('')}
  `;
  const active=body.querySelector('.cp-active');
  if(active) active.scrollIntoView({block:'nearest'});
}

window._paletteExec=function(idx){
  const {cmds,ticker,mode}=paletteBranch();
  const cmd=cmds[idx]; if(!cmd) return;
  if(mode==='asset_class'){
    cliInp.value=ticker+' '+cmd.key+' ';
    paletteIdx=0; renderPalette(); cliInp.focus();
    const len=cliInp.value.length; cliInp.setSelectionRange(len,len);
    return;
  }
  const rawInput=cliInp.value.trim().toUpperCase();
  const full=mode==='ticker'&&ticker
    ?`${ticker} ${cmd.key}`
    :(mode==='global'&&rawInput.startsWith(cmd.key+' ')?rawInput:cmd.key);
  cmdHist.unshift(full); histIdx=-1;
  clog(`> ${full}`,'cl-cmd');
  parseRun(full);
  closeTerminal();
};

function paletteMove(dir){
  const {cmds}=paletteBranch();
  if(!cmds.length) return;
  if(paletteIdx===-1) paletteIdx= dir>0 ? 0 : cmds.length-1;
  else paletteIdx=Math.max(0,Math.min(paletteIdx+dir, cmds.length-1));
  renderPalette();
}

// ── OPEN / CLOSE HELPERS ───────────────────────────────────────────
const tbCursor=document.getElementById('tb-cursor');

function positionCursor(){
  const prompt=document.getElementById('tb-prompt');
  const base=prompt.offsetLeft+prompt.offsetWidth+10; // 10px = margin-right of prompt
  const canvas=positionCursor._c||(positionCursor._c=document.createElement('canvas'));
  const ctx=canvas.getContext('2d');
  ctx.font='19px JetBrains Mono, monospace';
  const tw=ctx.measureText(cliInp.value.toUpperCase()).width;
  tbCursor.style.left=(base+tw)+'px';
}

function openTerminal(){
  cliInp.classList.add('active');
  document.getElementById('tb-hint').style.display='none';
  tbCursor.classList.add('active');
  cliInp.value='';
  positionCursor();
  cliInp.focus();
  const {cmds}=paletteBranch();
  paletteIdx=cmds.length>0?0:-1;
  renderPalette();
}
function closeTerminal(){
  cliInp.classList.remove('active');
  cliInp.value='';
  tbCursor.classList.remove('active');
  document.getElementById('tb-hint').style.display='';
  palette.classList.remove('open');
  cliWrap.classList.remove('open');
  paletteIdx=-1;
}
async function showInlineQuote(tk){
  const el=document.getElementById('tb-hint');
  try{
    const r=await fetch(`${API}/quote/${tk}`).then(x=>x.json());
    if(!r.ok)return;
    const d=cd(r.changePct);
    const col=d==='up'?'var(--green)':d==='down'?'var(--red)':'var(--dim)';
    const arr=r.changePct>0.05?'▲':r.changePct<-0.05?'▼':'●';
    const chg=(r.change>=0?'+':'')+r.change.toFixed(2);
    const dec=r.price>1000?0:2;
    const dt=r.date?r.date.slice(0,10).replace(/-/g,'/'):'';
    el.innerHTML=
      `<span style="color:#fff;font-weight:700;font-size:15px;letter-spacing:.05em">${tk}</span>`+
      `<span style="color:#666;font-size:12px;margin-left:6px">${r.exchange||''}</span>`+
      `<span style="color:${col};font-size:15px;font-weight:600;margin-left:12px">${arr} $${r.price.toFixed(dec)} ${chg} ${(r.changePct>=0?'+':'')+r.changePct.toFixed(2)}%</span>`+
      `<span style="color:#aaa;font-size:13px;margin-left:12px">Vol <span style="color:#fff;font-weight:600">${fv(r.volume)}</span></span>`+
      `<span style="color:#aaa;font-size:13px;margin-left:12px">At: <span style="color:#fff;font-weight:600">${dt}</span></span>`;
  }catch{/* keep existing hint content */}
}

// ── KEYBOARD HANDLERS ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  // Backtick: toggle CLI
  if(e.key==='`'||e.key==='~'){
    e.preventDefault();
    cliInp.classList.contains('active')?closeTerminal():openTerminal();
    return;
  }
  // F1–F12: Bloomberg function keys (work whether CLI is open or closed)
  if(e.key.startsWith('F')&&e.key.length<=3&&!isNaN(e.key.slice(1))){
    const n=parseInt(e.key.slice(1),10);
    if(n>=1&&n<=12){e.preventDefault();fkPress(n);return;}
  }
  // PageUp = BACK: scroll topmost window up
  if(e.key==='PageUp'&&!e.target.matches('input,textarea')){
    e.preventDefault();
    const w=getTopmostWin();
    if(w){const s=w.querySelector('.wbody,.qm-scroll');if(s)s.scrollTop-=200;}
    return;
  }
  // Escape = MENU: close topmost window (only when CLI is already closed)
  if(e.key==='Escape'&&!cliInp.classList.contains('active')){
    const w=getTopmostWin();
    if(w)cw(w.id);
    return;
  }
  // Auto-focus CLI when typing
  if(cliInp.classList.contains('active')&&e.target!==cliInp&&!e.target.matches('input,textarea'))cliInp.focus();
});

cliInp.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'){e.preventDefault(); paletteMove(-1); return;}
  if(e.key==='ArrowDown'){e.preventDefault(); paletteMove(1); return;}
  if(e.key==='Enter'){
    if(paletteIdx>=0){e.preventDefault();window._paletteExec(paletteIdx);return;}
    const r=cliInp.value.trim(); if(!r)return;
    cmdHist.unshift(r); histIdx=-1;
    clog(`> ${r}`,'cl-cmd');
    parseRun(r.toUpperCase());
    closeTerminal();
    return;
  }
  if(e.key==='Tab'){e.preventDefault();if(paletteBranch().mode==='asset_class'&&paletteIdx>=0)window._paletteExec(paletteIdx);return;}
  if(e.key==='Escape'){closeTerminal();return;}
});

cliInp.addEventListener('input',()=>{histIdx=-1; const {cmds}=paletteBranch(); paletteIdx=cmds.length>0?0:-1; renderPalette(); positionCursor();});

// ── BLOOMBERG FUNCTION KEY HANDLER ──────────────────────────────
const FKEY_QUALIFIER={2:'CUR',3:'CORP',8:'EQ',9:'OPT',10:'IDX',12:'FUT'};
const FKEY_OVERVIEW={1:'HELP',2:'FX',8:'EQS',9:'GLCO',10:'WEI',11:'FX'};
function fkPress(n){
  const {mode}=paletteBranch();
  // In asset class mode: F-key fills the corresponding qualifier
  if(mode==='asset_class'&&FKEY_QUALIFIER[n]){
    const idx=ASSET_CLASSES.findIndex(c=>c.key===FKEY_QUALIFIER[n]);
    if(idx>=0) window._paletteExec(idx);
    return;
  }
  // Otherwise: run the overview command for this asset class
  const ov=FKEY_OVERVIEW[n];
  if(ov) parseRun(ov);
  if(cliInp.classList.contains('active')) closeTerminal();
}

function clog(msg,cls='cl-out'){const d=document.createElement('div');d.className=`cl-line ${cls}`;d.textContent=msg;cliHist.appendChild(d);cliHist.parentElement.scrollTop=9999;if(cliHist.children.length>60)cliHist.removeChild(cliHist.firstChild);}
function runCmd(cmd){parseRun(cmd.toUpperCase());}

// ── TYPEWRITER HINT ────────────────────────────────────────────────
(function(){
  const el=document.getElementById('tb-hint');
  const txt='Backtick to open terminal';
  let i=0;
  el.innerHTML='<b style="color:#3d3d3d;font-weight:400">` </b><span class="tw-cursor">_</span>';
  const t=setInterval(()=>{
    i++;
    el.innerHTML=`<b style="color:#3d3d3d;font-weight:400">\` </b><span style="color:var(--dim)">${txt.slice(0,i)}</span>${i<txt.length?'<span class="tw-cursor">_</span>':''}`;
    if(i>=txt.length) clearInterval(t);
  },45);
})();

// ── PARSER ─────────────────────────────────────
const PURE=new Set(['HELP','WEI','GLCO','FX','MOST','EQS','GC','QM','SOVG','WB','GOVT','PRED','FISC','ECO','MAC','RATE','SOVM','CORP','MTGE','M-MKT','MUNI','PFD','PORT','GP','BIO','NI','ECAL','PDF','MODL','WCR']);
const SKIP=new Set(['US','EQ','UK','EU','ETF','CM','JP','CN','HK','CUR','OPT','FUT','IDX','ETC','GOV','CORP']);
const TICKER_ALIAS={
  BITCOIN:'BTC-USD', BTC:'BTC-USD',
  ETHEREUM:'ETH-USD', ETH:'ETH-USD',
  SOLANA:'SOL-USD',  SOL:'SOL-USD',
};
function parseRun(raw){
  const pts=raw.trim().split(/\s+/);
  // Resolve crypto aliases on the first token
  if(TICKER_ALIAS[pts[0]])pts[0]=TICKER_ALIAS[pts[0]];

  // Pure commands with optional country argument: SOVG US, WB DE, GOVT JP, SOVM DE
  if(['SOVG','WB','GOVT','SOVM'].includes(pts[0])){
    dispatch(null, pts[0], pts.slice(1));
    return;
  }
  if(PURE.has(pts[0])){dispatch(null,pts[0],pts.slice(1));return;}
  if(pts.length===1){dispatch(pts[0],'Q',[]);return;}

  // Handle "US SOVG" / "DE SOVM" pattern (country then command)
  if(pts.length===2 && ['SOVG','WB','GOVT','SOVM'].includes(pts[1])){
    dispatch(null, pts[1], [pts[0]]);
    return;
  }

  let i=1;while(i<pts.length&&SKIP.has(pts[i]))i++;
  dispatch(pts[0],pts[i]||'Q',pts.slice(i+1));
}
function dispatch(t,cmd,args){
  clog(`→ ${t||''} ${cmd}`,'cl-info');
  switch(cmd){
    case'Q':    return showInlineQuote(t);
    case'DES':  return ow('des', t,`DES · ${t}`, 720,580,(e,tk,id)=>doDes(e,tk,id));
    case'FA':   return ow('fa',  t,`FA · ${t}`,  560,420,(e,tk,id)=>doFa(e,tk));
    case'G':    return ow('g',   t,`G · ${t}`,   720,520,(e,tk,id)=>doG(e,tk,'D',id));
    case'GIP':  return ow('g',   t,`GIP · ${t}`, 720,520,(e,tk,id)=>doG(e,tk,'1',id));
    case'N':    return ow('n',   t,`N · ${t}`,   400,440,(e,tk)=>doN(e,tk));
    case'HDS':  return ow('hds', t,`HDS · ${t}`, 520,380,(e,tk)=>doHds(e,tk));
    case'ANR':  return ow('anr', t,`ANR · ${t}`, 520,420,(e,tk)=>doAnr(e,tk));
    case'CF':   return ow('cf',  t,`CF · ${t}`,  520,380,(e,tk)=>doCf(e,tk));
    case'HP':   return ow('hp',  t,`HP · ${t}`,  500,380,(e,tk)=>doHp(e,tk));
    case'FOCUS':return ow('foc', t,`FOCUS · ${t}`,300,110,(e,tk,id)=>doFocus(e,tk,id));
    case'WEI':  return ow('mon', null,'WEI',       460,440,(e)=>doWei(e));
    case'GLCO': return ow('mon', null,'GLCO · COMMODITIES',620,520,(e,tk,id)=>doGlco(e,id));
    case'FX':   return ow('mon', null,'FX · FOREX',980,560,(e,tk,id)=>doFx(e,id));
    case'WCR':  return ow('mon', null,'WCR · WORLD CURRENCY RATES',680,520,(e,tk,id)=>doWcr(e,id));
    case'MOST': return ow('mon', null,'MOST',      460,380,(e)=>doMost(e));
    case'PRED': return ow('mon', null,'PRED · PREDICTION MARKETS',860,540,(e,_,id)=>doPred(e,id));
    case'FISC': return ow('mon', null,'FISC · US TREASURY FISCAL',940,580,(e,t,id)=>doFisc(e,id));
    case'ECO':  return ow('mon', null,'ECO · ECONOMIC CALENDAR',1060,600,(e)=>doEco(e));
    case'MAC':  return ow('mon',null,'MAC · US MACROECONOMIC INDICATORS',960,600,(e,t,id)=>doMacro(e,id));
    case'RATE': return ow('mon',null,'RATE · KEY RATES MONITOR',480,640,(e)=>doRate(e));
    case'EQS':  return ow('mon', null,'EQS · EQUITY SCREENER',940,560,(e,t,wid)=>doEqs(e,wid));
    case'GC':   return ow('gc',  null,'GC · CURVES',860,560,(e,tk,id)=>doGc(e,id));
    case'GP':   return ow('gp',  null,'GP · GRAPH PLOT',1060,580,(e,tk,id)=>doGp(e,id));
    case'SOVG': return args[0]
      ? ow('sovg', args[0].toUpperCase(), `SOVG · ${args[0].toUpperCase()}`, 680, 560, (e,tk,id)=>doSovgCountry(e, args[0].toUpperCase(), id))
      : ow('sovg', null, 'SOVG · WORLD BONDS', 860, 560, (e,tk,id)=>doSovgWorld(e,id));
    case'WB':   return ow('sovg', null, 'WB · WORLD BONDS', 860, 560, (e,tk,id)=>doSovgWorld(e,id));
    case'GOVT':
      // GOVT <CC> → country detail, GOVT alone → world monitor
      return args[0]
        ? ow('sovg', args[0].toUpperCase(), `GOVT · ${args[0].toUpperCase()}`, 680, 560, (e,tk,id)=>doSovgCountry(e, args[0].toUpperCase(), id))
        : ow('sovg', null, 'GOVT · WORLD BONDS', 860, 560, (e,tk,id)=>doSovgWorld(e,id));
    case'SOVM': {
      const cc=(args[0]||'US').toUpperCase();
      return ow('sovm',cc,`SOVM · ${cc} · SOVEREIGN DEBT MONITOR`,1120,580,(e,tk,id)=>doSOVM(e,cc,id));
    }
    case'MODL': return ow('modl',t,`MODL · ${t} · FINANCIAL MODEL`,1200,620,(e,tk,id)=>doModl(e,tk,id));
    case'ERN':  return ow('ern', t,`ERN · ${t}`,640,520,(e,tk)=>doErn(e,tk));
    case'EM':   return ow('em',  t,`EM · ${t}`,1080,640,(e,tk,id)=>doEm(e,tk,id));
    case'ECAL': return ow('ecal',null,'ECAL · EARNINGS CALENDAR',1020,580,(e)=>doEcal(e));
    case'QM':   return openQM();
    case'NI':   {const q=args.join(' ');return ow('bio',null,`NI · ${q||'INTELLIGENCE'}`,580,520,(e)=>doBio(e,q));}
    case'BIO':  {const q=args.join(' ');return ow('bio',null,`BIO · ${q||'RESEARCH'}`,580,520,(e)=>doBio(e,q));}
    case'HELP': return ow('help',null,'HELP · COMMAND REFERENCE',700,620,(e)=>doHelp(e));
    case'PDF':  return ow('pdf',null,'PDF · PREFERENCES DISPLAY FUNCTIONS',800,460,(e,t,id)=>doPdf(e,id));
    case'CORP':  return ow('ph',null,'CORP · CORPORATE BONDS',  420,280,(e)=>doPlaceholder(e,'CORP','Corporate bond market — not yet implemented'));
    case'MTGE':  return ow('ph',null,'MTGE · MORTGAGE',         420,280,(e)=>doPlaceholder(e,'MTGE','Mortgage-backed securities — not yet implemented'));
    case'M-MKT': return ow('ph',null,'M-MKT · MONEY MARKET',    420,280,(e)=>doPlaceholder(e,'M-MKT','Money market securities — not yet implemented'));
    case'MUNI':  return ow('ph',null,'MUNI · MUNICIPAL BONDS',  420,280,(e)=>doPlaceholder(e,'MUNI','Municipal bond market — not yet implemented'));
    case'PFD':   return ow('ph',null,'PFD · PREFERRED',         420,280,(e)=>doPlaceholder(e,'PFD','Preferred securities — not yet implemented'));
    case'PORT':  return ow('ph',null,'PORT · PORTFOLIO',        420,280,(e)=>doPlaceholder(e,'PORT','Portfolio management — not yet implemented'));
    default: if(t)dispatch(t,'Q',[]); else clog(`ERR: Unknown command "${cmd}". Type HELP.`,'cl-err');
  }
}

function getTopmostWin(){
  let top=null,topZ=-1;
  document.querySelectorAll('#desktop .win').forEach(w=>{
    const z=parseInt(w.style.zIndex,10)||0;
    if(z>topZ){topZ=z;top=w;}
  });
  return top;
}

// ══════════════════════════════════════════════
//  WINDOW MANAGER
// ══════════════════════════════════════════════
function ow(type,ticker,title,w,h,fillFn){
  const id=`w${++winN}`;
  const desk=document.getElementById('desktop');
  const dw=desk.clientWidth,dh=desk.clientHeight;
  const l=Math.max(0,Math.min(30+winN*20,dw-w-20));
  const tp=Math.max(0,Math.min(20+winN*16,dh-h-20));
  const el=document.createElement('div');
  el.className='win'; el.id=id;
  el.style.cssText=`left:${l}px;top:${tp}px;width:${w}px;height:${h}px;z-index:${++winZ}`;
  el.innerHTML=`<div class="win-bar"><span class="win-title">${title}</span><div class="win-acts"><div class="wb" title="Min" onclick="minWin('${id}')">—</div><div class="wb x" title="Close" onclick="cw('${id}')">✕</div></div></div><div class="wbody" id="wb-${id}"></div><div class="rz"></div>`;
  desk.appendChild(el);
  drag(el); resize(el);
  el.addEventListener('mousedown',()=>el.style.zIndex=++winZ);
  wins[id]={el,type,ticker};
  fillFn(document.getElementById(`wb-${id}`),ticker,id);
  return id;
}
function cw(id){clearInterval(ftimers[id]);delete ftimers[id];const c=document.getElementById(id);if(c)c.remove();delete wins[id];delete qmAWL[id];if(_lastQMId===id)_lastQMId=null;}
function minWin(id){const el=document.getElementById(id);if(!el)return;const wb=el.querySelector('.wbody'),rz=el.querySelector('.rz');if(el.dataset.min==='1'){el.dataset.min='0';if(wb)wb.style.display='';if(rz)rz.style.display='';el.style.height=el.dataset.rh||'300px';}else{el.dataset.min='1';el.dataset.rh=el.style.height;if(wb)wb.style.display='none';if(rz)rz.style.display='none';el.style.height='24px';}}
function drag(winEl){
  const bar=winEl.querySelector('.win-bar');
  let ox,oy,sx,sy;
  bar.addEventListener('mousedown',e=>{if(e.target.classList.contains('wb'))return;e.preventDefault();winEl.style.zIndex=++winZ;ox=winEl.offsetLeft;oy=winEl.offsetTop;sx=e.clientX;sy=e.clientY;
    const mv=e2=>{winEl.style.left=Math.max(0,ox+e2.clientX-sx)+'px';winEl.style.top=Math.max(0,oy+e2.clientY-sy)+'px';};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
}
function resize(winEl){
  const h=winEl.querySelector('.rz');let sw,sh,sx,sy;
  h.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();sw=winEl.offsetWidth;sh=winEl.offsetHeight;sx=e.clientX;sy=e.clientY;
    const mv=e2=>{winEl.style.width=Math.max(200,sw+e2.clientX-sx)+'px';winEl.style.height=Math.max(100,sh+e2.clientY-sy)+'px';};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
}

// ── Persistence helpers ─────────────────────────────
const LS_WL_KEY  = 'kt_watchlists_v2';
const LS_COL_KEY = 'kt_qm_cols_v1';
const LS_WL_ORD  = 'kt_wl_order_v1';

function saveWatchlists(){
  try{ localStorage.setItem(LS_WL_KEY, JSON.stringify(watchlists)); }catch(e){}
}
function loadWatchlists(){
  try{
    const raw = localStorage.getItem(LS_WL_KEY);
    if(raw){
      watchlists = JSON.parse(raw);
      return;
    }
  }catch(e){}
  // Default watchlists on first load
  watchlists = {
    List:    { name:'List',    tickers:['ADBE','ARKK','ERII','IGV','LTH','LYFT','MELI','PLNT','RDDT','TCPC','UBER','WDAY'] },
    Crypto:  { name:'Crypto',  tickers:['BTC-USD','ETH-USD','SOL-USD','BNB-USD','AVAX-USD'] },
    Futs:    { name:'Futs',    tickers:['ES=F','NQ=F','YM=F','CL=F','GC=F','NG=F'] },
    Main:    { name:'Main',    tickers:['AAPL','MSFT','NVDA','GOOGL','AMZN','META','TSLA','JPM','V','SPY'] },
    Indices: { name:'Indices', tickers:['^GSPC','^DJI','^IXIC','^RUT','^VIX','^TNX'] },
  };
  saveWatchlists();
}
function saveColPrefs(){
  try{ localStorage.setItem(LS_COL_KEY, JSON.stringify(qmCols)); }catch(e){}
}
function loadColPrefs(){
  try{
    const raw = localStorage.getItem(LS_COL_KEY);
    if(raw){ qmCols = {...qmCols, ...JSON.parse(raw)}; }
  }catch(e){}
}
function getWLOrder(){
  try{
    const raw = localStorage.getItem(LS_WL_ORD);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return Object.keys(watchlists);
}
function saveWLOrder(order){
  try{ localStorage.setItem(LS_WL_ORD, JSON.stringify(order)); }catch(e){}
}

// Initialise on load
loadWatchlists();
loadColPrefs();

// ── Open / focus QM ─────────────────────────────────

// ── Build QM window ──────────────────────────────────

// ── Render tab bar ───────────────────────────────────
function renderQMTabs(id){
  const bar = document.getElementById(`qtabs-${id}`); if(!bar) return;
  const order = getWLOrder().filter(k => watchlists[k]);
  bar.innerHTML = order.map(wl => `
    <button class="qt${wl===getAWL(id)?' active':''}" id="qtt-${id}-${wl}"
      onclick="qmTabClick(event,'${id}','${wl}')"
      ondblclick="qmRenameTab('${id}','${wl}')"
      title="Double-click to rename">
      ${watchlists[wl]?.name||wl}
      <span class="qt-close-x" onclick="event.stopPropagation();qmDeleteWL('${id}','${wl}')">✕</span>
    </button>
  `).join('') + `<button class="qt add-wl" onclick="qmNewWL('${id}')" title="New watchlist">＋</button>`;
}

function qmTabClick(e, id, wl){
  if(e.target.classList.contains('qt-close-x')) return;
  setAWL(id, wl);
  renderQMTabs(id);
  renderQMHeader(id);
  renderQMT(id);
  qmRefreshAll(id);
}

function qmNewWL(id){
  const name = prompt('Watchlist name:');
  if(!name) return;
  const key = name.trim().replace(/\s+/g,'_').toUpperCase();
  if(watchlists[key]){ alert('Already exists'); return; }
  watchlists[key] = { name: name.trim(), tickers:[] };
  const order = getWLOrder(); order.push(key); saveWLOrder(order);
  saveWatchlists();
  setAWL(id, key);
  renderQMTabs(id);
  renderQMHeader(id);
  renderQMT(id);
}

function qmDeleteWL(id, wl){
  if(Object.keys(watchlists).length <= 1){ alert('Cannot delete the last watchlist.'); return; }
  if(!confirm(`Delete watchlist "${watchlists[wl]?.name||wl}"?`)) return;
  delete watchlists[wl];
  const order = getWLOrder().filter(k=>k!==wl); saveWLOrder(order);
  saveWatchlists();
  setAWL(id, order[0] || Object.keys(watchlists)[0]);
  renderQMTabs(id);
  renderQMHeader(id);
  renderQMT(id);
  qmRefreshAll(id);
}

function qmRemoveTicker(sym, id){
  const wl = watchlists[getAWL(id)];
  if(!wl) return;
  wl.tickers = wl.tickers.filter(t => t !== sym);
  saveWatchlists();
  delete qmData[sym];
  renderQMT(id);
}

function qmRenameTab(id, wl){
  const el = document.getElementById(`qtt-${id}-${wl}`);
  if(!el) return;
  const cur = watchlists[wl]?.name || wl;
  const inp = document.createElement('input');
  inp.className = 'qt-rename';
  inp.value = cur;
  inp.style.cssText = 'background:transparent;border:none;border-bottom:1px solid var(--green);color:var(--text);font-family:var(--font);font-size:9px;width:70px;outline:none;padding:0 2px;';
  el.innerHTML = '';
  el.appendChild(inp);
  inp.focus(); inp.select();
  const done = () => {
    const val = inp.value.trim();
    if(val && watchlists[wl]){ watchlists[wl].name = val; saveWatchlists(); }
    renderQMTabs(id);
  };
  inp.addEventListener('keydown', e => { if(e.key==='Enter') done(); if(e.key==='Escape') renderQMTabs(id); });
  inp.addEventListener('blur', done);
}

// ── Render table header ──────────────────────────────
function renderQMHeader(id){
  const head = document.getElementById(`qhead-${id}`); if(!head) return;
  const cols = QM_COLS.filter(c => qmCols[c.key]);
  head.innerHTML = `<tr>${cols.map(c=>{
    const isSorted = qmSortKey === c.key;
    const sortCls  = isSorted ? (qmSortDir===1?' sort-asc':' sort-desc') : '';
    return `<th class="${sortCls}" style="text-align:${c.align}" onclick="qmSortBy('${id}','${c.key}')">${c.label}</th>`;
  }).join('')}<th></th></tr>`;
}

// ── Sort ─────────────────────────────────────────────
function qmSortBy(id, key){
  if(qmSortKey===key) qmSortDir *= -1;
  else { qmSortKey=key; qmSortDir = key==='ticker'||key==='name' ? 1 : -1; }
  renderQMHeader(id);
  renderQMT(id);
}
function qmCycleSortUI(id){
  // Quick sort cycle: by ticker → by chg% desc → by volume desc → by ticker
  const cycle = ['ticker','pctchg','volume'];
  const ci = cycle.indexOf(qmSortKey);
  const next = cycle[(ci+1)%cycle.length];
  qmSortKey = next;
  qmSortDir = next==='ticker' ? 1 : -1;
  renderQMHeader(id);
  renderQMT(id);
}

// ── Column picker ────────────────────────────────────
function qmOpenColPicker(id){
  let picker = document.getElementById('col-picker');
  if(!picker){
    picker = document.createElement('div');
    picker.id = 'col-picker';
    document.body.appendChild(picker);
    document.addEventListener('click', e=>{
      if(!picker.contains(e.target)&&!e.target.closest('.qm-tb-btn')) picker.classList.remove('open');
    });
  }
  picker.innerHTML = `<h4 style="font-size:8px;letter-spacing:.15em;color:var(--dim);margin-bottom:8px;">SHOW COLUMNS</h4>` +
    QM_COLS.filter(c=>c.key!=='ticker').map(c=>`
      <div class="cpr" onclick="qmToggleCol('${id}','${c.key}')">
        <div class="cpc">${qmCols[c.key]?'✓':''}</div>
        <span>${c.label}</span>
      </div>`).join('');
  const btn = document.querySelector(`#qtbar-${id} .qm-tb-btn:nth-child(4)`);
  if(btn){
    const r=btn.getBoundingClientRect();
    picker.style.top=(r.bottom+4)+'px';
    picker.style.left=r.left+'px';
  }
  picker.classList.toggle('open');
}
function qmToggleCol(id, key){
  if(key==='ticker') return;
  qmCols[key] = !qmCols[key];
  saveColPrefs();
  const picker = document.getElementById('col-picker');
  if(picker) picker.querySelectorAll('.cpc').forEach((el,i)=>{
    const colKey = QM_COLS.filter(c=>c.key!=='ticker')[i]?.key;
    if(colKey) el.textContent = qmCols[colKey]?'✓':'';
  });
  renderQMHeader(id);
  renderQMT(id);
}

// ── Auto-refresh ─────────────────────────────────────
function qmStartAutoRefresh(id){
  clearInterval(qmRefreshTimer);
  qmCountdown = 30;
  qmRefreshTimer = setInterval(()=>{
    if(qmPaused){ updateQMCountdown(id); return; }
    qmCountdown--;
    updateQMCountdown(id);
    if(qmCountdown<=0){
      qmCountdown=30;
      qmRefreshAll(id);
    }
  }, 1000);
}
function updateQMCountdown(id){
  const el=document.getElementById(`qm-count-${id}`);
  const lbl=document.getElementById(`qm-count-label-${id}`);
  if(el){
    if(qmPaused){ el.textContent='PAUSED'; el.style.color='var(--amber)'; }
    else{ el.textContent=`${qmCountdown}s`; el.style.color=qmCountdown<8?'var(--amber)':'var(--green)'; }
  }
  if(lbl) lbl.textContent=qmPaused?'Auto-refresh paused':`${Object.keys(qmData).length} instruments tracked`;
}
function qmTogglePause(id){
  qmPaused=!qmPaused;
  const btn=document.getElementById(`qm-pause-btn-${id}`);
  const dot=document.getElementById(`qm-dot-${id}`);
  if(btn){ btn.textContent=qmPaused?'▶ RESUME':'⏸ PAUSE'; btn.classList.toggle('on',qmPaused); }
  if(dot){ dot.classList.toggle('stale',qmPaused); }
  updateQMCountdown(id);
}

// ── Render rows ──────────────────────────────────────
function renderQMT(id){
  const tbody=document.getElementById(`qtbody-${id}`); if(!tbody) return;
  const tks=(watchlists[getAWL(id)]?.tickers)||[];
  if(!tks.length){
    tbody.innerHTML=`<tr><td colspan="20" style="text-align:center;padding:24px;color:var(--dim);font-size:10px">
      No tickers in this watchlist.<br><span style="font-size:8px;margin-top:4px;display:block">Click <b style="color:var(--green)">＋ ADD</b> below to start tracking</span>
    </td></tr>`;
    return;
  }

  // Build data rows
  let rows = tks.map(sym => ({ sym, ...(qmData[sym]||{}) }));

  // Sort
  const col = QM_COLS.find(c=>c.key===qmSortKey);
  if(col?.sortFn){
    rows.sort((a,b)=>{
      const av=col.sortFn(a), bv=col.sortFn(b);
      if(av==null||av===-Infinity) return 1;
      if(bv==null||bv===-Infinity) return -1;
      if(typeof av==='string') return qmSortDir*(av.localeCompare(bv));
      return qmSortDir*(av-bv);
    });
  }

  const activeCols = QM_COLS.filter(c=>qmCols[c.key]);

  tbody.innerHTML = rows.map(r=>{
    const dir = r.pct!=null ? (r.pct>0?'up':r.pct<0?'down':'flat') : '';
    const s   = r.pct>=0?'+':'';
    const dec = r.price!=null ? (r.price>=1000?0:r.price>=10?2:r.price>=1?3:4) : 2;

    const cells = activeCols.map(c=>{
      switch(c.key){
        case 'ticker':  return `<td onclick="runCmd('${r.sym.replace(/'/g,"\\'")} DES')">${r.sym}</td>`;
        case 'name':    return `<td style="color:var(--dim);font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${r.name||'—'}</td>`;
        case 'last':    return `<td class="${dir}" style="font-weight:700">${r.price!=null?fp(r.price,dec):'<span style="color:var(--dim)">—</span>'}</td>`;
        case 'chg':     return `<td class="${dir}">${r.change!=null?(r.change>=0?'+':'')+fp(r.change,dec):'<span style="color:var(--dim)">—</span>'}</td>`;
        case 'pctchg':  return `<td class="${dir}">${r.pct!=null?s+r.pct.toFixed(2)+'%':'<span style="color:var(--dim)">—</span>'}</td>`;
        case 'bid':     return `<td style="color:var(--dim)">${r.bid!=null?fp(r.bid,dec):'<span style="opacity:.4">—</span>'}</td>`;
        case 'ask':     return `<td style="color:var(--dim)">${r.ask!=null?fp(r.ask,dec):'<span style="opacity:.4">—</span>'}</td>`;
        case 'open':    return `<td style="color:var(--dim)">${r.open!=null?fp(r.open,dec):'—'}</td>`;
        case 'high':    return `<td class="up">${r.high!=null?fp(r.high,dec):'—'}</td>`;
        case 'low':     return `<td class="down">${r.low!=null?fp(r.low,dec):'—'}</td>`;
        case 'volume':  return `<td style="color:var(--dim)">${r.vol!=null?fv(r.vol):'—'}</td>`;
        case 'mktcap':  return `<td style="color:var(--dim)">${r.mktcap!=null?fl(r.mktcap):'—'}</td>`;
        case 'spark':   return `<td><canvas id="spk-qm-${r.sym.replace(/[^a-z0-9]/gi,'')}" width="72" height="20" style="vertical-align:middle"></canvas></td>`;
        case 'latency': return `<td style="color:var(--dim);font-size:11px">${r.lat!=null?r.lat+'ms':'—'}</td>`;
        default: return '<td>—</td>';
      }
    }).join('');

    const delCell = `<td class="qm-del" onclick="event.stopPropagation();qmRemoveTicker('${r.sym.replace(/'/g,"\'")}','${id}')" title="Remove ${r.sym}">&#215;</td>`;
    return `<tr class="qmr" id="qmr-${r.sym.replace(/[^a-z0-9]/gi,'')}">${cells}${delCell}</tr>`;
  }).join('');

  // Draw sparklines after DOM settles
  requestAnimationFrame(()=>{
    rows.forEach(r=>{
      if(!qmCols.spark) return;
      const hist = r.hist||[];
      if(hist.length<2) return;
      const cid=`spk-qm-${r.sym.replace(/[^a-z0-9]/gi,'')}`;
      const canvas=document.getElementById(cid); if(!canvas) return;
      const ctx=canvas.getContext('2d');
      const mn=Math.min(...hist),mx=Math.max(...hist),rng=mx-mn||0.001;
      const col=(r.pct||0)>=0?'#4ade80':'#f87171';
      ctx.clearRect(0,0,72,20);
      ctx.strokeStyle=col; ctx.lineWidth=1.2;
      ctx.shadowColor=col; ctx.shadowBlur=2;
      ctx.beginPath();
      hist.forEach((v,i)=>{
        const x=(i/(hist.length-1))*70+1;
        const y=20-((v-mn)/rng)*17-1.5;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.stroke();
    });
  });
}

// ── Fetch prices for active watchlist ────────────────
async function qmRefreshAll(id){
  const tks=(watchlists[getAWL(id)]?.tickers)||[];
  if(!tks.length) return;
  const dot=document.getElementById(`qm-dot-${id}`);
  const statusTxt=document.getElementById(`qm-status-txt-${id}`);
  if(statusTxt) statusTxt.textContent='Refreshing…';
  qmCountdown=30;

  // Fetch all in parallel
  const fetches = tks.map(async sym => {
    const t0=Date.now();
    try{
      const r=await fetch(`${API}/quote/${sym}`).then(x=>x.json());
      if(!r.ok) return;
      const prev = qmPrev[sym];
      const newPrice = r.price;
      // Flash detection
      if(prev!=null && newPrice!=null && newPrice!==prev){
        const rowId=`qmr-${sym.replace(/[^a-z0-9]/gi,'')}`;
        const row=document.getElementById(rowId);
        if(row){
          row.classList.remove('flash-up','flash-dn');
          void row.offsetWidth;
          row.classList.add(newPrice>prev?'flash-up':'flash-dn');
          setTimeout(()=>row.classList.remove('flash-up','flash-dn'),700);
        }
      }
      qmPrev[sym]=newPrice;
      // Store sparkline (last 20 points)
      const existHist=(qmData[sym]?.hist)||[];
      if(newPrice) existHist.push(newPrice);
      if(existHist.length>20) existHist.shift();
      qmData[sym]={
        price:   newPrice,
        change:  r.change,
        pct:     r.changePct,
        bid:     r.bid,
        ask:     r.ask,
        open:    r.open,
        high:    r.high,
        low:     r.low,
        vol:     r.volume,
        mktcap:  r.marketCap,
        name:    r.name,
        lat:     Date.now()-t0,
        hist:    existHist,
      };
    }catch(e){}
  });

  await Promise.all(fetches);
  renderQMT(id);
  const now=new Date();
  const ts=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  if(statusTxt) statusTxt.textContent=`Updated ${ts}`;
  if(dot) dot.classList.remove('stale');
}

function fp(n,d){if(n==null)return'—';const x=parseFloat(n);if(isNaN(x))return'—';const dec=d!=null?d:(x>=1000?0:x>=10?2:x>=1?3:4);return x.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function fl(n){if(n==null)return'—';const x=parseFloat(n);if(isNaN(x))return'—';if(x>=1e12)return`$${(x/1e12).toFixed(2)}T`;if(x>=1e9)return`$${(x/1e9).toFixed(2)}B`;if(x>=1e6)return`$${(x/1e6).toFixed(2)}M`;return`$${x.toFixed(0)}`;}
function fv(n){if(n==null)return'—';const x=parseInt(n);if(isNaN(x))return'—';if(x>=1e9)return`${(x/1e9).toFixed(1)}B`;if(x>=1e6)return`${(x/1e6).toFixed(1)}M`;if(x>=1e3)return`${(x/1e3).toFixed(1)}K`;return String(x);}
function cd(v){const t=window._sentThresh||0.05;return v>t?'up':v<-t?'down':'flat';}
function pill(pct){if(pct==null)return`<span style="color:var(--dim)">—</span>`;const d=cd(pct),s=pct>=0?'+':'',a=pct>0.05?'▲':pct<-0.05?'▼':'●';return`<span class="pill ${d}">${a} ${s}${pct.toFixed(2)}%</span>`;}
function ld(m='Loading…'){return`<div class="load"><div class="sp"></div><span>${m}</span></div>`;}
function dc(id){if(charts[id]){try{charts[id].destroy();}catch(e){}delete charts[id];}}

// ── TRADINGVIEW SYMBOL MAPPER ──────────────────────────────────────────
// Converts yfinance-style tickers to TradingView symbol format
function tvSymbol(tk){
  if(!tk) return tk;
  const t=tk.toUpperCase();
  // Indices
  const idxMap={'%5EGSPC':'SP:SPX','^GSPC':'SP:SPX','%5EDJI':'DJ:DJI','^DJI':'DJ:DJI',
    '%5EIXIC':'NASDAQ:COMP','^IXIC':'NASDAQ:COMP','%5ERUT':'TVC:RUT','^RUT':'TVC:RUT',
    '%5EFTSE':'TVC:UKX','^FTSE':'TVC:UKX','%5EGDAXI':'TVC:DAX','^GDAXI':'TVC:DAX',
    '%5EN225':'TVC:NI225','^N225':'TVC:NI225','%5EHSI':'TVC:HSI','^HSI':'TVC:HSI',
    '%5EFCHI':'TVC:CAC40','^FCHI':'TVC:CAC40','%5ESTOXX50E':'TVC:SX5E','^STOXX50E':'TVC:SX5E',
    '%5EVIX':  'TVC:VIX',  '^VIX':'TVC:VIX',
    '%5ETNX':  'TVC:TNX',  '^TNX':'TVC:TNX',
    '%5ETYX':  'TVC:TYX',  '^TYX':'TVC:TYX',
    '%5EIRX':  'TVC:IRX',  '^IRX':'TVC:IRX',
    '%5EFVX':  'TVC:FVX',  '^FVX':'TVC:FVX',
  };
  if(idxMap[t]) return idxMap[t];
  // Crypto — yfinance uses BTC-USD → BINANCE:BTCUSDT
  if(t.endsWith('-USD')){const base=t.replace('-USD','');return `BINANCE:${base}USDT`;}
  if(t.endsWith('-USDT')){return `BINANCE:${t.replace('-','')}` ;}
  // Futures — yfinance =F suffix → TradingView continuous
  const futMap={'GC=F':'COMEX:GC1!','SI=F':'COMEX:SI1!','CL=F':'NYMEX:CL1!',
    'BZ=F':'NYMEX:BB1!','NG=F':'NYMEX:NG1!','HG=F':'COMEX:HG1!',
    'PL=F':'NYMEX:PL1!','ZW=F':'CBOT:ZW1!','ZC=F':'CBOT:ZC1!',
    'ZS=F':'CBOT:ZS1!','KC=F':'ICEUS:KC1!','SB=F':'ICEUS:SB1!',
    'ES=F':'CME:ES1!','NQ=F':'CME:NQ1!','RTY=F':'CME:RTY1!',
    'YM=F':'CBOT:YM1!','ZB=F':'CBOT:ZB1!','ZN=F':'CBOT:ZN1!',
    '6E=F':'CME:6E1!','6J=F':'CME:6J1!','6B=F':'CME:6B1!',
  };
  if(futMap[t]) return futMap[t];
  if(t.endsWith('=F')) return t.replace('=F','1!'); // generic fallback
  // Forex =X suffix
  if(t.endsWith('=X')){
    const pair=t.replace('=X','');
    if(pair.length===6) return `FX:${pair}`;
    return `FX_IDC:${pair}`;
  }
  // ETFs and equities — assume NASDAQ or NYSE, TV auto-resolves
  // BRK-B → BRK.B
  if(t.includes('-')) return t.replace('-','.');
  return t; // plain ticker — TV resolves exchange automatically
}

}

// ── N ──
async function doN(el,tk){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld(`Fetching Google News for ${tk}…`);
  try{
    const r=await fetch(`${API}/news/${tk}`).then(x=>x.json());
    if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
    if(!r.news.length){el.innerHTML=`<div class="empty">No news found for ${tk}</div>`;return;}

    // Header strip showing source + count
    const srcLabel = r.source === 'google_news_rss'
      ? `<span style="color:var(--green);font-size:8px">● GOOGLE NEWS RSS</span>`
      : `<span style="color:var(--amber);font-size:8px">● yfinance fallback</span>`;

    const newsHTML = r.news.map(n => {
      // Format pub date nicely — Google News gives RFC 2822 strings
      let timeStr = '';
      if(n.pubDate){
        try{
          const d = new Date(n.pubDate);
          const now = new Date();
          const diffMs = now - d;
          const diffMin = Math.floor(diffMs/60000);
          const diffHr  = Math.floor(diffMs/3600000);
          const diffDay = Math.floor(diffMs/86400000);
          if(diffMin < 60)       timeStr = `${diffMin}m ago`;
          else if(diffHr < 24)   timeStr = `${diffHr}h ago`;
          else if(diffDay < 7)   timeStr = `${diffDay}d ago`;
          else timeStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        }catch(e){ timeStr = n.pubDate.substring(0,16); }
      }
      // Sentiment color hint based on keywords
      const titleLc = (n.title||'').toLowerCase();
      const isBull = /beat|surge|soar|rally|upgrade|buy|strong|gain|up|record|high/.test(titleLc);
      const isBear = /miss|fall|drop|decline|cut|sell|weak|loss|down|layoff|crash|plunge/.test(titleLc);
      const sentDot = isBull
        ? `<span style="color:var(--green);font-size:9px">▲</span>`
        : isBear
        ? `<span style="color:var(--red);font-size:9px">▼</span>`
        : `<span style="color:var(--dim);font-size:9px">●</span>`;

      return `<div class="ni"${n.url?` onclick="window.open('${n.url.replace(/'/g,"\\'")}','_blank')"`:''}
        style="cursor:${n.url?'pointer':'default'}">
        <div class="ni-meta">
          ${sentDot}
          <span class="ni-src">${n.provider||'Google News'}</span>
          <span class="ni-time" style="color:${timeStr.includes('m ago')?'var(--green)':'var(--dim)'}">${timeStr}</span>
        </div>
        <div class="ni-title">${n.title}</div>
        ${n.summary?`<div class="ni-sum">${n.summary}</div>`:''}
      </div>`;
    }).join('');

    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:#0a0a0a">
        ${srcLabel}
        <span style="font-size:8px;color:var(--dim)">${r.count} articles · last 7 days</span>
        <span style="font-size:8px;color:var(--dim);cursor:pointer" onclick="doN(this.closest('.wbody'),'${tk}')">↻ refresh</span>
      </div>
      <div style="flex:1;overflow-y:auto">${newsHTML}</div>
    `;
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}

async function doHds(el,tk){

  try{
    const r=await fetch(`${API}/hds/${tk}`).then(x=>x.json());

    function mkT(rows){if(!rows.length)return'<div class="empty">No data</div>';const nk=Object.keys(rows[0]).find(k=>k.toLowerCase().includes('holder'))||Object.keys(rows[0])[0];const ks=Object.keys(rows[0]).filter(k=>k!==nk);const h=`<tr><th>INSTITUTION</th>${ks.map(k=>`<th>${k.toUpperCase()}</th>`).join('')}</tr>`;const b=rows.map(row=>{const cs=ks.map(k=>{const v=row[k];if(v==null)return'<td>—</td>';if(typeof v==='number')return`<td>${v>=1e9?(v/1e9).toFixed(2)+'B':v>=1e6?(v/1e6).toFixed(2)+'M':v.toLocaleString()}</td>`;return`<td>${v}</td>`;}).join('');return`<tr><td>${row[nk]||'—'}</td>${cs}</tr>`;}).join('');return`<table class="hdst"><thead>${h}</thead><tbody>${b}</tbody></table>`;}
    let at=0;el.innerHTML=`<div class="fa-tabs"><button class="fat-btn active" onclick="window._hdt(0)">INSTITUTIONAL</button><button class="fat-btn" onclick="window._hdt(1)">MUTUAL FUNDS</button></div><div class="fa-body" id="hdbody">${mkT(r.institutional)}</div>`;
    window._hdt=(i)=>{at=i;document.getElementById('hdbody').innerHTML=mkT(i===0?r.institutional:r.mutualFund);document.querySelectorAll('.fat-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}
