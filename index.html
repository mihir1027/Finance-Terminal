// ── ERN ──
async function doErn(el,tk){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld(`Earnings: ${tk}`);
  try{
    const r=await fetch(`${API}/ern/${tk}`).then(x=>x.json());
    if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
    // Header: next earnings date
    let hdr='';
    if(r.next_date){
      const ms=new Date(r.next_date)-new Date();
      const daysUntil=Math.round(ms/86400000);
      const wen=(r.when||'').toLowerCase();
      const whenLabel=wen.includes('before')||wen.includes('open')?'BMO':wen.includes('after')||wen.includes('close')?'AMC':'TBD';
      const wc=whenLabel==='BMO'?'var(--cyan)':whenLabel==='AMC'?'var(--amber)':'var(--dim)';
      const dLabel=daysUntil>0?`in ${daysUntil}d`:daysUntil===0?'TODAY':`${Math.abs(daysUntil)}d ago`;
      hdr=`<div style="display:flex;align-items:center;gap:12px;padding:7px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--bg1)">
        <span style="font-size:9px;color:var(--dim);letter-spacing:.12em">NEXT EARNINGS</span>
        <span style="font-size:13px;color:var(--fg);font-weight:600">${r.next_date}</span>
        <span style="font-size:9px;color:${wc};border:1px solid ${wc};padding:1px 5px">${whenLabel}</span>
        <span style="margin-left:auto;font-size:10px;color:var(--amber)">${dLabel}</span>
      </div>`;
    }else{
      hdr=`<div style="padding:7px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;font-size:10px;color:var(--dim)">No upcoming earnings date on record</div>`;
    }
    // EPS history
    function feps(v){const n=parseFloat(v);if(isNaN(n))return'—';return(n>=0?'':'')+n.toFixed(2);}
    function surp(rep,est){
      const rv=parseFloat(rep),ev=parseFloat(est);
      if(isNaN(rv)||isNaN(ev))return{$:'—',pct:'—',cls:''};
      const d=rv-ev,p=ev!==0?(d/Math.abs(ev))*100:0;
      return{$:(d>=0?'+':'')+d.toFixed(2),pct:(p>=0?'+':'')+p.toFixed(1)+'%',cls:d>=0?'up':'down'};
    }
    let hRows='';
    if(r.eps_history&&r.eps_history.length){
      hRows=r.eps_history.map(h=>{
        const s=surp(h.reported,h.estimate);
        const repCls=parseFloat(h.reported)>=parseFloat(h.estimate)?'up':'down';
        return`<tr><td style="color:var(--dim)">${h.period_end_date}</td><td>${feps(h.estimate)}</td><td class="${repCls}">${feps(h.reported)}</td><td class="${s.cls}">${s.$}</td><td class="${s.cls}">${s.pct}</td></tr>`;
      }).join('');
    }
    const histTable=`<div style="flex-shrink:0;border-bottom:1px solid var(--bdr)">
      <div style="font-size:9px;letter-spacing:.12em;color:var(--dim);padding:5px 10px;border-bottom:1px solid var(--bdr)">EPS HISTORY</div>
      ${hRows?`<div style="overflow-x:auto"><table class="fat"><thead><tr><th>PERIOD END</th><th>ESTIMATE</th><th>REPORTED</th><th>SURPRISE $</th><th>SURPRISE %</th></tr></thead><tbody>${hRows}</tbody></table></div>`:'<div class="empty">No EPS history</div>'}
    </div>`;
    // Forward estimate panels
    function mkEst(title,rows,unit){
      if(!rows||!rows.length)return`<div style="flex:1;display:flex;flex-direction:column"><div style="font-size:9px;letter-spacing:.12em;color:var(--dim);padding:5px 10px;border-bottom:1px solid var(--bdr)">${title}</div><div class="empty">No estimates</div></div>`;
      const tr=rows.map(e=>`<tr><td style="color:var(--dim)">${e.period||e.period_end_date}</td><td style="color:var(--green)">${feps(e.consensus)}</td><td class="up">${feps(e.high)}</td><td class="down">${feps(e.low)}</td><td style="color:var(--dim)">${e.count||'—'}</td><td style="color:var(--dim)">${feps(e.year_ago)}</td></tr>`).join('');
      return`<div style="flex:1;overflow:auto;display:flex;flex-direction:column"><div style="font-size:9px;letter-spacing:.12em;color:var(--dim);padding:5px 10px;border-bottom:1px solid var(--bdr)">${title}${unit?` <span style="font-weight:normal">(${unit})</span>`:''}</div><table class="fat"><thead><tr><th>PERIOD</th><th>CONSENSUS</th><th>HIGH</th><th>LOW</th><th>#</th><th>YR AGO</th></tr></thead><tbody>${tr}</tbody></table></div>`;
    }
    const estimates=`<div style="flex:1;display:flex;gap:1px;background:var(--bdr);min-height:0;overflow:hidden">${mkEst('EPS ESTIMATES',r.eps_estimates,'')}${mkEst('REVENUE ESTIMATES',r.sales_estimates,'$M')}</div>`;
    el.innerHTML=hdr+histTable+estimates;
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}

// ── ECAL ──
async function doEcal(el){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);return new Date(dt.setDate(diff));}
  function toISO(d){return d.toISOString().slice(0,10);}
  function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  function normWhen(w){if(!w)return'tbd';const wl=w.toLowerCase();if(wl.includes('before')||wl.includes('pre')||wl.includes('open'))return'bmo';if(wl.includes('after')||wl.includes('post')||wl.includes('close'))return'amc';return'tbd';}
  function fmtMcap(m){if(m==null)return'';return m>=1000000?`$${(m/1000000).toFixed(2)}T`:m>=1000?`$${(m/1000).toFixed(1)}B`:`$${m.toFixed(0)}M`;}

  let monday=getMonday(new Date());
  let mcapData={};
  let filterOp='>=';
  let filterVal=0;
  let byDate={};
  let days=[];
  let loadGen=0;                  // increments on each load() to cancel stale fetches
  let mcapLoading=false;          // true while background mcap fetch is in flight
  const mcapCache={};             // weekStr → mcapData, so nav back is instant

  const DAY_NAMES=['MON','TUE','WED','THU','FRI'];
  const BTNBASE='cursor:pointer;font-family:var(--font);font-size:9px;padding:2px 10px;letter-spacing:.08em;border-radius:2px;outline:none;';
  const BTNDIM=BTNBASE+'background:none;border:1px solid var(--bdr);color:var(--dim);';
  const BTNAMB=BTNBASE+'background:none;border:1px solid var(--amber);color:var(--amber);';

  function passesFilter(sym){
    if(filterVal<=0)return true;
    const mc=mcapData[sym];
    if(mc==null)return true;
    if(filterOp==='>')  return mc> filterVal;
    if(filterOp==='>=') return mc>=filterVal;
    if(filterOp==='<')  return mc< filterVal;
    if(filterOp==='<=') return mc<=filterVal;
    return true;
  }
  function sortedByMcap(syms){
    return [...syms].sort((a,b)=>(mcapData[b]??-1)-(mcapData[a]??-1));
  }
  function chip(sym){
    const mc=mcapData[sym];
    const tip=mc?`${sym} · ${fmtMcap(mc)}`:sym;
    return`<span class="ecal-chip" title="${tip}" onclick="runCmd('${sym} ERN')">${sym}</span>`;
  }
  function sec(label,color,symsRaw){
    const syms=sortedByMcap(symsRaw).filter(passesFilter);
    if(!syms.length)return'';
    return`<div class="ecal-sec" style="color:${color}">${label}</div><div class="ecal-chips">${syms.map(chip).join('')}</div>`;
  }

  function fmtFilterLabel(){
    const v=filterVal>=1000?`$${(filterVal/1000).toFixed(filterVal%1000===0?0:1)}B`:`$${filterVal.toLocaleString()}M`;
    return`${filterOp} ${v}`;
  }
  function setStatus(text,color){
    const s=el.querySelector('#ecal-status');
    if(!s)return;
    s.textContent=text;
    s.style.color=color||'var(--dim)';
  }

  function renderGrid(){
    const gridEl=el.querySelector('#ecal-grid');
    if(!gridEl)return;

    // Filter is active but mcap data hasn't arrived yet — show loading overlay
    if(filterVal>0&&mcapLoading){
      gridEl.innerHTML=`<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px;background:var(--bg0);">
        <div style="font-size:9px;letter-spacing:.2em;color:var(--amber);">MARKET CAP FILTER PENDING</div>
        <div style="font-size:22px;color:var(--amber);letter-spacing:.05em;">${fmtFilterLabel()}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--amber);opacity:.9;animation:ecal-pulse 1.2s ease-in-out infinite;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:var(--amber);opacity:.9;animation:ecal-pulse 1.2s ease-in-out .4s infinite;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:var(--amber);opacity:.9;animation:ecal-pulse 1.2s ease-in-out .8s infinite;"></div>
        </div>
        <div style="font-size:9px;color:var(--dim);letter-spacing:.1em;margin-top:4px;">Loading market cap data — filter will apply automatically</div>
      </div>`;
      return;
    }

    gridEl.innerHTML=days.map(d=>{
      const b=byDate[toISO(d)];
      return`<div class="ecal-col">${sec('BMO','var(--cyan)',b.bmo)}${sec('AMC','var(--amber)',b.amc)}${sec('TBD','var(--dim)',b.tbd)}</div>`;
    }).join('');
  }

  function buildShell(weekLabel){
    const navBar=`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0">
      <button onclick="window._ecalNav(-1)" style="${BTNDIM}">&#9664; PREV</button>
      <span style="font-size:10px;color:var(--text);letter-spacing:.12em">EARNINGS CALENDAR &middot; ${weekLabel}</span>
      <button onclick="window._ecalNav(1)" style="${BTNDIM}">NEXT &#9654;</button>
    </div>`;
    const filterBar=`<div style="display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:#0a0a0a;">
      <span style="font-size:9px;color:var(--dim);letter-spacing:.1em;">MKTCAP</span>
      <select id="ecal-op" style="font-family:var(--font);font-size:9px;background:#111;border:1px solid #2c2c2c;color:#a1a1aa;padding:2px 5px;border-radius:2px;outline:none;">
        <option value=">=">&gt;=</option>
        <option value=">">&gt;</option>
        <option value="<=">&lt;=</option>
        <option value="<">&lt;</option>
      </select>
      <input id="ecal-val" type="number" min="0" placeholder="e.g. 10000" style="font-family:var(--font);font-size:9px;background:#111;border:1px solid #2c2c2c;color:#a1a1aa;padding:2px 7px;width:110px;border-radius:2px;outline:none;">
      <span style="font-size:9px;color:var(--dim);">$M</span>
      <button id="ecal-apply" style="${BTNAMB}">APPLY</button>
      <button id="ecal-clear" style="${BTNDIM}">CLEAR</button>
      <span id="ecal-status" style="font-size:9px;color:var(--dim);margin-left:6px;"></span>
    </div>`;
    const dayHdrs=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--bdr);flex-shrink:0">${days.map((d,i)=>`<div style="background:var(--bg1);padding:4px 6px;text-align:center"><div style="font-size:8px;letter-spacing:.12em;color:var(--dim)">${DAY_NAMES[i]}</div><div style="font-size:11px;color:var(--text)">${fmtDate(d)}</div></div>`).join('')}</div>`;
    const grid=`<div id="ecal-grid" style="flex:1;display:grid;grid-template-columns:repeat(5,1fr);grid-auto-rows:1fr;gap:1px;background:var(--bdr);overflow:hidden;min-height:0"></div>`;
    el.innerHTML=navBar+filterBar+dayHdrs+grid;

    // Restore filter UI state from closure (persists across nav)
    const opSelect=el.querySelector('#ecal-op');
    const valInput=el.querySelector('#ecal-val');
    const applyBtn=el.querySelector('#ecal-apply');
    const clearBtn=el.querySelector('#ecal-clear');
    if(opSelect)opSelect.value=filterOp;
    if(valInput&&filterVal>0)valInput.value=filterVal;

    applyBtn?.addEventListener('click',()=>{
      filterOp=opSelect.value;
      filterVal=parseFloat(valInput.value)||0;
      if(!mcapLoading&&filterVal>0){
        const n=Object.keys(mcapData).length;
        setStatus(n>0?`filter ${fmtFilterLabel()} · ${n} caps`:`filter ${fmtFilterLabel()} — loading caps...`,'var(--amber)');
      }
      renderGrid();
    });
    clearBtn?.addEventListener('click',()=>{
      filterVal=0;
      if(valInput)valInput.value='';
      renderGrid();
    });
    valInput?.addEventListener('keydown',e=>{
      if(e.key==='Enter')applyBtn?.click();
    });
  }

  async function load(){
    const gen=++loadGen;
    el.innerHTML=ld('Earnings Calendar...');
    const weekStr=toISO(monday);
    try{
      const r=await fetch(`${API}/ecal?week=${weekStr}`).then(x=>x.json());
      if(gen!==loadGen)return;
      if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
      days=[];for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(d.getDate()+i);days.push(d);}
      byDate={};for(const d of days)byDate[toISO(d)]={bmo:[],amc:[],tbd:[]};
      for(const ev of r.events){const b=byDate[ev.date];if(!b)continue;b[normWhen(ev.when)].push(ev.act_symbol);}
      const lastDay=days[4];
      const weekLabel=`${fmtDate(monday)} \u2013 ${fmtDate(lastDay)}, ${lastDay.getFullYear()}`;

      // Restore cached mcaps immediately so filter works right away on nav
      mcapData=mcapCache[weekStr]||{};
      buildShell(weekLabel);
      renderGrid();

      // Only fetch mcaps if not already cached
      if(!mcapCache[weekStr]){
        const allTickers=[...new Set(r.events.map(e=>e.act_symbol))].join(',');
        mcapLoading=true;
        renderGrid(); // show overlay immediately if filter is active
        setStatus(filterVal>0?`filter ${fmtFilterLabel()} — loading caps...`:'loading caps...',
                  filterVal>0?'var(--amber)':null);
        fetch(`${API}/ecal/mcap?tickers=${encodeURIComponent(allTickers)}`)
          .then(x=>x.json())
          .then(mc=>{
            if(gen!==loadGen)return;
            mcapLoading=false;
            if(!mc.ok){setStatus('caps unavailable');return;}
            mcapData=mc.mcap;
            mcapCache[weekStr]=mcapData;
            const n=Object.keys(mcapData).length;
            setStatus(filterVal>0?`filter ${fmtFilterLabel()} · ${n} caps`:`${n} caps`,
                      filterVal>0?'var(--green)':null);
            renderGrid();
          })
          .catch(()=>{
            if(gen!==loadGen)return;
            mcapLoading=false;
            setStatus('caps failed');
            renderGrid();
          });
      } else {
        mcapLoading=false;
        const n=Object.keys(mcapData).length;
        setStatus(filterVal>0?`filter ${fmtFilterLabel()} · ${n} caps`:`${n} caps`,
                  filterVal>0?'var(--green)':null);
      }
    }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
  }

  window._ecalNav=async(dir)=>{monday=new Date(monday);monday.setDate(monday.getDate()+dir*7);await load();};
  await load();
}

// ── EM ──
async function doEm(el,tk,wid){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld(`Earnings Matrix: ${tk}`);
  try{
    const d=await fetch(`${API}/em/${tk}`).then(x=>x.json());
    if(!d.ok){el.innerHTML=`<div class="err">${d.error}</div>`;return;}

    const _lw={};
    function lwKill(){
      Object.keys(_lw).forEach(k=>{try{_lw[k].remove();}catch(e){}delete _lw[k];});
      const t=document.getElementById(`em-tip-${wid}`);if(t)t.remove();
    }

    let metric='eps', growthMode='yoy', chartView='values';

    function qFrom(s){const m=new Date(s+'T00:00:00').getMonth()+1;return m<=3?1:m<=6?2:m<=9?3:4;}
    function yrFrom(s){return parseInt(s.slice(0,4));}
    const QL=['Q1 Mar','Q2 Jun','Q3 Sep','Q4 Dec'];

    function buildCells(){
      const c={eps:{},rev:{}};
      for(const h of d.eps_hist){
        const yr=yrFrom(h.date),q=qFrom(h.date);
        if(!c.eps[yr])c.eps[yr]={};
        c.eps[yr][q]={val:parseFloat(h.reported),type:'hist',sec:h.sec,prior:parseFloat(h.estimate),date:h.date};
      }
      for(const e of d.eps_est){
        if(!e.period_end_date)continue;
        const yr=yrFrom(e.period_end_date),q=qFrom(e.period_end_date),p=(e.period||'').toLowerCase();
        if(!c.eps[yr])c.eps[yr]={};
        if(p.includes('quarter')&&!c.eps[yr][q])c.eps[yr][q]={val:parseFloat(e.consensus),type:'est',high:e.high,low:e.low,count:e.count};
        if(p.includes('year')&&!c.eps[yr][0])c.eps[yr][0]={val:parseFloat(e.consensus),type:'est',high:e.high,low:e.low,count:e.count};
      }
      for(const yr of Object.keys(c.eps)){
        if(c.eps[yr][0])continue;
        let sum=0,cnt=0,allH=true;
        for(let q=1;q<=4;q++){const x=c.eps[yr][q];if(x&&x.val!=null&&!isNaN(x.val)){sum+=x.val;cnt++;if(x.type!=='hist')allH=false;}}
        if(cnt===4)c.eps[yr][0]={val:sum,type:allH?'hist':'est'};
      }
      for(const h of (d.rev_hist||[])){
        const yr=yrFrom(h.date),q=qFrom(h.date);
        if(!c.rev[yr])c.rev[yr]={};
        c.rev[yr][q]={val:parseFloat(h.sales),type:'hist',sec:h.sec,date:h.date};
      }
      for(const h of (d.rev_ann||[])){
        const yr=yrFrom(h.date);
        if(!c.rev[yr])c.rev[yr]={};
        c.rev[yr][0]={val:parseFloat(h.sales),type:'hist'};
      }
      for(const e of d.rev_est){
        if(!e.period_end_date)continue;
        const yr=yrFrom(e.period_end_date),q=qFrom(e.period_end_date),p=(e.period||'').toLowerCase();
        if(!c.rev[yr])c.rev[yr]={};
        if(p.includes('quarter')&&!c.rev[yr][q])c.rev[yr][q]={val:parseFloat(e.consensus),type:'est',high:e.high,low:e.low,count:e.count};
        if(p.includes('year')&&!c.rev[yr][0])c.rev[yr][0]={val:parseFloat(e.consensus),type:'est',high:e.high,low:e.low,count:e.count};
      }
      return c;
    }
    const cells=buildCells();

    // Latest confirmed historical quarter (for "white" styling)
    const latestEpsDate=d.eps_hist.length?d.eps_hist[d.eps_hist.length-1].date:null;
    const latestRevDate=(d.rev_hist||[]).length?d.rev_hist[d.rev_hist.length-1].date:null;

    const ALL_YRS=[...new Set([
      ...d.eps_hist.map(h=>yrFrom(h.date)),
      ...(d.rev_hist||[]).map(h=>yrFrom(h.date)),
      ...d.eps_est.filter(e=>e.period_end_date).map(e=>yrFrom(e.period_end_date)),
      ...d.rev_est.filter(e=>e.period_end_date).map(e=>yrFrom(e.period_end_date)),
    ])].sort((a,b)=>a-b);
    let startIdx=Math.max(0,ALL_YRS.length-6);
    function visYrs(){return ALL_YRS.slice(startIdx,startIdx+6);}

    function fE(v){if(v==null||isNaN(v))return'—';return parseFloat(v).toFixed(2);}
    function fR(v){if(v==null||isNaN(v))return'—';const b=v/1e9;return b>=100?b.toFixed(0)+'B':b>=10?b.toFixed(1)+'B':b>=1?b.toFixed(2)+'B':(v/1e6).toFixed(0)+'M';}
    function fM(v){return(v!=null&&!isNaN(v)&&isFinite(v))?parseFloat(v).toFixed(1)+'x':'—';}
    function fP(v){if(v==null||isNaN(v)||!isFinite(v))return'—';return(v>=0?'+':'')+v.toFixed(1)+'%';}

    // amber=old hist, white=latest hist, green=estimate, red=negative
    function vClr(cell,isLatest){
      if(!cell||cell.val==null||isNaN(cell.val))return'#3f3f46';
      if(cell.type==='hist') return cell.val<0?'#f87171':isLatest?'#e5e7eb':'#fbbf24';
      return cell.val<0?'rgba(248,113,113,.7)':'#4ade80';
    }
    function gClr(gv,isEst){
      if(gv==null)return'#3f3f46';
      const base=gv>=0?'#4ade80':'#f87171';
      return isEst?base+'bb':base;
    }
    function mkMat(isGrowth){
      const isE=metric==='eps';
      const cd=cells[metric];
      const yrs=visYrs();
      const fmt=isE?fE:fR;
      const latestDate=isE?latestEpsDate:latestRevDate;
      const latestYr=latestDate?yrFrom(latestDate):null;
      const latestQ=latestDate?qFrom(latestDate):null;

      const CELL='padding:7px 14px;text-align:right;border-bottom:1px solid #111;font-size:12px;cursor:default;';
      const HDR='padding:7px 14px;text-align:right;border-bottom:1px solid #222;font-size:12px;color:#a1a1aa;font-weight:500;letter-spacing:.02em;';
      const ROW_LBL='padding:7px 10px;white-space:nowrap;border-bottom:1px solid #111;font-size:11px;color:#a1a1aa;';
      const ANN_LBL='padding:8px 10px;font-size:11px;color:#e5e7eb;font-weight:600;border-top:1px solid #222;';
      const ANN_CELL='padding:8px 14px;text-align:right;font-size:12px;font-weight:600;border-top:1px solid #222;cursor:default;';

      let h=`<table style="width:100%;border-collapse:collapse;table-layout:fixed"><thead><tr>`;
      h+=`<th style="${HDR}text-align:left;width:72px"></th>`;
      for(const yr of yrs)h+=`<th style="${HDR}">${yr}</th>`;
      h+=`</tr></thead><tbody>`;

      for(let q=1;q<=4;q++){
        h+=`<tr><td style="${ROW_LBL}">${QL[q-1]}</td>`;
        for(const yr of yrs){
          const cell=(cd[yr]||{})[q];
          const isLatest=yr===latestYr&&q===latestQ;
          const tipKey=`${yr}_${q}`;
          // Always look up both EPS and Rev cells independently of current metric
          {
            const ec=(cells.eps[yr]||{})[q];
            const rc=(cells.rev[yr]||{})[q];
            if(ec||rc){
              window[`_emTips_${wid}`][tipKey]={
                lbl:`${QL[q-1]} ${yr}`,
                epsType:ec?.type,
                epsR:ec?.type==='hist'?ec.val:null,
                epsE:ec?.prior??null,
                epsCon:ec?.type==='est'?ec.val:null,
                epsH:ec?.high,epsL:ec?.low,epsCnt:ec?.count,
                revType:rc?.type,
                revR:rc?.type==='hist'?rc.val:null,
                revCon:rc?.type==='est'?rc.val:null,
                revH:rc?.high,revL:rc?.low,revCnt:rc?.count,
              };
            }
          }
          if(!isGrowth){
            const clr=vClr(cell,isLatest);
            const fw=isLatest?'600':'400';
            const v=cell&&cell.val!=null&&!isNaN(cell.val)?fmt(cell.val):'—';
            const hover=cell?`onmouseenter="window._emTipSh_${wid}(event,'${tipKey}')" onmouseleave="window._emTipHi_${wid}()"`:'' ;
            h+=`<td ${hover} style="${CELL}color:${clr};font-weight:${fw}">${v}</td>`;
          } else {
            const cv=cell?.val;
            let gv=null;
            if(growthMode==='yoy'){const pv=(cd[yr-1]||{})[q]?.val;if(cv!=null&&pv!=null&&pv!==0)gv=(cv-pv)/Math.abs(pv)*100;}
            else{const pq=q>1?(cd[yr]||{})[q-1]:(cd[yr-1]||{})[4];if(cv!=null&&pq?.val!=null&&pq.val!==0)gv=(cv-pq.val)/Math.abs(pq.val)*100;}
            const hover=cell?`onmouseenter="window._emTipSh_${wid}(event,'${tipKey}')" onmouseleave="window._emTipHi_${wid}()"`:'' ;
            h+=`<td ${hover} style="${CELL}color:${gClr(gv,cell?.type==='est')}">${fP(gv)}</td>`;
          }
        }
        h+=`</tr>`;
      }

      // Annual row
      h+=`<tr><td style="${ANN_LBL}">Annual</td>`;
      for(const yr of yrs){
        const cell=(cd[yr]||{})[0];
        if(!isGrowth){
          const clr=vClr(cell,false);
          // Small EST tag for estimate annual cells
          const tag=cell?.type==='est'?`<span style="font-size:7px;color:#4ade80;opacity:.7;margin-right:3px;letter-spacing:.06em">EST</span>`:'';
          h+=`<td style="${ANN_CELL}color:${clr}">${tag}${cell&&cell.val!=null?fmt(cell.val):'—'}</td>`;
        } else {
          const cv=cell?.val,pv=(cd[yr-1]||{})[0]?.val;
          const gv=cv!=null&&pv!=null&&pv!==0?(cv-pv)/Math.abs(pv)*100:null;
          h+=`<td style="${ANN_CELL}color:${gClr(gv,cell?.type==='est')}">${fP(gv)}</td>`;
        }
      }
      h+=`</tr></tbody></table>`;
      return h;
    }

    function render(){
      lwKill();
      window[`_emTips_${wid}`]={};
      const isE=metric==='eps';
      const cd=cells[metric];
      const canP=startIdx>0,canN=startIdx+6<ALL_YRS.length;

      function navBtn(dir,ok,lbl){
        return`<button onclick="window._emN_${wid}(${dir})" ${ok?'':'disabled'} style="background:none;border:1px solid ${ok?'#27272a':'#111'};color:${ok?'#71717a':'#1e1e1e'};font-family:var(--font);font-size:9px;padding:4px 12px;cursor:${ok?'pointer':'default'};letter-spacing:.05em;border-radius:2px">${lbl}</button>`;
      }
      function metBtn(key,lbl){
        const a=metric===key;
        return`<button onclick="window._emM_${wid}('${key}')" style="background:${a?'rgba(251,191,36,.08)':'none'};border:1px solid ${a?'#fbbf24':'#27272a'};color:${a?'#fbbf24':'#71717a'};font-family:var(--font);font-size:9px;padding:4px 12px;cursor:pointer;letter-spacing:.05em;border-radius:2px">${lbl}</button>`;
      }
      function grwBtn(key,lbl){
        const a=growthMode===key;
        return`<button onclick="window._emG_${wid}('${key}')" style="background:${a?'rgba(74,222,128,.1)':'none'};border:1px solid ${a?'#4ade80':'#27272a'};color:${a?'#4ade80':'#71717a'};font-family:var(--font);font-size:9px;padding:4px 12px;cursor:pointer;letter-spacing:.05em;border-radius:2px">${lbl}</button>`;
      }
      function chrBtn(key,lbl){
        const a=chartView===key;
        return`<button onclick="window._emC_${wid}('${key}')" style="background:${a?'rgba(74,222,128,.1)':'none'};border:1px solid ${a?'#4ade80':'#27272a'};color:${a?'#4ade80':'#71717a'};font-family:var(--font);font-size:9px;padding:4px 12px;cursor:pointer;letter-spacing:.05em;border-radius:2px">${lbl}</button>`;
      }

      // Valuation
      const V=d.valuation||{};
      const fy1=V.fy1_year||new Date().getFullYear(),fy2=(V.fy2_year||fy1+1);
      const VH='padding:6px 10px;font-size:9px;color:#52525b;text-align:right;border-bottom:1px solid #111;';
      const VL='padding:6px 10px;font-size:10px;color:#52525b;border-bottom:1px solid #111;';
      const VC_H='padding:6px 10px;font-size:11px;text-align:right;border-bottom:1px solid #111;color:#fbbf24;';
      const VC_D='padding:6px 10px;font-size:11px;text-align:right;border-bottom:1px solid #111;color:#71717a;';
      const vRows=[
        ['P/E',V.pe?.ltm,V.pe?.ntm,V.pe?.fy1,V.pe?.fy2],
        ['P/S',V.ps?.ltm,V.ps?.ntm,V.ps?.fy1,V.ps?.fy2],
        ['P/B',V.pb?.ltm,null,null,null],
        ['P/CF',null,null,null,null]
      ].map(([l,a,b,c,e])=>`<tr>
        <td style="${VL}">${l}</td>
        <td style="${VC_H}">${fM(a)}</td>
        <td style="${VC_D}">${fM(b)}</td>
        <td style="${VC_D}">${fM(c)}</td>
        <td style="${VC_D}">${fM(e)}</td>
      </tr>`).join('');

      // Chart data
      const yrlyData=[],qData=[];
      for(const yr of ALL_YRS){const c=(cd[yr]||{})[0];if(c&&c.val!=null&&!isNaN(c.val))yrlyData.push({time:`${yr}-12-31`,value:isE?c.val:c.val/1e9});}
      const histSrc=isE?d.eps_hist:(d.rev_hist||[]);
      const estSrc=(isE?d.eps_est:d.rev_est).filter(e=>e.period_end_date&&(e.period||'').toLowerCase().includes('quarter'));
      const histDates=new Set(histSrc.map(h=>h.date));
      for(const h of histSrc)qData.push({time:h.date,value:isE?parseFloat(h.reported):parseFloat(h.sales)/1e9,est:false});
      for(const e of estSrc)if(!histDates.has(e.period_end_date))qData.push({time:e.period_end_date,value:isE?parseFloat(e.consensus):parseFloat(e.consensus)/1e9,est:true});
      qData.sort((a,b)=>a.time<b.time?-1:1);

      el.innerHTML=`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #1a1a1a;flex-shrink:0;background:#050505">
          <span style="font-size:9px;color:#71717a;letter-spacing:.06em;margin-right:4px">METRIC</span>
          ${metBtn('eps','EPS')}${metBtn('rev','REVENUE')}
          <div style="flex:1"></div>
          ${grwBtn('yoy','YoY % Growth')}${grwBtn('pop','PoP % Growth')}
        </div>
        <div style="font-size:9px;color:#71717a;padding:3px 12px;border-bottom:1px solid #111;flex-shrink:0;background:#050505">
          All values in ${isE?'USD ($)':'USD ($B)'}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;background:#111;gap:1px;flex-shrink:0">
          <div style="background:#050505">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid #111">
              ${navBtn(-1,canP,'← Previous')}
              <span style="font-size:9px;color:#71717a;letter-spacing:.06em">${isE?'EPS ($)':'REVENUE'} · VALUES</span>
              ${navBtn(1,canN,'Next →')}
            </div>
            ${mkMat(false)}
          </div>
          <div style="background:#050505">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid #111">
              ${navBtn(-1,canP,'← Previous')}
              <span style="font-size:9px;color:#71717a;letter-spacing:.06em">${growthMode==='yoy'?'YoY':'PoP'} % GROWTH</span>
              ${navBtn(1,canN,'Next →')}
            </div>
            ${mkMat(true)}
          </div>
        </div>
        <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;background:#111;gap:1px;min-height:0;overflow:hidden">
          <div style="background:#050505;display:flex;flex-direction:column;overflow:hidden">
            <div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid #111;flex-shrink:0">
              ${chrBtn('values','Values Chart')}${chrBtn('growth','Growth Chart')}
            </div>
            <div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
              <div style="font-size:9px;color:#71717a;padding:3px 10px;flex-shrink:0;letter-spacing:.08em">Yearly</div>
              <div style="flex:1;position:relative;min-height:0"><div id="em-yl-${wid}" style="position:absolute;inset:0"></div></div>
              <div style="font-size:9px;color:#71717a;padding:3px 10px;flex-shrink:0;letter-spacing:.08em;border-top:1px solid #111">Quarterly</div>
              <div style="flex:1;position:relative;min-height:0"><div id="em-qt-${wid}" style="position:absolute;inset:0"></div></div>
            </div>
          </div>
          <div style="background:#050505;display:flex;flex-direction:column;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:flex-end;gap:16px;padding:5px 12px;border-bottom:1px solid #111;flex-shrink:0">
              <span style="font-size:9px;color:#71717a;display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:9px;height:9px;background:#fbbf24"></span>Historical</span>
              <span style="font-size:9px;color:#71717a;display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:9px;height:9px;background:#4ade80"></span>Estimates</span>
            </div>
            <div style="overflow-y:auto;flex:1">
              <table style="width:100%;border-collapse:collapse">
                <thead><tr>
                  <th style="${VH}text-align:left"></th>
                  <th style="${VH}">Last 4Q</th>
                  <th style="${VH}">Next 4Q</th>
                  <th style="${VH}">FY ${fy1}</th>
                  <th style="${VH}">FY ${fy2}</th>
                </tr></thead>
                <tbody>${vRows}</tbody>
              </table>
              ${V.price?`<div style="padding:8px 12px;font-size:9px;color:#52525b;border-top:1px solid #111;margin-top:2px">Price <span style="color:#e5e7eb;font-size:12px;font-weight:500">$${parseFloat(V.price).toFixed(2)}</span></div>`:''}
            </div>
          </div>
        </div>`;

      // Tooltip
      {
        const tip=document.createElement('div');
        tip.id=`em-tip-${wid}`;
        tip.style.cssText='position:fixed;display:none;z-index:10000;background:#0a0a0a;border:1px solid #27272a;padding:10px 12px;font-family:var(--font);pointer-events:none;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.8)';
        document.body.appendChild(tip);
      }
      window[`_emTipSh_${wid}`]=(e,key)=>{
        const tip=document.getElementById(`em-tip-${wid}`);
        if(!tip)return;
        const t=(window[`_emTips_${wid}`]||{})[key];
        if(!t){tip.style.display='none';return;}
        const isEpsView=metric==='eps'; // reads current metric — updated on every render
        let html=`<div style="font-size:8px;color:#52525b;letter-spacing:.1em;margin-bottom:8px">${t.lbl.toUpperCase()}</div>`;

        // Helper: render a hist row (reported + estimate + beat/miss)
        function histEps(){
          if(t.epsR==null)return'';
          let s=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:3px">
            <span style="font-size:9px;color:#52525b">EPS</span>
            <span style="font-size:12px;color:#fbbf24;font-weight:600">${parseFloat(t.epsR).toFixed(2)}</span></div>`;
          if(t.epsE!=null&&!isNaN(t.epsE)){
            const surp=t.epsR-t.epsE,sc=surp>=0?'#4ade80':'#f87171';
            s+=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:2px">
              <span style="font-size:9px;color:#3f3f46"> est</span>
              <span style="font-size:10px;color:#52525b">${parseFloat(t.epsE).toFixed(2)}</span></div>`;
            s+=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:2px">
              <span style="font-size:9px;color:#3f3f46"> Δ</span>
              <span style="font-size:10px;color:${sc};font-weight:600">${surp>=0?'+':''}${surp.toFixed(2)} ${surp>=0?'beat':'miss'}</span></div>`;
          }
          return s;
        }
        function histRev(){
          if(t.revR==null||isNaN(t.revR))return'';
          const b=t.revR/1e9,rf=b>=100?b.toFixed(0)+'B':b>=10?b.toFixed(1)+'B':b.toFixed(2)+'B';
          return`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px">
            <span style="font-size:9px;color:#52525b">Revenue</span>
            <span style="font-size:12px;color:#fbbf24;font-weight:600">$${rf}</span></div>`;
        }
        function estEps(){
          if(t.epsCon==null)return'';
          let s=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:3px">
            <span style="font-size:9px;color:#52525b">EPS est</span>
            <span style="font-size:12px;color:#4ade80;font-weight:600">${parseFloat(t.epsCon).toFixed(2)}</span></div>`;
          if(t.epsH!=null||t.epsL!=null){
            const hi=t.epsH!=null?parseFloat(t.epsH).toFixed(2):'—',lo=t.epsL!=null?parseFloat(t.epsL).toFixed(2):'—';
            s+=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:2px">
              <span style="font-size:9px;color:#3f3f46"> range</span>
              <span style="font-size:9px;color:#52525b">${lo} – ${hi}</span></div>`;
          }
          if(t.epsCnt!=null)s+=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:2px">
            <span style="font-size:9px;color:#3f3f46"> analysts</span>
            <span style="font-size:9px;color:#52525b">${t.epsCnt}</span></div>`;
          return s;
        }
        function estRev(){
          if(t.revCon==null||isNaN(t.revCon))return'';
          const b=t.revCon/1e9,rf=b>=100?b.toFixed(0)+'B':b>=10?b.toFixed(1)+'B':b.toFixed(2)+'B';
          let s=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:3px">
            <span style="font-size:9px;color:#52525b">Rev est</span>
            <span style="font-size:12px;color:#4ade80;font-weight:600">$${rf}</span></div>`;
          if(t.revH!=null||t.revL!=null){
            const hi2=t.revH!=null?fR(parseFloat(t.revH)):'—',lo2=t.revL!=null?fR(parseFloat(t.revL)):'—';
            s+=`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:2px">
              <span style="font-size:9px;color:#3f3f46"> range</span>
              <span style="font-size:9px;color:#52525b">${lo2} – ${hi2}</span></div>`;
          }
          return s;
        }
        const div='<div style="border-top:1px solid #1a1a1a;margin:7px 0 5px"></div>';

        if(isEpsView){
          // EPS metric view: primary=EPS, secondary=Revenue
          const epsIsHist=t.epsType==='hist';
          html+=epsIsHist?histEps():estEps();
          const revPart=t.revType==='hist'?histRev():estRev();
          if(revPart)html+=div+revPart;
        } else {
          // Revenue metric view: primary=Revenue, secondary=EPS
          const revIsHist=t.revType==='hist';
          html+=revIsHist?histRev():estRev();
          const epsPart=t.epsType==='hist'?histEps():estEps();
          if(epsPart)html+=div+epsPart;
        }

        tip.innerHTML=html;
        const tx=e.clientX+16,ty=e.clientY-8;
        const tw=tip.offsetWidth||170,th2=tip.offsetHeight||100;
        tip.style.left=(tx+tw>window.innerWidth?e.clientX-tw-8:tx)+'px';
        tip.style.top=(ty+th2>window.innerHeight?e.clientY-th2-10:ty)+'px';
        tip.style.display='block';
      };
      window[`_emTipHi_${wid}`]=()=>{const t=document.getElementById(`em-tip-${wid}`);if(t)t.style.display='none';};

      requestAnimationFrame(()=>setTimeout(()=>{
        const ylEl=document.getElementById(`em-yl-${wid}`);
        if(ylEl&&yrlyData.length){
          const c=LightweightCharts.createChart(ylEl,{...lwBase(ylEl),handleScroll:false,handleScale:false});
          if(chartView==='growth'){
            const gs=c.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});
            const gd=yrlyData.map((p,i)=>{
              if(!i)return null;
              const pv=yrlyData[i-1].value;
              const gv=pv&&pv!==0?(p.value-pv)/Math.abs(pv)*100:null;
              return gv!=null?{time:p.time,value:gv,color:gv>=0?'rgba(251,191,36,.7)':'rgba(248,113,113,.7)'}:null;
            }).filter(Boolean);
            gs.setData(gd);
          } else {
            const s=c.addLineSeries({color:'#fbbf24',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
            s.setData(yrlyData);
          }
          c.timeScale().fitContent();_lw[`em-yl-${wid}`]=c;
          new ResizeObserver(()=>c.applyOptions({width:ylEl.clientWidth,height:ylEl.clientHeight})).observe(ylEl);
        }
        const qtEl=document.getElementById(`em-qt-${wid}`);
        if(qtEl&&qData.length){
          const c=LightweightCharts.createChart(qtEl,{...lwBase(qtEl),handleScroll:false,handleScale:false});
          const s=c.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});
          s.setData(qData.map(p=>({time:p.time,value:p.value,color:p.est?'rgba(74,222,128,.5)':p.value>=0?'rgba(251,191,36,.75)':'rgba(248,113,113,.75)'})));
          c.timeScale().fitContent();_lw[`em-qt-${wid}`]=c;
          new ResizeObserver(()=>c.applyOptions({width:qtEl.clientWidth,height:qtEl.clientHeight})).observe(qtEl);
        }
      },50));
    }

    window[`_emN_${wid}`]=(dir)=>{startIdx=Math.max(0,Math.min(ALL_YRS.length-6,startIdx+dir));render();};
    window[`_emM_${wid}`]=(key)=>{metric=key;render();};
    window[`_emG_${wid}`]=(key)=>{growthMode=key;render();};
    window[`_emC_${wid}`]=(key)=>{chartView=key;render();};
    render();
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}

async function doFocus(el,tk,wid){

// ── Shared perf-table renderer (WCR + GLCO) ──────────────────────────
const _perfWS={};
async function _renderPerfWin(el,wid,cfg){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  if(!_perfWS[wid]) _perfWS[wid]={period:null,customFrom:'',customTo:'',periodsData:null,customPerf:null,rv:0};
  const ws=_perfWS[wid];
  const today=new Date().toISOString().slice(0,10);
  const inpS='background:#111;border:1px solid #252525;color:#bbb;font-family:var(--font);font-size:10px;padding:2px 6px;outline:none;border-radius:2px;';
  const btnS=(on)=>`cursor:pointer;padding:2px 8px;font-size:9px;border:1px solid ${on?'var(--orange)':'var(--bdr)'};border-radius:2px;color:${on?'var(--orange)':'var(--dim)'};font-family:var(--font);letter-spacing:.06em;user-select:none`;
  const pctFmt=(v)=>{if(v==null)return'<span style="color:#3a3a3a">—</span>';const s=v>=0?'+':'';return`<span class="${cd(v)}">${s}${v.toFixed(2)}%</span>`;};

  async function render(){
    ws.rv=(ws.rv||0)+1; const rv=ws.rv;
    const pid=`pwc-${wid}`;
    const pbtns=['1y','2y','3y','5y','10y'].map(p=>`<span class="pw-pb" data-p="${p}" style="${btnS(ws.period===p)}">${p.toUpperCase()}</span>`).join('');
    const showClr=!!(ws.period||(ws.customFrom&&ws.customPerf));
    el.innerHTML=`
      <div style="display:flex;gap:4px;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center;flex-wrap:wrap">
        <span style="font-size:9px;color:#555;letter-spacing:.06em">PERIOD</span>
        ${pbtns}
        <span style="width:1px;height:10px;background:#252525;margin:0 4px"></span>
        <span style="font-size:9px;color:#555;letter-spacing:.06em">FROM</span>
        <input id="${pid}-from" type="date" value="${ws.customFrom||''}" max="${today}" style="${inpS}">
        <span style="font-size:9px;color:#555;letter-spacing:.06em">TO</span>
        <input id="${pid}-to" type="date" value="${ws.customTo||today}" max="${today}" style="${inpS}">
        <span id="${pid}-go" style="${btnS(false)}">GO</span>
        ${showClr?`<span id="${pid}-clr" style="${btnS(false)}">✕</span>`:''}
      </div>
      <div id="${pid}-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column">${ld('Loading…')}</div>`;
    el.querySelectorAll('.pw-pb').forEach(btn=>{
      btn.addEventListener('click',async()=>{
        const p=btn.dataset.p;
        if(ws.period===p){ws.period=null;render();return;}
        ws.period=p; ws.customFrom=''; ws.customTo=''; ws.customPerf=null;
        if(!ws.periodsData){
          btn.textContent='…'; btn.style.color='var(--amber)';
          try{const d=await fetch(cfg.periodsUrl).then(x=>x.json());if(d.ok)ws.periodsData=d;}catch(e){}
        }
        render();
      });
    });
    el.querySelector(`#${pid}-go`)?.addEventListener('click',async()=>{
      const from=el.querySelector(`#${pid}-from`).value;
      const to=el.querySelector(`#${pid}-to`).value||today;
      if(!from)return;
      ws.customFrom=from; ws.customTo=to; ws.period=null;
      const gb=el.querySelector(`#${pid}-go`);
      if(gb){gb.textContent='LOADING…';gb.style.color='var(--amber)';}
      try{const d=await fetch(`${cfg.perfUrl}?from=${from}&to=${to}`).then(x=>x.json());if(d.ok)ws.customPerf=d;}catch(e){}
      render();
    });
    el.querySelector(`#${pid}-clr`)?.addEventListener('click',()=>{
      ws.period=null; ws.customFrom=''; ws.customTo=''; ws.customPerf=null; render();
    });
    try{
      const r=await fetch(cfg.dataUrl).then(x=>x.json());
      if(ws.rv!==rv)return;
      if(!r.ok){const b=el.querySelector(`#${pid}-body`);if(b)b.innerHTML=`<div class="err">${r.error}</div>`;return;}
      const items=r[cfg.symKey]||[];
      const map=Object.fromEntries(items.map(x=>[x.sym,x]));
      let extraHdr=''; let getExtra=()=>'';
      if(ws.period&&ws.periodsData){
        extraHdr=`<th>${ws.period.toUpperCase()}</th>`;
        getExtra=(sym)=>{const v=ws.periodsData?.periods?.[sym]?.[ws.period];return`<td class="glco-num">${pctFmt(v??null)}</td>`;};
      }else if(ws.customPerf&&ws.customFrom){
        const lbl=`${ws.customFrom.slice(5).replace('-','/')}→${ws.customTo.slice(5).replace('-','/')}`;
        extraHdr=`<th style="font-size:9px;letter-spacing:.03em">${lbl}</th>`;
        getExtra=(sym)=>`<td class="glco-num">${pctFmt(ws.customPerf?.perfs?.[sym]??null)}</td>`;
      }
      const totalCols=5+(extraHdr?1:0);
      let rows='';
      for(const g of cfg.groups){
        const gItems=g.keys?g.keys.map(k=>map[k]).filter(Boolean):items.filter(c=>c.category===g.key);
        if(!gItems.length)continue;
        rows+=`<tr class="glco-cat"><td colspan="${totalCols}">${g.label}</td></tr>`;
        for(const c of gItems){
          const d=cd(c.changePct),s=(c.change||0)>=0?'+':'';
          const dec=cfg.priceDecimals;
          rows+=`<tr><td class="glco-name">${c.name}</td><td class="glco-num">${fp(c.price,dec)}</td><td class="glco-num ${d}">${c.change!=null?s+fp(c.change,dec):'—'}</td><td class="glco-num">${pctFmt(c.changePct)}</td><td class="glco-num">${pctFmt(c.ytdPct)}</td>${getExtra(c.sym)}</tr>`;
        }
      }
      const body=el.querySelector(`#${pid}-body`);
      if(!body||ws.rv!==rv)return;
      body.innerHTML=`<div style="flex:1;overflow-y:auto"><table class="glco-tbl"><thead><tr><th>${cfg.colLabel}</th><th>PRICE</th><th>DAY CHG</th><th>DAY %</th><th>YTD %</th>${extraHdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }catch(e){const b=el.querySelector(`#${pid}-body`);if(b&&ws.rv===rv)b.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
  }
  await render();
}

// ── FX ──
const _fxWS = {};  // persistent state per window id: {tab, inverted, fxmData}
async function doFx(el, wid){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  if(!_fxWS[wid]) _fxWS[wid]={tab:'matrix',inverted:false,fxmData:null,rv:0};
  const ws=_fxWS[wid];

  const FLAGS={USD:'🇺🇸',EUR:'🇪🇺',GBP:'🇬🇧',
    JPY:'🇯🇵',CHF:'🇨🇭',CAD:'🇨🇦',
    AUD:'🇦🇺',NZD:'🇳🇿',HKD:'🇭🇰',
    NOK:'🇳🇴',SEK:'🇸🇪',CNY:'🇨🇳',
    RUB:'🇷🇺',INR:'🇮🇳'};

  const bodyId=`fx-body-${wid}`;

  function tabBar(){
    return `<div style="display:flex;gap:3px;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center">
      <span class="fx-tab${ws.tab==='matrix'?' active':''}" data-t="matrix">MATRIX</span>
      <span class="fx-tab${ws.tab==='pairs'?' active':''}" data-t="pairs">PAIRS</span>
    </div>`;
  }

  function wireTabBar(){
    el.querySelectorAll('.fx-tab').forEach(t=>t.addEventListener('click',()=>{
      ws.tab=t.dataset.t; render();
    }));
  }

  function heatStyle(val, rowVals){
    const nums=rowVals.filter(v=>v!=null);
    if(!nums.length) return '';
    const mn=Math.min(...nums), mx=Math.max(...nums);
    if(mx===mn) return '';
    const t=(val-mn)/(mx-mn);
    if(t>0.80) return 'background:rgba(74,222,128,.28);color:#4ade80;';
    if(t>0.60) return 'background:rgba(74,222,128,.14);color:#86efac;';
    if(t<0.20) return 'background:rgba(248,113,113,.28);color:#f87171;';
    if(t<0.40) return 'background:rgba(248,113,113,.14);color:#fca5a5;';
    return 'color:#ddd;';
  }

  async function renderMatrix(body, rv){
    body.innerHTML=ld('Loading matrix…');
    try{
      if(!ws.fxmData){
        const r=await fetch(`${API}/fxmatrix`).then(x=>x.json());
        if(ws.rv!==rv) return;  // superseded by a newer render
        if(!r.ok){body.innerHTML=`<div class="err">${r.error}</div>`;return;}
        ws.fxmData=r;
      }
      if(ws.rv!==rv) return;
      const {currencies,usdRates}=ws.fxmData;
      const inpS='background:#111;border:1px solid #252525;color:#ddd;font-family:var(--font);font-size:10px;padding:3px 6px;outline:none;border-radius:2px;';
      const selOpts=currencies.map(c=>`<option value="${c}">${FLAGS[c]||''} ${c}</option>`).join('');
      const mid=`fxh-${wid||0}`;
      const toolbar=`<div style="display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center;background:#0a0a0a">
        <span id="${mid}-inv" style="cursor:pointer;padding:2px 8px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;color:var(--dim);font-family:var(--font);letter-spacing:.06em;user-select:none">⇄ INVERT</span>
        <span style="width:1px;height:12px;background:var(--bdr);margin:0 2px"></span>
        <select id="${mid}-from" tabindex="1" style="${inpS}">${selOpts}</select>
        <input  id="${mid}-amt"  tabindex="2" type="number" value="100" style="${inpS}width:72px">
        <span style="color:var(--dim);font-size:11px">→</span>
        <select id="${mid}-to"   tabindex="3" style="${inpS}">${selOpts}</select>
        <span id="${mid}-res" style="font-size:13px;font-weight:700;color:#fff;min-width:90px;font-variant-numeric:tabular-nums">—</span>
      </div>`;
      const colHdrs=currencies.map(c=>`<th>${FLAGS[c]||''} ${c}</th>`).join('');
      let rows='';
      for(const base of currencies){
        const rowVals=currencies.map(q=>base===q?null:usdRates[base]/usdRates[q]);
        let cells='';
        for(let qi=0;qi<currencies.length;qi++){
          const quote=currencies[qi];
          if(base===quote){cells+=`<td class="fxm-self">—</td>`;continue;}
          const val=ws.inverted ? usdRates[quote]/usdRates[base] : usdRates[base]/usdRates[quote];
          const normVals=ws.inverted ? currencies.map(q2=>base===q2?null:usdRates[q2]/usdRates[base]) : rowVals;
          cells+=`<td style="${heatStyle(val,normVals)}">${fp(val)}</td>`;
        }
        rows+=`<tr><td class="fxm-row-hdr">${FLAGS[base]||''} ${base}</td>${cells}</tr>`;
      }
      body.innerHTML=toolbar+`<div style="flex:1;overflow:auto"><table class="fxm">
        <thead><tr><th class="fxm-row-hdr"></th>${colHdrs}</tr></thead>
        <tbody>${rows}</tbody></table></div>`;
      const fromSel=body.querySelector(`#${mid}-from`);
      const toSel=body.querySelector(`#${mid}-to`);
      fromSel.value='USD'; toSel.value='EUR';
      function doConvert(){
        const amt=parseFloat(body.querySelector(`#${mid}-amt`).value)||0;
        const from=fromSel.value, to=toSel.value;
        if(!usdRates[from]||!usdRates[to]) return;
        const rate=usdRates[from]/usdRates[to];
        body.querySelector(`#${mid}-res`).textContent=fp(amt*rate,4)+' '+to;
      }
      body.querySelector(`#${mid}-amt`).addEventListener('input',doConvert);
      fromSel.addEventListener('change',doConvert);
      toSel.addEventListener('change',doConvert);
      doConvert();
      body.querySelector(`#${mid}-inv`).addEventListener('click',()=>{
        ws.inverted=!ws.inverted;
        ws.rv = (ws.rv||0) + 1;
        renderMatrix(body, ws.rv);
      });
    }catch(e){body.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
  }

  async function renderPairs(body, rv){
    if(!ws.pairs) ws.pairs={period:null,customFrom:'',customTo:'',periodsData:null,customPerf:null};
    const ps=ws.pairs;
    const today=new Date().toISOString().slice(0,10);
    const inpS='background:#111;border:1px solid #252525;color:#bbb;font-family:var(--font);font-size:10px;padding:2px 6px;outline:none;border-radius:2px;';
    const btnS=(on)=>`cursor:pointer;padding:2px 8px;font-size:9px;border:1px solid ${on?'var(--orange)':'var(--bdr)'};border-radius:2px;color:${on?'var(--orange)':'var(--dim)'};font-family:var(--font);letter-spacing:.06em;user-select:none`;
    const pctFmt=(v)=>{if(v==null)return'<span style="color:#3a3a3a">—</span>';const s=v>=0?'+':'';return`<span class="${cd(v)}">${s}${v.toFixed(2)}%</span>`;};
    const pid=`fxp-${wid||0}`;
    const pbtns=['1y','2y','3y','5y','10y'].map(p=>`<span class="fxp-pb" data-p="${p}" style="${btnS(ps.period===p)}">${p.toUpperCase()}</span>`).join('');
    const showClr=!!(ps.period||(ps.customFrom&&ps.customPerf));
    body.innerHTML=`
      <div style="display:flex;gap:4px;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center;flex-wrap:wrap">
        <span style="font-size:9px;color:#555;letter-spacing:.06em">PERIOD</span>
        ${pbtns}
        <span style="width:1px;height:10px;background:#252525;margin:0 4px"></span>
        <span style="font-size:9px;color:#555;letter-spacing:.06em">FROM</span>
        <input id="${pid}-from" type="date" value="${ps.customFrom||''}" max="${today}" style="${inpS}">
        <span style="font-size:9px;color:#555;letter-spacing:.06em">TO</span>
        <input id="${pid}-to" type="date" value="${ps.customTo||today}" max="${today}" style="${inpS}">
        <span id="${pid}-go" style="${btnS(false)}">GO</span>
        ${showClr?`<span id="${pid}-clr" style="${btnS(false)}">✕</span>`:''}
      </div>
      <div id="${pid}-tbl" style="flex:1;overflow:hidden;display:flex;flex-direction:column">${ld('Loading…')}</div>`;
    // Period buttons
    body.querySelectorAll('.fxp-pb').forEach(btn=>{
      btn.addEventListener('click',async()=>{
        const p=btn.dataset.p;
        if(ps.period===p){ps.period=null;ws.rv=(ws.rv||0)+1;renderPairs(body,ws.rv);return;}
        ps.period=p; ps.customFrom=''; ps.customTo=''; ps.customPerf=null;
        if(!ps.periodsData){
          btn.textContent='…'; btn.style.color='var(--amber)';
          try{const d=await fetch(`${API}/fx/periods`).then(x=>x.json());if(d.ok)ps.periodsData=d;}catch(e){}
        }
        ws.rv=(ws.rv||0)+1; renderPairs(body,ws.rv);
      });
    });
    body.querySelector(`#${pid}-go`)?.addEventListener('click',async()=>{
      const from=body.querySelector(`#${pid}-from`).value;
      const to=body.querySelector(`#${pid}-to`).value||today;
      if(!from)return;
      ps.customFrom=from; ps.customTo=to; ps.period=null;
      const gb=body.querySelector(`#${pid}-go`);
      if(gb){gb.textContent='LOADING…';gb.style.color='var(--amber)';}
      try{const d=await fetch(`${API}/fx/perf?from=${from}&to=${to}`).then(x=>x.json());if(d.ok)ps.customPerf=d;}catch(e){}
      ws.rv=(ws.rv||0)+1; renderPairs(body,ws.rv);
    });
    body.querySelector(`#${pid}-clr`)?.addEventListener('click',()=>{
      ps.period=null; ps.customFrom=''; ps.customTo=''; ps.customPerf=null;
      ws.rv=(ws.rv||0)+1; renderPairs(body,ws.rv);
    });
    // Fetch data and fill table
    try{
      const r=await fetch(`${API}/fx`).then(x=>x.json());
      if(ws.rv!==rv)return;
      if(!r.ok){const t=body.querySelector(`#${pid}-tbl`);if(t)t.innerHTML=`<div class="err">${r.error}</div>`;return;}
      const groups=[
        {label:'G10 MAJORS',       keys:['EURUSD=X','GBPUSD=X','USDJPY=X','USDCHF=X','AUDUSD=X','USDCAD=X','NZDUSD=X']},
        {label:'EMERGING MARKETS', keys:['USDCNY=X','USDINR=X','USDBRL=X','USDMXN=X','USDKRW=X']},
      ];
      const map=Object.fromEntries(r.pairs.map(p=>[p.sym,p]));
      let extraHdr=''; let getExtra=()=>'';
      if(ps.period&&ps.periodsData){
        extraHdr=`<th>${ps.period.toUpperCase()}</th>`;
        getExtra=(sym)=>{const v=ps.periodsData?.periods?.[sym]?.[ps.period];return`<td class="glco-num">${pctFmt(v??null)}</td>`;};
      }else if(ps.customPerf&&ps.customFrom){
        const lbl=`${ps.customFrom.slice(5).replace('-','/')}→${ps.customTo.slice(5).replace('-','/')}`;
        extraHdr=`<th style="font-size:9px;letter-spacing:.03em">${lbl}</th>`;
        getExtra=(sym)=>`<td class="glco-num">${pctFmt(ps.customPerf?.perfs?.[sym]??null)}</td>`;
      }
      const totalCols=5+(extraHdr?1:0);
      let rows='';
      for(const g of groups){
        rows+=`<tr class="glco-cat"><td colspan="${totalCols}">${g.label}</td></tr>`;
        for(const key of g.keys){
          const c=map[key];if(!c)continue;
          const d=cd(c.changePct),s=(c.change||0)>=0?'+':'';
          rows+=`<tr><td class="glco-name">${c.name}</td><td class="glco-num">${fp(c.price,4)}</td><td class="glco-num ${d}">${c.change!=null?s+fp(c.change,4):'—'}</td><td class="glco-num">${pctFmt(c.changePct)}</td><td class="glco-num">${pctFmt(c.ytdPct)}</td>${getExtra(key)}</tr>`;
        }
      }
      const tbl=body.querySelector(`#${pid}-tbl`);
      if(!tbl||ws.rv!==rv)return;
      tbl.innerHTML=`<div style="flex:1;overflow-y:auto"><table class="glco-tbl"><thead><tr><th>PAIR</th><th>RATE</th><th>DAY CHG</th><th>DAY %</th><th>YTD %</th>${extraHdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }catch(e){const t=body.querySelector(`#${pid}-tbl`);if(t&&ws.rv===rv)t.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
  }

  async function renderConverter(body){
    body.innerHTML=ld('Loading…');
    try{
      const r=await fetch(`${API}/fxmatrix`).then(x=>x.json());
      if(!r.ok){body.innerHTML=`<div class="err">${r.error}</div>`;return;}
      const {currencies,usdRates}=r;
      const inpSty='background:#111;border:1px solid #252525;color:#ddd;font-family:var(--font);font-size:11px;padding:4px 7px;outline:none;border-radius:2px;';
      const selOpts=currencies.map(c=>`<option value="${c}">${FLAGS[c]||''} ${c}</option>`).join('');
      const cvid=`fxcv-${wid||0}`;
      body.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:.1em">CURRENCY CONVERTER</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center">
          <input id="${cvid}-amt" type="number" value="100" tabindex="1" style="${inpSty}width:90px">
          <select id="${cvid}-from" tabindex="2" style="${inpSty}">${selOpts}</select>
          <span style="color:var(--dim);font-size:13px">=</span>
          <span id="${cvid}-result" style="font-size:22px;font-weight:700;color:#fff;min-width:130px;text-align:right">—</span>
          <select id="${cvid}-to" tabindex="3" style="${inpSty}">${selOpts}</select>
        </div>
        <div id="${cvid}-label" style="font-size:9px;color:var(--dim)"></div>
        <div style="margin-top:12px;width:100%;max-width:460px">
          <div style="font-size:8px;color:var(--dim);letter-spacing:.1em;margin-bottom:6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">QUICK CROSS RATES</div>
          <table style="width:100%;font-size:10px;border-collapse:collapse" id="${cvid}-xtbl"></table>
        </div>
      </div>`;
      const fromSel=body.querySelector(`#${cvid}-from`);
      const toSel=body.querySelector(`#${cvid}-to`);
      fromSel.value='USD'; toSel.value='EUR';
      function convert(){
        const amt=parseFloat(body.querySelector(`#${cvid}-amt`).value)||0;
        const from=fromSel.value, to=toSel.value;
        if(!usdRates[from]||!usdRates[to]) return;
        const rate=usdRates[from]/usdRates[to];
        body.querySelector(`#${cvid}-result`).textContent=fp(amt*rate,4);
        body.querySelector(`#${cvid}-label`).textContent=`1 ${from} = ${fp(rate,6)} ${to}  ·  1 ${to} = ${fp(1/rate,6)} ${from}`;
        const xtbl=body.querySelector(`#${cvid}-xtbl`);
        xtbl.innerHTML=currencies.filter(c=>c!==from).map(c=>{
          const r2=usdRates[from]/usdRates[c];
          return`<tr>
            <td style="color:var(--dim);padding:3px 0">${FLAGS[c]||''} ${c}</td>
            <td style="text-align:right;color:#ccc;font-variant-numeric:tabular-nums">${fp(r2,4)}</td>
            <td style="text-align:right;color:#3a3a3a;padding-left:16px">1 ${c} = ${fp(1/r2,4)} ${from}</td>
          </tr>`;
        }).join('');
      }
      body.querySelector(`#${cvid}-amt`).addEventListener('input', convert);
      fromSel.addEventListener('change', convert);
      toSel.addEventListener('change', convert);
      convert();
    }catch(e){body.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
  }

  async function render(){
    const body=el.querySelector(`#${bodyId}`);
    if(!body) return;
    ws.rv = (ws.rv||0) + 1;
    const rv = ws.rv;
    el.querySelectorAll('.fx-tab').forEach(t=>t.classList.toggle('active',t.dataset.t===ws.tab));
    if(ws.tab==='matrix') await renderMatrix(body, rv);
    else await renderPairs(body, rv);
  }

  el.innerHTML=tabBar()+`<div id="${bodyId}" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>`;
  wireTabBar();
  await render();
}

// ── MOST ──
async function doMost(el){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld('Most active…');
  let allRows=[];
  let sortKey='volume';
  try{
    const r=await fetch(`${API}/most`).then(x=>x.json());
    if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
    allRows=r.results;
    function renderTable(){
      let rows=[...allRows];
      if(sortKey==='gainers') rows.sort((a,b)=>(b.changePct??-Infinity)-(a.changePct??-Infinity));
      else if(sortKey==='losers') rows.sort((a,b)=>(a.changePct??Infinity)-(b.changePct??Infinity));
      else rows.sort((a,b)=>(b.volume||0)-(a.volume||0));
      const tbody=el.querySelector('#most-tbody');
      if(tbody) tbody.innerHTML=rows.map((s,i)=>`<tr><td style="color:var(--dim)">${i+1}</td><td class="ms" onclick="runCmd('${s.sym} DES')" style="cursor:pointer">${s.sym}</td><td class="mn">${(s.name||'').substring(0,16)}</td><td>${fp(s.price)}</td><td>${pill(s.changePct)}</td><td style="color:var(--dim)">${fv(s.volume)}</td></tr>`).join('');
      el.querySelectorAll('.most-tab').forEach(t=>t.classList.toggle('active',t.dataset.sort===sortKey));
    }
    el.innerHTML=`
      <div style="display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0">
        <span class="most-tab active" data-sort="volume" style="cursor:pointer;padding:2px 8px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;color:var(--dim)">VOLUME</span>
        <span class="most-tab" data-sort="gainers" style="cursor:pointer;padding:2px 8px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;color:var(--dim)">GAINERS</span>
        <span class="most-tab" data-sort="losers" style="cursor:pointer;padding:2px 8px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;color:var(--dim)">LOSERS</span>
      </div>
      <div style="flex:1;overflow-y:auto"><table class="mont"><thead><tr><th>#</th><th>SYM</th><th>NAME</th><th>LAST</th><th>CHG%</th><th>VOLUME</th></tr></thead><tbody id="most-tbody"></tbody></table></div>`;
    el.querySelectorAll('.most-tab').forEach(t=>t.addEventListener('click',()=>{sortKey=t.dataset.sort;renderTable();}));
    renderTable();
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}

// ── FISC ──
async function doFisc(el,wid){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld('Loading institutional fiscal data…');
  let _d=null, tab='overview';

  // ── formatters ──
  const fT=(v,d=2)=>{if(v==null||isNaN(v))return'—';const a=Math.abs(v),s=v<0?'-':'';if(a>=1e12)return s+'$'+(a/1e12).toFixed(d)+'T';if(a>=1e9)return s+'$'+(a/1e9).toFixed(d)+'B';if(a>=1e6)return s+'$'+(a/1e6).toFixed(d)+'M';return s+'$'+a.toFixed(0);};
  const fB=(v,d=2)=>{if(v==null||isNaN(v))return'—';const a=Math.abs(v),s=v<0?'-':'';if(a>=1e3)return s+'$'+(a/1e3).toFixed(d)+'T';if(a>=1)return s+'$'+a.toFixed(d)+'B';return s+'$'+(a*1e3).toFixed(0)+'M';};
  const fM=(v,d=1)=>v!=null?'$'+(v/1e3).toFixed(d)+'B':'—';
  const fPct=(v,d=2)=>v!=null?v.toFixed(d)+'%':'—';
  const fDt=s=>{try{return s.slice(0,7);}catch{return s||'—';}};
  const last=arr=>arr&&arr.length?arr[arr.length-1]:null;
  const prev=(arr,n=1)=>arr&&arr.length>n?arr[arr.length-1-n]:null;
  const delta=arr=>(!arr||arr.length<2)?null:arr[arr.length-1].value-arr[arr.length-2].value;
  const pill=(v,inv=false,fmt=x=>Math.abs(x).toFixed(2))=>{
    if(v==null)return'<span style="color:#444">—</span>';
    const pos=inv?v<0:v>0;const col=pos?'#4ade80':'#f87171';
    return`<span style="color:${col}">${v>0?'▲':'▼'} ${v>0?'+':''}${fmt(v)}</span>`;
  };
  const chHdr=(t,src)=>`<div style="font-size:9px;color:#333;letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase">${t} <span style="color:#222;font-size:8px">${src}</span></div>`;
  const kpi=(label,val,sub,sc='#555')=>`<div class="fisc-kpi"><div class="fk-l">${label}</div><div class="fk-v">${val}</div><div class="fk-s" style="color:${sc}">${sub}</div></div>`;
  const signal=(label,color,text)=>`<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border:1px solid ${color}33;background:${color}0d;font-size:10px;color:${color};letter-spacing:.06em;margin-right:6px;margin-bottom:4px"><span style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></span>${label}: ${text}</span>`;

  // ── chart helpers ──
  function mkChart(id,type,labels,datasets,yFmt,opts={}){
    dc(id);
    requestAnimationFrame(()=>{
      const ctx=document.getElementById(id)?.getContext('2d');if(!ctx)return;
      charts[id]=new Chart(ctx,{type,data:{labels,datasets},options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:datasets.length>1,labels:{color:'#555',font:{family:'JetBrains Mono',size:9},boxWidth:8,padding:8}},
          tooltip:{backgroundColor:'#0f0f0f',borderColor:'#252525',borderWidth:1,titleColor:'#ccc',bodyColor:'#999',titleFont:{family:'JetBrains Mono',size:9},bodyFont:{family:'JetBrains Mono',size:10}}
        },
        scales:{
          x:{grid:{color:'#141414'},ticks:{color:'#333',font:{family:'JetBrains Mono',size:9},maxTicksLimit:10,maxRotation:0},border:{color:'#1e1e1e'}},
          y:{grid:{color:'#141414'},ticks:{color:'#444',font:{family:'JetBrains Mono',size:9},callback:yFmt},border:{color:'#1e1e1e'},...(opts.yMin!=null?{min:opts.yMin}:{}),...(opts.yMax!=null?{max:opts.yMax}:{})}
        },
        animation:{duration:200},...(opts.extra||{})}});
    });
  }
  function ds(label,data,color,opts={}){
    return{label,data,borderColor:color,borderWidth:opts.bw||1.5,pointRadius:opts.pr??0,fill:opts.fill??false,backgroundColor:color+(opts.alpha||'15'),tension:opts.t||.3,borderDash:opts.dash||[]};
  }

  // ── OVERVIEW — Operations Room ──────────────────────
  function renderOverview(){
    const b=document.getElementById('fisc-body-'+wid);if(!b)return;
    const c=_d.curve||{};
    const tgaL=last(_d.tga);
    const debtL=last(_d.debtB), gdpL=last(_d.debtGdp);
    const defL=last(_d.deficit);
    const dpL=_d.debtPenny&&_d.debtPenny.length?_d.debtPenny[_d.debtPenny.length-1]:null;
    const spread21=c['10Y']&&c['2Y']?(c['10Y']-c['2Y']):null;
    const inv=spread21!=null&&spread21<0;
    const tgaOk=tgaL?tgaL.value>=500000:'?';
    const lastAuction=_d.auctions&&_d.auctions.length?_d.auctions[0]:null;
    const bcOk=lastAuction?.bidToCover!=null?lastAuction.bidToCover>=2.0:null;

    // ── warning strip ──
    const tgaColor=tgaL?(tgaL.value<200000?'#f87171':tgaL.value<500000?'#fbbf24':'#4ade80'):'#555';
    const tgaStatus=tgaL?(tgaL.value<200000?'CRITICAL':tgaL.value<500000?'LOW':'ADEQUATE'):'—';
    const spreadColor=inv?'#f87171':spread21!=null&&spread21<0.5?'#fbbf24':'#4ade80';
    const spreadStatus=inv?'INVERTED':spread21!=null&&spread21<0.5?'FLAT':'NORMAL';
    const bcColor=bcOk===false?'#f87171':bcOk?'#4ade80':'#555';
    const bcStatus=lastAuction?.bidToCover!=null?lastAuction.bidToCover.toFixed(2)+'x':'—';

    // interest expense ratio
    const rcL=last(_d.receipts),ouL=last(_d.outlays);
    const intCostPct=rcL&&_d.avgRates&&_d.avgRates.length?(()=>{
      const latestTotal=_d.avgRates.find(r=>r.secDesc==='Total Marketable'||r.secDesc==='Total Interest-bearing Debt');
      return latestTotal?latestTotal.rate.toFixed(2)+'%':'—';
    })():'—';

    b.innerHTML=`
      <div style="padding:6px 10px;border-bottom:1px solid #141414;flex-shrink:0;display:flex;flex-wrap:wrap;align-items:center">
        ${signal('TGA',tgaColor,tgaStatus)}
        ${signal('2Y/10Y',spreadColor,spreadStatus+(spread21!=null?' ('+((spread21)*100).toFixed(0)+'bp)':''))}
        ${signal('LAST AUCTION B/C',bcColor,bcStatus+(lastAuction?' · '+lastAuction.type+' '+lastAuction.term:''))}
        ${signal('DEFICIT',defL?(defL.value<0?'#f87171':'#4ade80'):'#555',defL?fM(defL.value)+' ('+fDt(defL.date)+')':'—')}
      </div>
      <div style="display:flex;gap:0;padding:8px 10px 4px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid #0f0f0f">
        ${kpi('TOTAL PUBLIC DEBT',dpL?fT(dpL.total):'—','Debt to Penny · Daily')}
        ${kpi('DEBT / GDP',fPct(gdpL?.value,1),pill(delta(_d.debtGdp))+' QoQ ppt')}
        ${kpi('TGA CASH',tgaL?fM(tgaL.value):'—',`<span style="color:${tgaColor}">${tgaStatus}</span> · WTREGEN`)}
        ${kpi('2Y / 10Y SPREAD',spread21!=null?((spread21*100).toFixed(0))+'bp':'—',`<span style="color:${spreadColor}">${spreadStatus}</span>`)}
        ${kpi('MONTHLY DEFICIT',defL?fM(defL.value):'—',defL?.value<0?'<span style="color:#f87171">Deficit</span>':'<span style="color:#4ade80">Surplus</span>')}
        ${kpi('10Y BREAKEVEN',last(_d.breakeven10y)?last(_d.breakeven10y).value.toFixed(2)+'%':'—','Inflation expectation · T10YIE')}
      </div>
      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 10px;overflow:hidden;min-height:0">
        <div style="display:flex;flex-direction:column">${chHdr('TGA CASH BALANCE ($B)','WTREGEN')}<div style="flex:1;position:relative"><canvas id="fisc-ov-tga-${wid}"></canvas></div></div>
        <div style="display:flex;flex-direction:column">${chHdr('MONTHLY SURPLUS/DEFICIT ($B)','MTSDS133FMS')}<div style="flex:1;position:relative"><canvas id="fisc-ov-def-${wid}"></canvas></div></div>
        <div style="display:flex;flex-direction:column">${chHdr('YIELD CURVE — CURRENT','DGS SERIES')}<div style="flex:1;position:relative"><canvas id="fisc-ov-yc-${wid}"></canvas></div></div>
      </div>`;

    b.innerHTML=`
      <div style="display:flex;gap:0;padding:8px 10px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid #0f0f0f">
        ${kpi('TOTAL PUBLIC DEBT',dpL?fT(dpL.total):'—','Debt to Penny · Daily · Treasury')}
        ${kpi('DEBT HELD PUBLIC',dpL?fT(dpL.public):'—','Marketable + external')}

        ${kpi('7-DAY CHANGE',wkChg!=null?fT(wkChg):'—',wkChg!=null?pill(wkChg,false,v=>'$'+(Math.abs(v)/1e9).toFixed(1)+'B'):'Weekly net issuance')}

        <div style="display:flex;flex-direction:column">${chHdr('DEBT / GDP — QUARTERLY','GFDEGDP')}<div style="flex:1;position:relative"><canvas id="fisc-dgdp-${wid}"></canvas></div></div>

  // ── BUDGET — Fiscal Sustainability ─────────────────
  function renderBudget(){
    const b=document.getElementById('fisc-body-'+wid);if(!b)return;
    const rcL=last(_d.receipts),ouL=last(_d.outlays),deL=last(_d.deficit);
    const N=48;
    const rcS=(_d.receipts||[]).slice(-N),ouS=(_d.outlays||[]).slice(-N),deS=(_d.deficit||[]).slice(-N);

    // YTD cumulative deficit (fiscal year starts Oct)
    const ytdDef=(()=>{
      const now=new Date(); const fy=now.getMonth()>=9?now.getFullYear():now.getFullYear()-1;
      const fyStart=`${fy}-10`;
      return (_d.deficit||[]).filter(r=>r.date>=fyStart).reduce((s,r)=>s+r.value,0);
    })();

    // Interest expense as % of receipts (estimate using avg rate on total debt × debt level)
    const intPct=(()=>{
      if(!rcL||!_d.avgRates||!_d.avgRates.length)return null;
      const tot=_d.avgRates.find(r=>r.secDesc&&(r.secDesc.toLowerCase().includes('total interest'))||r.secDesc.toLowerCase().includes('total marketable'));
      if(!tot||!_d.debtPenny||!_d.debtPenny.length)return null;
      const annualInt=(_d.debtPenny[_d.debtPenny.length-1].public*tot.rate/100)/12;
      return (annualInt/(rcL.value*1e6)*100).toFixed(1)+'%';
    })();

    b.innerHTML=`
      <div style="display:flex;gap:0;padding:8px 10px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid #0f0f0f">
        ${kpi('MONTHLY RECEIPTS',rcL?fM(rcL.value):'—',rcL?fDt(rcL.date):'')}
        ${kpi('MONTHLY OUTLAYS',ouL?fM(ouL.value):'—',ouL?fDt(ouL.date):'')}
        ${kpi('MONTHLY DEFICIT',deL?fM(deL.value):'—',deL?.value<0?'<span style="color:#f87171">Deficit</span>':'<span style="color:#4ade80">Surplus</span>')}
        ${kpi('YTD DEFICIT (FY)',fM(ytdDef),'<span style="color:'+(ytdDef<0?'#f87171':'#4ade80')+'">'+(ytdDef<0?'Deficit':'Surplus')+'</span>')}
        ${kpi('OUTLAY/RECEIPT',rcL&&ouL&&rcL.value?((ouL.value/rcL.value)*100).toFixed(1)+'%':'—','Spending vs revenue')}
        ${kpi('EST. INT COST',intPct||'—','Annualized % of receipts')}
      </div>
      <div style="flex:1;display:grid;grid-template-columns:1.5fr 1fr;gap:8px;padding:8px 10px;overflow:hidden;min-height:0">
        <div style="display:flex;flex-direction:column">${chHdr('MONTHLY RECEIPTS vs OUTLAYS ($B)','FRED MTSR/MTSO133FMS')}<div style="flex:1;position:relative"><canvas id="fisc-bud-rv-${wid}"></canvas></div></div>
        <div style="display:flex;flex-direction:column">${chHdr('MONTHLY DEFICIT/SURPLUS ($B)','MTSDS133FMS')}<div style="flex:1;position:relative"><canvas id="fisc-bud-def-${wid}"></canvas></div></div>
      </div>`;

    mkChart('fisc-bud-rv-'+wid,'line',rcS.map(r=>fDt(r.date)),[
      ds('Receipts',rcS.map(r=>r.value/1000),'#4ade80',{bw:1.5}),
      ds('Outlays',ouS.slice(-N).map(r=>r.value/1000),'#f87171',{bw:1.5}),
    ],v=>'$'+v.toFixed(0)+'B');
    mkChart('fisc-bud-def-'+wid,'bar',deS.map(r=>fDt(r.date)),
      [{data:deS.map(r=>r.value/1000),backgroundColor:deS.map(r=>r.value>=0?'rgba(74,222,128,0.55)':'rgba(248,113,113,0.55)'),borderColor:deS.map(r=>r.value>=0?'#4ade80':'#f87171'),borderWidth:1}],
      v=>'$'+v.toFixed(0)+'B');
  }

              <th style="text-align:right;padding:6px 8px;color:#444;letter-spacing:.08em;font-weight:500;border-bottom:1px solid #1a1a1a">B/C</th>

          <tbody>
            ${aucs.map(a=>{

                <td style="padding:5px 8px;color:#666">${a.auctionDate?a.auctionDate.slice(0,10):'—'}</td>
                <td style="padding:5px 8px;color:#555">${a.maturityDate?a.maturityDate.slice(0,10):'—'}</td>
                <td style="padding:5px 8px;text-align:right;color:#999">${fAmt(a.offeringAmt)}</td>

        <div style="display:flex;flex-direction:column">${chHdr('2Y / 10Y / 30Y YIELD HISTORY — 1Y','DGS2 · DGS10 · DGS30')}<div style="flex:1;position:relative"><canvas id="fisc-yhist-${wid}"></canvas></div></div>
      </div>`;

  function buildShell(){
    const tabs=[
      {k:'overview',l:'OPERATIONS'},
      {k:'debt',l:'DEBT'},

      {k:'auctions',l:'AUCTIONS'},
      {k:'yields',l:'YIELDS'},
    ];
    el.innerHTML=`
      <div style="display:flex;gap:3px;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center">
        ${tabs.map(t=>`<span class="mac-tab${t.k===tab?' active':''}" data-k="${t.k}">${t.l}</span>`).join('')}

      </div>
      <div id="fisc-body-${wid}" style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0"></div>`;
    el.querySelectorAll('.mac-tab').forEach(t=>t.addEventListener('click',()=>{

    ({overview:renderOverview,debt:renderDebt,budget:renderBudget,auctions:renderAuctions,yields:renderYields}[tab]||renderOverview)();

  try{

    _d=r; buildShell(); render();
  }catch(e){el.innerHTML=`<div class="err">Backend offline.<br>${e}</div>`;}
}

// ── RATE ──
async function doRate(el){
  el.style.cssText='display:flex;flex-direction:column;overflow:hidden;height:100%';
  el.innerHTML=ld('Fetching rates…');

  const fv=v=>v!=null?v.toFixed(2)+'%':'—';
  const chg=(arr)=>{
    if(!arr||arr.length<2)return'';
    const d=arr[arr.length-1].value-arr[arr.length-2].value;
    if(Math.abs(d)<0.0001)return`<span style="color:#444">unch</span>`;
    return`<span style="color:${d>0?'#f87171':'#4ade80'}">${d>0?'▲':'▼'}${Math.abs(d).toFixed(2)}</span>`;
  };
  const lat=(arr)=>arr?.length?arr[arr.length-1]:null;

  function row(label, arr, src){
    const l=lat(arr);
    return`<div style="display:grid;grid-template-columns:1fr 72px 52px 90px;align-items:center;padding:5px 14px;border-bottom:1px solid #0f0f0f">
      <span style="font-size:11px;color:#aaa">${label}</span>
      <span style="font-size:13px;color:#e0e0e0;font-weight:600;text-align:right">${fv(l?.value)}</span>
      <span style="font-size:10px;text-align:right;padding:0 6px">${chg(arr)}</span>
      <span style="font-size:8px;color:#333;text-align:right;letter-spacing:.04em">${src}  ${l?.date||''}</span>
    </div>`;
  }

  function section(title){
    return`<div style="padding:6px 14px 4px;font-size:9px;color:#555;letter-spacing:.18em;background:#060606;border-bottom:1px solid #1a1a1a;border-top:1px solid #141414;margin-top:4px">${title}</div>`;
  }

  try{
    const r=await fetch(`${API}/rate`).then(x=>x.json());
    if(!r.ok){el.innerHTML=`<div class="err">${r.error||'FRED unavailable'}</div>`;return;}

    const sofr30=lat(r.sofr30),sofr90=lat(r.sofr90),sofr180=lat(r.sofr180);
    // compute sofr term spread inline
    const termSpr=(sofr180&&sofr30)?sofr180.value-sofr30.value:null;
